<!doctype html><meta charset=utf8><body style="margin:0;background:#0a0e14">
<canvas id=c width=1100 height=720></canvas>
<script>
const ctx=document.getElementById("c").getContext("2d");
const COLOR={turtleBody:"#7aa23f",turtleShell:"#2f6051",turtleOutline:"#163029",turtleBelly:"#c8a455",turtleScute:"#5c4a26",lens:"#48a7c7",lensShine:"#bfeaff",jetpackBody:"#8a7551",jetpackDark:"#3d3a35",flameOuter:"#ff9f43",flameInner:"#ffe08a"};
let shellEmotion="happy"; const bossesDone=new Set();
let turtle={x:0,y:0,w:36,h:24,vy:0,dir:1,halt:true,onGround:true,animT:0.5,fuel:100,jetT:0,boostsUsed:0,flameT:0,spinning:false,spinT:0,spinPhase:0,tipX:0,tipY:0,spinBase:0,tucked:false,rot:0};
function rr(x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
  else ctx.rect(x, y, w, h);
}
function drawTurtle(cameraX) {
  // Art is authored at this design size, then uniformly scaled down to the
  // (smaller) collision box so the whole turtle shrinks without distortion.
  const w = 46, h = 30;
  const s = turtle.w / w;
  const sx = turtle.x - cameraX;
  // Gentle bob while walking; frozen mid-air and while halted at a setup
  const moving = turtle.onGround && !turtle.halt;
  const bob  = moving ? Math.sin(turtle.animT * 9) * 1.4 : 0;
  const step = moving ? Math.sin(turtle.animT * 9) * 2.2 : 0;
  // Idle breathing — a calm rise/fall when standing still (incl. while reading a setup),
  // and a periodic blink. Tiny touches that make the mascot feel alive.
  const idle = turtle.onGround && !moving && !turtle.tucked && !turtle.spinning;
  const breath = idle ? Math.sin(turtle.animT * 2.0) * 0.55 : 0;
  const blinkC = turtle.animT % 3.2;
  const blink  = blinkC < 0.12 ? (1 - Math.abs(blinkC - 0.06) / 0.06) : 0; // 0→1→0 over 0.12s
  const sy = turtle.y + bob + breath;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(s, s);

  // ── V1.5 GAMEPLAY HERO — the turtle is the visual hero of the screen ──
  // Render the art ~35% larger than its collision box (the hitbox stays 36×24 so jumps,
  // landings and candle collisions are UNCHANGED), anchored at the FEET (w/2, h) so the
  // turtle grows upward and stays planted on the candle it's standing on.
  const VIS = 1.35;
  ctx.translate(w / 2, h); ctx.scale(VIS, VIS); ctx.translate(-w / 2, -h);

  // Contact shadow — grounds the turtle and separates its silhouette from the candles
  // behind it (instant readability on giant green AND giant red candles).
  if (!turtle.tucked && !turtle.spinning) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath(); ctx.ellipse(w / 2, h - 0.5, 15, 3.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Face the walking direction (sprite is drawn facing right)
  if (turtle.dir < 0) {
    ctx.translate(w / 2, h / 2);
    ctx.scale(-1, 1);
    ctx.translate(-w / 2, -h / 2);
  }

  /* Tucked: Shell is a compact ball — just the dome as a circle with
     the hex pattern, rotating as it drops and rolls. Head, legs and
     jetpack are pulled in. */
  if (turtle.tucked) {
    const r = 14;
    ctx.translate(w / 2, h / 2);
    ctx.rotate(turtle.rot);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = COLOR.turtleShell;
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = COLOR.turtleOutline;
    ctx.stroke();
    // Centre hexagon + three spokes (makes the rotation visible)
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const a = (Math.PI / 3) * i;
      const px = Math.cos(a) * 5, py = Math.sin(a) * 5;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const a = (Math.PI * 2 / 3) * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 5, Math.sin(a) * 5);
      ctx.lineTo(Math.cos(a) * (r - 2), Math.sin(a) * (r - 2));
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  // Pole twirl: mirror + squash horizontally as Shell orbits the wick.
  // cos(phase) > 0 = front of the pole (facing right, full width),
  // cos(phase) < 0 = back of the pole (mirrored), near 0 = edge-on.
  if (turtle.spinning) {
    const depth = Math.cos(turtle.spinPhase);
    const squash = Math.sign(depth || 1) * Math.max(0.25, Math.abs(depth));
    ctx.translate(w / 2, h / 2);
    ctx.rotate(turtle.rot);
    ctx.scale(squash, 1);
    ctx.translate(-w / 2, -h / 2);
  }

  /* Legs: two stubs swinging in opposite phase */
  ctx.fillStyle = COLOR.turtleBody;
  rr(w * 0.28 + step, h - 7 - bob, 8, 7 + bob, 3); ctx.fill(); // front leg
  rr(w * 0.54 - step, h - 7 - bob, 8, 7 + bob, 3); ctx.fill(); // back leg

  /* Jetpack: compact pack strapped to the back of the shell */
  ctx.fillStyle = COLOR.jetpackBody;
  rr(-1, h * 0.28, 9, h * 0.52, 3); ctx.fill();
  ctx.fillStyle = COLOR.jetpackDark;                // nozzle
  ctx.fillRect(1.5, h * 0.78, 4, 3.5);
  // Exhaust flame: tiny idle flicker, big burst while the jetpack fires
  const boost = turtle.flameT > 0;
  const f = boost ? 12 + Math.sin(turtle.animT * 48) * 3.5
                  : 3 + Math.sin(turtle.animT * 25) * 1.2;
  const fw = boost ? 3 : 2;                         // half-width of the flame
  if (boost) { ctx.save(); ctx.shadowColor = COLOR.flameOuter; ctx.shadowBlur = 9; }
  ctx.fillStyle = COLOR.flameOuter;
  ctx.beginPath();
  ctx.moveTo(3.5 - fw, h * 0.78 + 3.5);
  ctx.lineTo(3.5 + fw, h * 0.78 + 3.5);
  ctx.lineTo(3.5, h * 0.78 + 3.5 + f);
  ctx.closePath(); ctx.fill();
  if (boost) ctx.restore();
  ctx.fillStyle = COLOR.flameInner;
  ctx.beginPath();
  ctx.arc(3.5, h * 0.78 + 4.5 + (boost ? 2 : 0), boost ? 2.2 : 1.3, 0, Math.PI * 2);
  ctx.fill();
  // White-hot core — a crisper, more energetic flame
  ctx.fillStyle = 'rgba(255,255,255,' + (boost ? 0.92 : 0.6) + ')';
  ctx.beginPath();
  ctx.arc(3.5, h * 0.78 + 4.2 + (boost ? 1.5 : 0), boost ? 1.1 : 0.7, 0, Math.PI * 2);
  ctx.fill();

  /* Neck + round head — V1.5: a slightly BIGGER head (baby-schema = adorable learner). */
  ctx.fillStyle = COLOR.turtleBody;
  ctx.fillRect(w * 0.67, h * 0.35, 8.5, 8);         // neck
  ctx.beginPath();
  ctx.arc(w * 0.86, h * 0.37, 9, 0, Math.PI * 2);   // head (r 8 → 9)
  ctx.fill();
  // Expression — V1.5: the turtle is an EAGER LEARNER, so it smiles by default (never stoic).
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (shellEmotion === 'happy' || shellEmotion === 'excited') {
    ctx.arc(w * 0.89, h * 0.46, 4.2, 0.08 * Math.PI, 0.72 * Math.PI);   // big open grin
  } else if (shellEmotion === 'worried') {
    ctx.arc(w * 0.89, h * 0.55, 3.2, -0.62 * Math.PI, -0.18 * Math.PI); // gentle frown
  } else {
    ctx.arc(w * 0.89, h * 0.46, 3.4, 0.12 * Math.PI, 0.60 * Math.PI);   // default eager smile
  }
  ctx.stroke();
  ctx.lineCap = 'butt';
  // Sweat drop when worried
  if (shellEmotion === 'worried') {
    ctx.fillStyle = '#4cc3ff';
    ctx.beginPath(); ctx.arc(w * 0.98, h * 0.34, 1.8, 0, Math.PI * 2); ctx.fill();
  }
  // Stars/sparkles when excited
  if (shellEmotion === 'excited') {
    ctx.fillStyle = '#ffd60a';
    ctx.font = '5px serif';
    ctx.fillText('✦', w * 0.99, h * 0.18);
    ctx.fillText('✦', w * 1.04, h * 0.32);
  }

  /* CANONICAL FACE — big round eyes (character sheet). The Rookie has NO glasses;
     the cyan Trader's Glasses are EARNED after Guardian 1 (the sheet's progression,
     and the new Guardian-1 reward). */
  // V1.5 — BIG, CURIOUS eyes (the adorable-learner read). Larger sclera + larger pupils =
  // baby-schema cuteness; a bright catchlight makes the turtle look eager and alive. These
  // also give the face a strong, instantly-recognizable read at 32–64px.
  const eyeRY = 3.9 * (1 - blink * 0.85);
  const EYES = [[w * 0.83, h * 0.31], [w * 0.965, h * 0.31]];
  for (const e of EYES) {
    ctx.fillStyle = '#f4f7ee';                                  // big white sclera
    ctx.beginPath(); ctx.ellipse(e[0], e[1], 3.9, eyeRY, 0, 0, Math.PI * 2); ctx.fill();
    if (blink < 0.6) {
      ctx.fillStyle = '#16200d';                                // big friendly pupil
      ctx.beginPath(); ctx.arc(e[0] + 0.6, e[1] + 0.3, 2.7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';                                // bright catchlight
      ctx.beginPath(); ctx.arc(e[0] + 1.6, e[1] - 1.1, 1.15, 0, Math.PI * 2); ctx.fill();
    }
  }
  // Trader's Glasses — the Guardian 1 reward (cyan goggles), sized to the bigger eyes.
  const hasGlasses = (typeof bossesDone !== 'undefined') && bossesDone.size >= 1;
  if (hasGlasses) {
    const gH = 4.0 * (1 - blink * 0.85);
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = COLOR.lens;                                 // cyan tint
    ctx.beginPath(); ctx.ellipse(w * 0.83, h * 0.31, 4.2, gH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(w * 0.965, h * 0.31, 4.2, gH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = COLOR.lens; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(w * 0.875, h * 0.31); ctx.lineTo(w * 0.92, h * 0.31);   // bridge
    ctx.moveTo(w * 0.79, h * 0.31);  ctx.lineTo(w * 0.71, h * 0.27);   // strap to shell
    ctx.stroke();
    ctx.fillStyle = COLOR.lensShine;                            // glint
    ctx.beginPath(); ctx.arc(w * 0.98, h * 0.28, 1.0, 0, Math.PI * 2); ctx.fill();
  }

  /* Dome shell: flat bottom, arched top, drawn over the neck */
  const shellL = w * 0.08, shellR = w * 0.74;
  const shellBot = h * 0.82, shellTop = h * 0.02;
  ctx.beginPath();
  ctx.moveTo(shellL, shellBot);
  ctx.bezierCurveTo(shellL, shellTop, shellR, shellTop, shellR, shellBot);
  ctx.closePath();
  ctx.fillStyle = COLOR.turtleShell;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.stroke();

  // Belly band along the shell's flat bottom
  ctx.fillStyle = COLOR.turtleBelly;
  rr(shellL + 2, shellBot - 4, shellR - shellL - 4, 4, 2); ctx.fill();

  /* Hexagon pattern: one centre hex + spokes radiating to the rim.
     Clipped to the dome so lines never poke outside the shell. */
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(shellL, shellBot);
  ctx.bezierCurveTo(shellL, shellTop, shellR, shellTop, shellR, shellBot);
  ctx.closePath();
  ctx.clip();
  // Soft top-left sheen — a smooth, premium read on the dome (clipped, no new silhouette).
  const sheen = ctx.createRadialGradient(
    shellL + (shellR - shellL) * 0.32, shellTop + 4, 1,
    shellL + (shellR - shellL) * 0.32, shellTop + 4, (shellR - shellL) * 0.95);
  sheen.addColorStop(0, 'rgba(255,255,255,0.22)');
  sheen.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  ctx.fillRect(shellL, shellTop, shellR - shellL, shellBot - shellTop);
  // V1.5 — SIMPLER, STRONGER shell read: ONE bold central bronze scute plate (canonical
  // identity preserved) instead of a busy hex-and-spokes web that turns to mush at 32–48px.
  const hcx = (shellL + shellR) / 2, hcy = h * 0.46, hr = 6.5;
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    const px = hcx + Math.cos(a) * hr, py = hcy + Math.sin(a) * hr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = COLOR.turtleScute; ctx.globalAlpha = 0.6; ctx.fill();
  ctx.globalAlpha = 1;
  ctx.lineWidth = 1.4; ctx.strokeStyle = COLOR.turtleScute; ctx.stroke();
  ctx.restore();

  ctx.restore();
}
// candle background painter
function candles(x,y,wpx,hpx,kind){
  for(let i=0;i<7;i++){const cx=x+i*(wpx/7);const big=kind==="big";const col=(i%2===0)?"#16c784":"#ea3943";
    const bh=big? hpx*(0.55+0.3*Math.sin(i)) : hpx*(0.12+0.06*Math.sin(i*2));
    const by=y+hpx-bh-10; const cw=(wpx/7)*0.6;
    ctx.fillStyle=col; ctx.fillRect(cx+ (wpx/7-cw)/2, by, cw, bh);
    ctx.strokeStyle="#8b98a8"; ctx.lineWidth=1; ctx.beginPath();ctx.moveTo(cx+wpx/14,by-8);ctx.lineTo(cx+wpx/14,by+bh+8);ctx.stroke();
  }
}
function panel(px,py,pw,ph,label,kind,turtleW){
  ctx.save();ctx.translate(px,py);
  ctx.fillStyle="#0e1622";ctx.fillRect(0,0,pw,ph);
  candles(0,0,pw,ph,kind);
  // place turtle standing on a mid candle
  turtle.w=turtleW; turtle.h=turtleW*24/36;
  turtle.x=pw*0.42; turtle.y=ph-10-turtle.h - (kind==="big"? ph*0.30: ph*0.06);
  turtle.dir=1; turtle.onGround=true; turtle.halt=true; turtle.tucked=false; turtle.spinning=false;
  drawTurtle(0);
  ctx.fillStyle="#cfe6d8";ctx.font="12px system-ui";ctx.fillText(label,8,ph-6);
  ctx.restore();
}
ctx.fillStyle="#0a0e14";ctx.fillRect(0,0,1100,720);
// rows: turtleW 36 (current base ~ scaled), and the new VIS makes it bigger automatically.
// columns: giant green, giant red, small candles
const sizes=[["32px feel",24],["48px feel",36],["64px feel",52]];
const kinds=[["GIANT GREEN/RED","big"],["SMALL CANDLES","small"]];
let yy=10;
sizes.forEach((s,ri)=>{
  let xx=10;
  kinds.forEach((k,ci)=>{
    panel(xx,yy,520,220,s[0]+" · "+k[0],k[1],s[1]);
    xx+=540;
  });
  yy+=235;
});
</script></body>
