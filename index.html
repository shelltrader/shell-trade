    ctx.fillText('⏱  EACH CANDLE = A SNAPSHOT IN TIME', cx, tfY);

    const tfs = [
      { label: '1m',  sub: '1 min',   col: '#16c784' },
      { label: '5m',  sub: '5 min',   col: '#ffd60a' },
      { label: '15m', sub: '15 min',  col: '#ff9f43' },
      { label: '1h',  sub: '1 hour',  col: '#ea3943' },
    ];
    const tfBW = Math.floor(W * 0.76 / 4), tfBH = 34, tfGap = 5;
    const tfX0 = cx - (tfs.length * tfBW + (tfs.length - 1) * tfGap) / 2;
    tfs.forEach((tf, i) => {
      const tx = tfX0 + i * (tfBW + tfGap), ty = tfY + 10;
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      rr(tx, ty, tfBW, tfBH, 5); ctx.fill();
      ctx.strokeStyle = tf.col; ctx.lineWidth = 1;
      rr(tx, ty, tfBW, tfBH, 5); ctx.stroke();
      ctx.fillStyle = tf.col; ctx.font = 'bold 13px ' + FONT_UI;
      ctx.textAlign = 'center';
      ctx.fillText(tf.label, tx + tfBW / 2, ty + 14);
      ctx.fillStyle = '#5a6b82'; ctx.font = '9px ' + FONT_UI;
      ctx.fillText(tf.sub, tx + tfBW / 2, ty + 27);
    });
    ctx.fillStyle = '#5a6b82'; ctx.font = '11px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('Same green/red rules on every time frame!', cx, tfY + 55);

    drawAcadShell(W * 0.87, H * 0.14 + bob, 2.1, 'happy');

  } else if (card === 2) {
    // Body & Wicks anatomy
    ctx.font = 'bold 21px ' + FONT_UI;
    ctx.fillStyle = '#ffd60a';
    ctx.textAlign = 'center';
    ctx.fillText('BODY & WICKS 🔍', cx, H * 0.10);

    const acx = cx, cw = 44;
    const bodyTop = H * 0.26, bodyBot = H * 0.56;   // shifted down to clear the title
    const wickTop = bodyTop - H * 0.08, wickBot = bodyBot + H * 0.07;

    // Wicks
    ctx.strokeStyle = '#c9d1d9'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(acx, wickTop); ctx.lineTo(acx, bodyTop);
    ctx.moveTo(acx, bodyBot); ctx.lineTo(acx, wickBot);
    ctx.stroke();
    // Body
    ctx.fillStyle = COLOR.greenBody;
    rr(acx - cw / 2, bodyTop, cw, bodyBot - bodyTop, 3); ctx.fill();
    ctx.strokeStyle = '#0d9460'; ctx.lineWidth = 2;
    rr(acx - cw / 2, bodyTop, cw, bodyBot - bodyTop, 3); ctx.stroke();

    // Labels — right side
    ctx.font = 'bold 12px ' + FONT_UI;

    // HIGH
    ctx.fillStyle = '#c9d1d9'; ctx.textAlign = 'left';
    ctx.fillText('HIGH ▲', acx + cw / 2 + 12, wickTop + 5);
    ctx.strokeStyle = '#5a6b82'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(acx + 2, wickTop); ctx.lineTo(acx + cw / 2 + 10, wickTop); ctx.stroke();

    // OPEN
    ctx.fillStyle = '#7fd6ff'; ctx.textAlign = 'left';
    ctx.fillText('OPEN', acx + cw / 2 + 12, bodyTop + 5);
    ctx.setLineDash([3, 3]); ctx.strokeStyle = '#4cc3ff75';
    ctx.beginPath();
    ctx.moveTo(acx + cw / 2, bodyTop); ctx.lineTo(acx + cw / 2 + 10, bodyTop); ctx.stroke();
    ctx.setLineDash([]);

    // CLOSE
    ctx.fillStyle = '#7fd6ff'; ctx.textAlign = 'left';
    ctx.fillText('CLOSE', acx + cw / 2 + 12, bodyBot + 5);
    ctx.setLineDash([3, 3]); ctx.strokeStyle = '#4cc3ff75';
    ctx.beginPath();
    ctx.moveTo(acx + cw / 2, bodyBot); ctx.lineTo(acx + cw / 2 + 10, bodyBot); ctx.stroke();
    ctx.setLineDash([]);

    // LOW
    ctx.fillStyle = '#c9d1d9'; ctx.textAlign = 'left';
    ctx.fillText('LOW ▼', acx + cw / 2 + 12, wickBot + 5);
    ctx.strokeStyle = '#5a6b82'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(acx + 2, wickBot); ctx.lineTo(acx + cw / 2 + 10, wickBot); ctx.stroke();

    // BODY label — left side with bracket
    ctx.fillStyle = '#16c784'; ctx.textAlign = 'right';
    ctx.fillText('BODY', acx - cw / 2 - 12, (bodyTop + bodyBot) / 2 + 5);
    ctx.strokeStyle = '#16c78460'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(acx - cw / 2 - 10, bodyTop + 10);
    ctx.lineTo(acx - cw / 2 - 10, bodyBot - 10);
    ctx.stroke();

    // WICK label — left side
    ctx.fillStyle = '#c9d1d9'; ctx.textAlign = 'right';
    ctx.fillText('WICK', acx - cw / 2 - 12, wickTop + (bodyTop - wickTop) / 2 + 5);

    // Explanation
    ctx.textAlign = 'center';
    ctx.font = '14px ' + FONT_UI;
    ctx.fillStyle = '#c7d1de';
    ctx.fillText('The BODY shows open → close.', cx, H * 0.71);
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('The WICKS show how far price went', cx, H * 0.76);
    ctx.fillText('before getting pushed back.', cx, H * 0.80);

    drawAcadShell(W * 0.13, H * 0.14 + bob, 2.1, 'focused');

  } else if (card === 3) {
    // What's a Doji?
    ctx.font = 'bold 21px ' + FONT_UI;
    ctx.fillStyle = '#7fd6ff';
    ctx.textAlign = 'center';
    ctx.fillText("WHAT'S A DOJI? 🤔", cx, H * 0.10);

    const cw = 32;

    // Left: normal candle
    const ncx = W * 0.33, nTop = H * 0.20, nBot = nTop + 74;
    ctx.strokeStyle = '#8b98a8'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ncx, nTop - 20); ctx.lineTo(ncx, nTop);
    ctx.moveTo(ncx, nBot);      ctx.lineTo(ncx, nBot + 15);
    ctx.stroke();
    ctx.fillStyle = COLOR.greenBody;
    rr(ncx - cw / 2, nTop, cw, 74, 3); ctx.fill();
    ctx.font = 'bold 12px ' + FONT_UI;
    ctx.fillStyle = '#7d8aa0'; ctx.textAlign = 'center';
    ctx.fillText('NORMAL', ncx, nBot + 30);
    ctx.font = '11px ' + FONT_UI;
    ctx.fillText('Big body', ncx, nBot + 46);
    ctx.fillText('= clear winner', ncx, nBot + 60);

    // Right: Doji
    const dcx = W * 0.67, dMid = H * 0.33;
    const dWUp = H * 0.12, dWDn = H * 0.10;
    ctx.strokeStyle = '#7fd6ff'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(dcx, dMid - dWUp); ctx.lineTo(dcx, dMid + dWDn);
    ctx.stroke();
    ctx.fillStyle = '#e6edf3';
    ctx.fillRect(dcx - cw / 2, dMid - 3, cw, 6); // tiny body
    ctx.font = 'bold 12px ' + FONT_UI;
    ctx.fillStyle = '#7fd6ff'; ctx.textAlign = 'center';
    ctx.fillText('DOJI ✨', dcx, dMid + dWDn + 28);
    ctx.font = '11px ' + FONT_UI;
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('Tiny body', dcx, dMid + dWDn + 44);
    ctx.fillText('= no winner', dcx, dMid + dWDn + 58);

    ctx.fillStyle = '#5a6b82';
    ctx.font = '14px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('vs', cx, H * 0.43);

    drawAcadShell(cx, H * 0.57 + bob, 3.0, 'focused');

    // Explanation
    ctx.font = '14px ' + FONT_UI;
    ctx.fillStyle = '#c7d1de'; ctx.textAlign = 'center';
    ctx.fillText('A DOJI: open and close are almost equal.', cx, H * 0.67);
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('Buyers and sellers ended up in a TIE.', cx, H * 0.72);
    ctx.fillText('The market is unsure — big move coming! 👀', cx, H * 0.77);

  } else if (card === 4) {
    // Long vs Short
    ctx.font = 'bold 21px ' + FONT_UI;
    ctx.fillStyle = '#ffd60a';
    ctx.textAlign = 'center';
    ctx.fillText('LONG vs SHORT 🎯', cx, H * 0.10);

    // Divider
    ctx.strokeStyle = '#2a3442'; ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(cx, H * 0.16); ctx.lineTo(cx, H * 0.82);
    ctx.stroke();
    ctx.setLineDash([]);

    const lcx = W * 0.27, rcx = W * 0.73;

    // LONG: arrow up
    ctx.strokeStyle = COLOR.greenBody; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(lcx, H * 0.53); ctx.lineTo(lcx, H * 0.20);
    ctx.stroke();
    ctx.fillStyle = COLOR.greenBody;
    ctx.beginPath();
    ctx.moveTo(lcx, H * 0.18);
    ctx.lineTo(lcx - 10, H * 0.25);
    ctx.lineTo(lcx + 10, H * 0.25);
    ctx.closePath(); ctx.fill();

    drawAcadShell(lcx, H * 0.62 + bob * 0.7, 3.2, 'happy');

    ctx.fillStyle = COLOR.greenBody;
    ctx.font = 'bold 16px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('📈 LONG', lcx, H * 0.74);
    ctx.font = '12px ' + FONT_UI;
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('Bet it goes UP', lcx, H * 0.79);

    // SHORT: arrow down
    ctx.strokeStyle = COLOR.redBody; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(rcx, H * 0.20); ctx.lineTo(rcx, H * 0.53);
    ctx.stroke();
    ctx.fillStyle = COLOR.redBody;
    ctx.beginPath();
    ctx.moveTo(rcx, H * 0.55);
    ctx.lineTo(rcx - 10, H * 0.48);
    ctx.lineTo(rcx + 10, H * 0.48);
    ctx.closePath(); ctx.fill();

    drawAcadShell(rcx, H * 0.30 - bob * 0.7, 3.2, 'worried');

    ctx.fillStyle = COLOR.redBody;
    ctx.font = 'bold 16px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('📉 SHORT', rcx, H * 0.74);
    ctx.font = '12px ' + FONT_UI;
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('Bet it goes DOWN', rcx, H * 0.79);

    // Bottom tip
    ctx.font = '13px ' + FONT_UI;
    ctx.fillStyle = '#c9b3ff'; ctx.textAlign = 'center';
    ctx.fillText('In Chart Quest, tap the banner to choose', cx, H * 0.84);
    ctx.fillText('your direction before every trade. 🐢', cx, H * 0.88);

  } else if (card === 5) {
    // HOW TO PLAY — numbered steps + looping mini-demo animation
    ctx.font = 'bold 21px ' + FONT_UI;
    ctx.fillStyle = '#ffd60a';
    ctx.textAlign = 'center';
    ctx.fillText('HOW TO PLAY 🎮', cx, H * 0.10);

    // 4 numbered step rows
    const steps = [
      { n: 1, icon: '🚶', col: '#7fd6ff', title: 'WALK THE CHART',   desc: 'Jump on candles — your platforms!' },
      { n: 2, icon: '⚡', col: '#c9b3ff', title: 'SPOT A SETUP',     desc: 'A banner pops up — tap to trade.' },
      { n: 3, icon: '📊', col: '#ffd60a', title: 'ENTER THE TRADE',  desc: 'Choose LONG 📈 or SHORT 📉.' },
      { n: 4, icon: '🐚', col: '#16c784', title: 'WIN SHELLS',       desc: '+2% to advance, −5% resets. 🐚 = score!' },
    ];
    const rowH = H * 0.104;
    steps.forEach((s, i) => {
      const ry = H * 0.155 + i * rowH;
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      rr(W * 0.04, ry, W * 0.92, rowH - 5, 7); ctx.fill();
      // numbered badge
      ctx.fillStyle = s.col;
      ctx.beginPath(); ctx.arc(W * 0.12, ry + rowH * 0.42, 11, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0a0e14';
      ctx.font = 'bold 11px ' + FONT_UI;
      ctx.textAlign = 'center';
      ctx.fillText(s.n, W * 0.12, ry + rowH * 0.48);
      // emoji icon
      ctx.font = '14px serif';
      ctx.fillStyle = '#e6edf3';
      ctx.textAlign = 'left';
      ctx.fillText(s.icon, W * 0.20, ry + rowH * 0.38);
      // title + desc
      ctx.fillStyle = s.col;
      ctx.font = 'bold 12px ' + FONT_UI;
      ctx.fillText(s.title, W * 0.28, ry + rowH * 0.36);
      ctx.fillStyle = '#7d8aa0';
      ctx.font = '11px ' + FONT_UI;
      ctx.fillText(s.desc, W * 0.28, ry + rowH * 0.68);
    });

    // ── Mini animated demo ──────────────────────────────────────
    const demoTop = H * 0.60, demoH = H * 0.175;
    ctx.fillStyle = 'rgba(10,14,20,0.88)';
    rr(W * 0.04, demoTop, W * 0.92, demoH, 8); ctx.fill();
    ctx.strokeStyle = '#1c2737'; ctx.lineWidth = 1;
    rr(W * 0.04, demoTop, W * 0.92, demoH, 8); ctx.stroke();

    // Simplified flat candle platforms
    const plats = [
      { xf: 0.08, yf: 0.72, cf: true  },
      { xf: 0.20, yf: 0.55, cf: true  },
      { xf: 0.32, yf: 0.65, cf: false },
      { xf: 0.44, yf: 0.48, cf: true  },
      { xf: 0.56, yf: 0.40, cf: true  },
      { xf: 0.68, yf: 0.58, cf: false },
      { xf: 0.80, yf: 0.45, cf: true  },
    ];
    const platW = W * 0.09, platH = demoH * 0.28;
    plats.forEach(p => {
      const px = W * p.xf, py = demoTop + demoH * p.yf;
      ctx.fillStyle = p.cf ? COLOR.greenBody : COLOR.redBody;
      ctx.fillRect(px, py, platW, platH);
      // wick stub
      ctx.strokeStyle = '#5a6b82'; ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(px + platW / 2, py - 6); ctx.lineTo(px + platW / 2, py);
      ctx.stroke();
    });

    // Shell walks across platforms (7s loop)
    const dPhase = (ac.t * 0.6) % 7;
    const dIdx = Math.min(plats.length - 1, Math.floor(dPhase / 7 * plats.length * 1.2));
    const dp = plats[Math.min(dIdx, plats.length - 1)];
    const dShellX = W * dp.xf + platW / 2;
    const dShellY = demoTop + demoH * dp.yf - 16 + bob * 0.3;
    const dEmo = dPhase > 5.2 ? 'happy' : dPhase > 3.8 ? 'excited' : 'focused';
    drawAcadShell(dShellX, dShellY, 1.55, dEmo);

    // Setup banner in demo (phase 2–4.2)
    if (dPhase >= 2.0 && dPhase < 4.2) {
      const ba = Math.min(1, (dPhase - 2.0) / 0.45);
      ctx.globalAlpha = ba;
      ctx.fillStyle = 'rgba(22,16,44,0.96)';
      rr(cx - 95, demoTop - 29, 190, 25, 6); ctx.fill();
      ctx.strokeStyle = '#7c4dff'; ctx.lineWidth = 1.2;
      rr(cx - 95, demoTop - 29, 190, 25, 6); ctx.stroke();
      ctx.fillStyle = '#c9b3ff';
      ctx.font = 'bold 11px ' + FONT_UI;
      ctx.textAlign = 'center';
      ctx.fillText('⚡ SETUP DETECTED — TAP TO TRADE', cx, demoTop - 11);
      ctx.globalAlpha = 1;
    }

    // Win flash (phase 4.5–5.8)
    if (dPhase >= 4.5 && dPhase < 5.8) {
      const fa = Math.max(0, 1 - (dPhase - 4.5) / 1.3);
      ctx.globalAlpha = fa;
      ctx.fillStyle = '#16c784';
      ctx.font = 'bold 17px ' + FONT_UI;
      ctx.textAlign = 'center';
      ctx.fillText('+SHELLS! 🐚', cx, demoTop - 10);
      ctx.globalAlpha = 1;
    }

    // Coin tip
    ctx.fillStyle = '#ffd60a';
    ctx.font = '12px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('🐚 Collect shells on candle tops to unlock LEVERAGE!', cx, H * 0.82);
  }

  // --- Bottom prompt (tap to continue) ---
  const isLast = ac.card === ac.total - 1;
  const blink = Math.sin(ac.t * 2.8) > -0.3; // mostly visible, fast blink at half-speed
  if (blink) {
    ctx.fillStyle = isLast ? 'rgba(124,77,255,0.9)' : 'rgba(255,255,255,0.13)';
    rr(cx - 130, H - 66, 260, 44, 10); ctx.fill();
    ctx.fillStyle = isLast ? '#ffffff' : '#e6edf3';
    ctx.font = 'bold 15px -apple-system, BlinkMacSystemFont, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isLast ? "LET'S PLAY! 🐢" : 'TAP TO CONTINUE →', cx, H - 36);
  }

  // Tap flash
  if (ac.tapFade > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (ac.tapFade * 0.12) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

/* ════════════════════════════════════════════════════════════════════
   INTERACTIVE INTRO FLOW
   Checkpoint 1 (candle 10):  Flash Quiz — tap the correct answer
   Checkpoint 2 (candle 20):  Prediction Bet — bet before the candle closes
   Checkpoint 3 (candle 30):  Intro Boss — THE MARKET MAKER
   ════════════════════════════════════════════════════════════════════ */

function triggerFlashQuiz() {
  introFlow.phase = 'quiz';
  introFlow.t = 0;
  const q = introFlow.quiz;
  q.round = 0; q.answered = false; q.choice = -1; q.resultT = 0; q.score = 0;
  introFlow.prevPaused = paused;
  paused = true;
  session.inModal = true;
}

function triggerPredictionBet() {
  introFlow.phase = 'bet';
  introFlow.t = 0;
  const b = introFlow.bet;
  b.round = 0; b.betPlaced = false; b.choice = null;
  b.lockedProg = 0; b.betT = 0; b.resultStartT = null; b.score = 0;
  introFlow.prevPaused = paused;
  paused = true;
  session.inModal = true;
}

function triggerIntroBoss() {
  introFlow.phase = 'boss';
  paused = false;
  session.inModal = true;
  openBoss(0);
}

function introComplete() {
  localStorage.setItem('cq_played', '1');
  introFlow.active = false;
  introFlow.phase = 'done';
  session.inModal = false;
  paused = false;
  // Give the player their first lessons now that they've earned them
  teach('controls');
  teach('goal');
}

/* ── Flash Quiz handlers ─────────────────────────────────────────── */

function handleIntroQuizTap(tx, ty) {
  const q = introFlow.quiz;
  const card = q.cards[q.round];

  if (q.answered) {
    if (q.resultT < 1.2) return;
    if (ty > H * 0.73) {
      if (q.round < q.cards.length - 1) {
        q.round++;
        q.answered = false; q.choice = -1; q.resultT = 0;
        introFlow.t = 0;
      } else {
        // Quiz done → start Prediction Bet
        triggerPredictionBet();
      }
    }
    return;
  }

  const btnH = 52, btnW = W - 48, btnX = 24;
  for (let i = 0; i < card.opts.length; i++) {
    const btnY = H * 0.67 + i * (btnH + 10);
    if (tx >= btnX && tx <= btnX + btnW && ty >= btnY && ty <= btnY + btnH) {
      q.choice = i; q.answered = true; q.resultT = 0;
      if (i === card.correct) q.score++;
      introFlow.t = 0;
      break;
    }
  }
}

/* ── Prediction Bet handlers ─────────────────────────────────────── */

function handleIntroBetTap(tx, ty) {
  const b = introFlow.bet;
  const card = b.cards[b.round];

  if (b.betPlaced) {
    const elapsed = b.resultStartT !== null ? introFlow.t - b.resultStartT : 0;
    if (elapsed > 2.0 && ty > H * 0.87) {
      if (b.round < b.cards.length - 1) {
        b.round++;
        b.betPlaced = false; b.choice = null;
        b.lockedProg = 0; b.betT = 0; b.resultStartT = null;
        introFlow.t = 0;
      } else {
        triggerIntroBoss();
      }
    }
    return;
  }

  const prog = Math.min(0.92, introFlow.t / 5.5);
  if (prog < 0.3) return; // bet buttons not visible yet

  const areaY = H * 0.17, areaH = H * 0.44;
  const btnH = 54, btnW = (W - 44) / 2 - 5;
  const btnsTop = areaY + areaH + 14;

  if (ty >= btnsTop && ty <= btnsTop + btnH) {
    if (tx >= 14 && tx <= 14 + btnW) {
      b.choice = 'green'; b.betPlaced = true;
      b.lockedProg = prog; b.betT = introFlow.t;
    } else if (tx >= 14 + btnW + 16 && tx <= 14 + btnW + 16 + btnW) {
      b.choice = 'red'; b.betPlaced = true;
      b.lockedProg = prog; b.betT = introFlow.t;
    }
  }
}

/* ── Draw: quiz candle helper ────────────────────────────────────── */

function drawQuizCandle(cx, topY, cw, ch, card) {
  const isGreen = card.color === 'green';
  const isDoji  = card.color === 'doji';
  const pxOf    = (n) => topY + ch * (1 - n);

  const openY   = pxOf(card.o);
  const closeY  = pxOf(card.c);
  const bodyTop = Math.min(openY, closeY);
  const bodyH   = Math.max(Math.abs(closeY - openY), 5);
  const highY   = pxOf(Math.max(card.o, card.c) + (card.up || 0));
  const lowY    = pxOf(Math.min(card.o, card.c) - (card.lo || 0));

  ctx.strokeStyle = '#8b98a8'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, highY); ctx.lineTo(cx, bodyTop);
  ctx.moveTo(cx, bodyTop + bodyH); ctx.lineTo(cx, lowY);
  ctx.stroke();

  const fillCol = isDoji ? '#ffd60a' : isGreen ? COLOR.greenBody : COLOR.redBody;
  const bdrCol  = isDoji ? '#b89600' : isGreen ? '#0d9460' : '#b52a30';
  ctx.fillStyle = fillCol;
  rr(cx - cw / 2, bodyTop, cw, bodyH, 5); ctx.fill();
  ctx.strokeStyle = bdrCol; ctx.lineWidth = 2.5;
  rr(cx - cw / 2, bodyTop, cw, bodyH, 5); ctx.stroke();
}

/* ── Draw: Flash Quiz overlay ────────────────────────────────────── */

function drawFlashQuiz() {
  const q    = introFlow.quiz;
  const card = q.cards[q.round];
  const cx   = W / 2;
  const F    = '-apple-system, BlinkMacSystemFont, system-ui, sans-serif';

  ctx.save();

  // Dark overlay
  ctx.fillStyle = 'rgba(8,10,22,0.92)';
  ctx.fillRect(0, 0, W, H);

  // Header bar
  ctx.fillStyle = '#7c4dff';
  ctx.fillRect(0, 0, W, 52);
  ctx.font = 'bold 16px ' + F;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText('⚡ FLASH QUIZ — ' + (q.round + 1) + ' / ' + q.cards.length, cx, 33);

  // Progress dots
  for (let i = 0; i < q.cards.length; i++) {
    const dx = cx + (i - (q.cards.length - 1) / 2) * 20;
    ctx.beginPath(); ctx.arc(dx, 46, 4, 0, Math.PI * 2);
    ctx.fillStyle = i < q.round ? '#16c784' : i === q.round ? '#ffd60a' : 'rgba(255,255,255,0.2)';
    ctx.fill();
  }

  if (q.answered) {
    q.resultT += 1 / 60;
    const correct = q.choice === card.correct;
    const fade    = Math.min(1, q.resultT * 4);

    ctx.globalAlpha = fade;
    drawQuizCandle(cx, H * 0.10, 52, H * 0.36, card);

    ctx.fillStyle = correct ? 'rgba(22,199,132,0.15)' : 'rgba(234,57,67,0.15)';
    rr(24, H * 0.51, W - 48, 62, 10); ctx.fill();
    ctx.strokeStyle = correct ? '#16c784' : '#ea3943'; ctx.lineWidth = 2;
    rr(24, H * 0.51, W - 48, 62, 10); ctx.stroke();

    ctx.fillStyle = correct ? '#16c784' : '#ea3943';
    ctx.font = 'bold 22px ' + F; ctx.textAlign = 'center';
    ctx.fillText(correct ? '✅ CORRECT!' : '❌ WRONG!', cx, H * 0.51 + 28);

    ctx.font = '13px ' + F; ctx.fillStyle = 'rgba(255,255,255,0.75)';
    // Word-wrap explanation
    const words = card.explain.split(' ');
    let line = '', ly = H * 0.51 + 50;
    for (const w of words) {
      const test = line + (line ? ' ' : '') + w;
      if (ctx.measureText(test).width > W - 60) { ctx.fillText(line, cx, ly); ly += 17; line = w; }
      else line = test;
    }
    if (line) ctx.fillText(line, cx, ly);

    if (q.resultT > 1.2) {
      const isLast  = q.round >= q.cards.length - 1;
      const btnText = isLast ? '🎯 START BET ROUND!' : 'NEXT ROUND →';
      const pulse   = 0.75 + 0.25 * Math.sin(q.resultT * 5);
      ctx.globalAlpha = fade * pulse;
      ctx.fillStyle = '#7c4dff';
      rr(cx - 115, H * 0.76, 230, 52, 12); ctx.fill();
      ctx.font = 'bold 16px ' + F; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      ctx.fillText(btnText, cx, H * 0.76 + 32);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    return;
  }

  // Unanswered: show candle + question + buttons
  const fade = Math.min(1, introFlow.t * 3);
  ctx.globalAlpha = fade;

  drawQuizCandle(cx, H * 0.09, 54, H * 0.40, card);

  ctx.font = 'bold 18px ' + F; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(card.q, cx, H * 0.60);

  const btnH = 52, btnW = W - 48, btnX = 24;
  const BCOLS = ['#16c784', '#ea3943', '#ffd60a'];
  for (let i = 0; i < card.opts.length; i++) {
    const btnY = H * 0.67 + i * (btnH + 10);
    ctx.fillStyle = BCOLS[i % BCOLS.length];
    rr(btnX, btnY, btnW, btnH, 12); ctx.fill();
    ctx.font = 'bold 15px ' + F; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText(card.opts[i], cx, btnY + 32);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ── Draw: Prediction Bet overlay ────────────────────────────────── */

function drawPredictionBet() {
  const b    = introFlow.bet;
  const card = b.cards[b.round];
  const cx   = W / 2;
  const F    = '-apple-system, BlinkMacSystemFont, system-ui, sans-serif';
  const isGreen = card.finalColor === 'green';

  ctx.save();

  ctx.fillStyle = 'rgba(8,10,22,0.93)';
  ctx.fillRect(0, 0, W, H);

  // Header
  ctx.fillStyle = '#ea3943';
  ctx.fillRect(0, 0, W, 52);
  ctx.font = 'bold 16px ' + F; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText('🎯 PREDICTION BET — ' + (b.round + 1) + ' / ' + b.cards.length, cx, 33);

  // Question
  ctx.font = 'bold 17px ' + F; ctx.fillStyle = '#ffd60a'; ctx.textAlign = 'center';
  ctx.fillText(card.q, cx, H * 0.13);

  // Candle-forming area
  const areaX = W * 0.1, areaY = H * 0.17;
  const areaW = W * 0.8, areaH = H * 0.44;
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  rr(areaX, areaY, areaW, areaH, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
  rr(areaX, areaY, areaW, areaH, 8); ctx.stroke();

  // Compute forming progress
  let prog;
  if (!b.betPlaced) {
    prog = Math.min(0.92, introFlow.t / 5.5);
  } else {
    prog = Math.min(1, b.lockedProg + (introFlow.t - b.betT) * 0.45);
  }

  const startNorm = card.startNorm;
  const finalNorm = isGreen ? 0.78 : 0.22;
  const curNorm   = startNorm + (finalNorm - startNorm) * prog;

  const openPx  = areaY + areaH * (1 - startNorm);
  const curPx   = areaY + areaH * (1 - curNorm);
  const finalPx = areaY + areaH * (1 - finalNorm);
  const candleX = areaX + areaW * 0.5;
  const bodyW   = 44;

  // Open dotted line
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(areaX + 4, openPx); ctx.lineTo(areaX + areaW - 4, openPx); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#7d8aa0'; ctx.font = '10px ' + F; ctx.textAlign = 'left';
  ctx.fillText('OPEN', areaX + 6, openPx - 3);

  if (prog >= 1) {
    // Candle fully formed: draw body
    if (!b.resultStartT) b.resultStartT = introFlow.t;
    const bodyTop = Math.min(openPx, finalPx);
    const bodyH   = Math.max(Math.abs(finalPx - openPx), 6);
    ctx.fillStyle = isGreen ? COLOR.greenBody : COLOR.redBody;
    rr(candleX - bodyW / 2, bodyTop, bodyW, bodyH, 5); ctx.fill();
    ctx.strokeStyle = isGreen ? '#0d9460' : '#b52a30'; ctx.lineWidth = 2;
    rr(candleX - bodyW / 2, bodyTop, bodyW, bodyH, 5); ctx.stroke();
  } else {
    // Still forming: price line
    const lCol = isGreen ? '#16c784' : '#ea3943';
    ctx.strokeStyle = lCol; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(candleX, openPx); ctx.lineTo(candleX, curPx); ctx.stroke();
    // Moving dot
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(candleX, curPx, 5.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = lCol;
    ctx.beginPath(); ctx.arc(candleX, curPx, 3.5, 0, Math.PI * 2); ctx.fill();
  }

  // Bet buttons / status
  const btnsTop = areaY + areaH + 14;

  if (!b.betPlaced) {
    if (prog >= 0.3) {
      const vis   = Math.min(1, (prog - 0.3) / 0.15);
      const pulse = 0.8 + 0.2 * Math.sin(introFlow.t * 6);
      ctx.globalAlpha = vis * pulse;
      const btnH = 54, btnW = (W - 44) / 2 - 5;
      ctx.fillStyle = '#16c784';
      rr(14, btnsTop, btnW, btnH, 12); ctx.fill();
      ctx.font = 'bold 18px ' + F; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      ctx.fillText('📈 GREEN', 14 + btnW / 2, btnsTop + 34);
      ctx.fillStyle = '#ea3943';
      rr(14 + btnW + 16, btnsTop, btnW, btnH, 12); ctx.fill();
      ctx.fillText('📉 RED', 14 + btnW + 16 + btnW / 2, btnsTop + 34);
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(255,215,0,0.85)'; ctx.font = 'bold 12px ' + F;
      ctx.textAlign = 'center';
      ctx.fillText('⏱  BET NOW — candle closing soon!', cx, btnsTop + 66);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '15px ' + F; ctx.textAlign = 'center';
      ctx.fillText('👀  Watch the candle form...', cx, btnsTop + 28);
    }
  } else {
    const betCol = b.choice === 'green' ? '#16c784' : '#ea3943';
    const betLbl = b.choice === 'green' ? '📈 GREEN' : '📉 RED';
    ctx.font = 'bold 16px ' + F; ctx.fillStyle = betCol; ctx.textAlign = 'center';
    if (prog < 1) ctx.fillText('YOUR BET: ' + betLbl + ' — waiting for close...', cx, btnsTop + 30);

    if (b.resultStartT !== null) {
      const elapsed = introFlow.t - b.resultStartT;
      const correct = b.choice === card.finalColor;
      const rFade   = Math.min(1, elapsed * 3);
      ctx.globalAlpha = rFade;

      ctx.fillStyle = correct ? '#16c784' : '#ea3943';
      ctx.font = 'bold 26px ' + F; ctx.textAlign = 'center';
      ctx.fillText(correct ? '✅ YOU CALLED IT!' : '❌ WRONG CALL', cx, btnsTop + 68);

      const expl = correct
        ? 'Perfect! The candle closed ' + card.finalColor.toUpperCase() + '. You\'re reading price!'
        : 'It closed ' + card.finalColor.toUpperCase() + '. Watch the body forming next time!';
      ctx.font = '13px ' + F; ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(expl, cx, btnsTop + 92);

      if (elapsed > 2.0) {
        const isLast  = b.round >= b.cards.length - 1;
        const btnText = isLast ? '⚔ FACE THE BOSS →' : 'NEXT ROUND →';
        const pulse2  = 0.75 + 0.25 * Math.sin(elapsed * 5);
        ctx.globalAlpha = rFade * pulse2;
        ctx.fillStyle = '#7c4dff';
        rr(cx - 120, H - 72, 240, 52, 12); ctx.fill();
        ctx.font = 'bold 16px ' + F; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.fillText(btnText, cx, H - 38);
      }
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

/* ---------- Main loop ---------- */
let lastTime = performance.now();
let camY = 0; // vertical camera offset (negative = looking up)

function frame(now) {
  // Clamp dt so a backgrounded tab doesn't cause a huge physics step
  const dt = Math.min((now - lastTime) / 1000, 1 / 30);
  lastTime = now;

  // Greeting card: render before game starts, auto-advance after 3s
  if (candleAcademy.active) {
    candleAcademy.t += dt;
    candleAcademy.tapFade = Math.max(0, candleAcademy.tapFade - dt * 4);
    if (candleAcademy.t >= 3.0) candleAcademy.active = false; // auto-advance
    else { drawCandleAcademy(); requestAnimationFrame(frame); return; }
  }

  if (!paused && !lessonOpen && !htfZoomState) { // HTF zoom also freezes the world
    update(dt);
    // Banner stays until player taps TRADE or SKIP — no auto-expiry
  }
  // Mini Shell physics in HTF zoom overlay (gravity only, simple bounce on candle tops)
  if (htfZoomState && !htfZoomState.miniOnGround) {
    htfZoomState.miniVy += 900 * dt;
    htfZoomState.miniY = (htfZoomState.miniY || 0) + htfZoomState.miniVy * dt;
    if (htfZoomState.miniY >= 0) { htfZoomState.miniY = 0; htfZoomState.miniVy = 0; htfZoomState.miniOnGround = true; }
  }

  // Live close-trade button: current P&L in R-multiple and SHELLS,
  // so the player constantly weighs "take it" vs "hold it"
  if (trade) {
    const pnl = trade.riskAmt * (trade.leverage || 1) * tradeR();
    closeBtnEl.style.display = 'block';
    closeBtnEl.className = pnl >= 0 ? 'pos' : 'neg';
    closeBtnEl.textContent = 'CLOSE POSITION  ' +
                             (pnl >= 0 ? '+' : '−') + fmt(Math.abs(pnl)) + ' SHELLS';
  }

  // UI effect timers run even while paused so animations stay alive
  flashT = Math.max(0, flashT - dt);
  shakeT = Math.max(0, shakeT - dt);
  if (inspectT > 0 && (inspectT -= dt) <= 0) hideInspector();
  pumpLessons(dt);
  // Animate intermission screen (Bull/Bear bob)
  if (session.inModal && $('intermission') && $('intermission').style.display !== 'none') {
    im.t += dt;
    if (im.phase === 'recap') drawIntermission();
  }
  for (let i = rings.length - 1; i >= 0; i--) {
    if ((rings[i].t -= dt) <= 0) rings.splice(i, 1);
  }
  for (const f of floaters) { f.t -= dt; f.y -= 20 * dt; }
  for (let i = floaters.length - 1; i >= 0; i--) {
    if (floaters[i].t <= 0) floaters.splice(i, 1);
  }

  // Horizontal camera: once the turtle passes the anchor point, the world
  // scrolls left while he stays put on screen — infinite scrolling.
  const cameraX = Math.max(0, turtle.x - W * CFG.cameraAnchor);
  maintainCandles(cameraX);

  // Vertical camera: if the turtle would leave the top of the screen
  // (jetpack!), pan up to keep him in view; ease back down to the
  // default framing (camY = 0) when he returns. Never pans below 0,
  // so normal walking keeps the baseline in the lower third.
  const topBand = H * 0.22; // keep the turtle below this screen line
  const targetY = Math.min(0, turtle.y - topBand);
  camY += (targetY - camY) * Math.min(1, dt * 8);

  render(cameraX);

  // Intro checkpoint overlays (drawn on top of the frozen game canvas)
  if (introFlow.active && introFlow.phase === 'quiz') {
    introFlow.t += dt;
    drawFlashQuiz();
  } else if (introFlow.active && introFlow.phase === 'bet') {
    introFlow.t += dt;
    drawPredictionBet();
  }

  requestAnimationFrame(frame);
}

/* ---------- Go ---------- */
initCandles();
prePopulateHTF(MARKET_DATA); // seed HTF history so panels show data right away
spawnTurtle();
// teach('controls') and teach('goal') fire after Candle Academy completes
requestAnimationFrame(frame);
</script>
