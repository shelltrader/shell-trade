        const MY4 = v => mY4+mH4*(1-(v-lo4)/rng4);
        const cw4=Math.max(2,(mW4-2)/snap4.length-0.5);
        snap4.forEach((c,si)=>{
          const sx4=mX4+si*(cw4+0.5), col4=c.color==='green'?'#16c784':'#ea3943';
          const bT4=MY4(Math.max(c.open,c.h)), bB4=MY4(Math.min(c.open,c.h)), bH4=Math.max(1,bB4-bT4);
          if(c.wick>0.5){ictx.strokeStyle=col4;ictx.lineWidth=0.7;ictx.beginPath();ictx.moveTo(sx4+cw4/2,bT4);ictx.lineTo(sx4+cw4/2,MY4(Math.max(c.open,c.h)+c.wick));ictx.stroke();}
          ictx.fillStyle=col4; ictx.fillRect(sx4,bT4,cw4,bH4);
        });
        if (t.entryH!==undefined){const eY4=MY4(t.entryH);if(eY4>=mY4&&eY4<=mY4+mH4){ictx.strokeStyle='#ffd60a';ictx.lineWidth=0.8;ictx.setLineDash([2,2]);ictx.beginPath();ictx.moveTo(mX4,eY4);ictx.lineTo(mX4+mW4,eY4);ictx.stroke();ictx.setLineDash([]);}}
      }
      // Expand hint on card
      ictx.font = '6.5px ' + SANS2; ictx.fillStyle = '#2e3e52'; ictx.textAlign = 'right';
      ictx.fillText('⤢', cx4 + cardW4 - 3, cy4 + cardH4 - 3);
      // Tap rect
      im.answerRects.push({ x: cx4, y: cy4, w: cardW4, h: cardH4, i: tlog.length - maxShow + ti, type: 'trade' });
    });
  }

  // ── QUIZ (dynamic Y) ──────────────────────────────────────────────────────
  const qZ = quizTop;
  const quiz = im.quiz || [];
  const answered = im.quizAnswers || [];
  const qNum = im.quizQ || 0;
  const allDone = answered.length >= quiz.length && quiz.length > 0;

  ictx.font = 'bold 10px ' + SANS2; ictx.fillStyle = '#ffd60a'; ictx.textAlign = 'center';
  ictx.fillText('📝 QUICK QUIZ', IW / 2, qZ + 12);

  const dotY = qZ + 24;
  quiz.forEach((_, qi) => {
    const dotX = IW / 2 + (qi - (quiz.length - 1) / 2) * 17;
    const done = answered.length > qi, right = done && answered[qi] === quiz[qi].correct;
    ictx.beginPath(); ictx.arc(dotX, dotY, 4, 0, Math.PI * 2);
    ictx.fillStyle = done ? (right ? '#16c784' : '#ea3943') : (qi === qNum ? '#ffd60a' : '#1e2d40');
    ictx.fill();
  });

  if (!allDone && qNum < quiz.length) {
    const q = quiz[qNum];
    const alreadyAnswered = answered.length > qNum;
    // Question text
    const qText = 'Q' + (qNum+1) + ': ' + q.q;
    ictx.font = 'bold 11px ' + SANS2; ictx.fillStyle = '#e6edf3'; ictx.textAlign = 'center';
    const maxWQ = IW * 0.88;
    const wordsQ = qText.split(' '); let lineQ = '', qLinesQ = [];
    for (const w of wordsQ) {
      const t2 = lineQ + (lineQ ? ' ' : '') + w;
      if (ictx.measureText(t2).width > maxWQ && lineQ) { qLinesQ.push(lineQ); lineQ = w; } else lineQ = t2;
    }
    qLinesQ.push(lineQ);
    const qTextYQ = dotY + 15;
    qLinesQ.forEach((ln, li) => ictx.fillText(ln, IW/2, qTextYQ + li * 15));

    // 2×2 grid — SMALLER boxes (aH = 26)
    const gridTopQ = qTextYQ + qLinesQ.length * 15 + 4;
    const aWQ = (IW - 28 - 8) / 2, aHQ = 26, aGapQ = 5;
    q.answers.forEach((ans, ai) => {
      const colQ = Math.floor(ai / 2), rowQ = ai % 2;
      const axQ = 12 + colQ*(aWQ+8), ayQ = gridTopQ + rowQ*(aHQ+aGapQ);
      let fillCQ='rgba(20,30,50,0.9)', strokeCQ='#243450', textCQ='#c9d1d9';
      if (alreadyAnswered) {
        if (ai===q.correct) { fillCQ='rgba(22,199,132,0.18)'; strokeCQ='#16c784'; textCQ='#3ddc6a'; }
        else if (ai===answered[qNum]) { fillCQ='rgba(234,57,67,0.14)'; strokeCQ='#ea3943'; textCQ='#f3838a'; }
        else { fillCQ='rgba(12,18,32,0.5)'; strokeCQ='#1a2840'; textCQ='#3a4a5c'; }
      }
      ictx.fillStyle=fillCQ; irr(axQ,ayQ,aWQ,aHQ,5); ictx.fill();
      ictx.strokeStyle=strokeCQ; ictx.lineWidth=1.2; irr(axQ,ayQ,aWQ,aHQ,5); ictx.stroke();
      ictx.font='10px '+SANS2; ictx.fillStyle=textCQ; ictx.textAlign='center';
      const ansMaxWQ=aWQ-10;
      const aWordsQ=ans.split(' '); let aLineQ='', aLinesQ=[];
      for (const aw of aWordsQ){const t3=aLineQ+(aLineQ?' ':'')+aw;if(ictx.measureText(t3).width>ansMaxWQ&&aLineQ){aLinesQ.push(aLineQ);aLineQ=aw;}else aLineQ=t3;}
      aLinesQ.push(aLineQ);
      const aTextYQ=ayQ+(aHQ-(aLinesQ.length-1)*11)/2+4;
      aLinesQ.forEach((al,ali)=>ictx.fillText(al,axQ+aWQ/2,aTextYQ+ali*11));
      if (!alreadyAnswered) im.answerRects.push({x:axQ,y:ayQ,w:aWQ,h:aHQ,i:ai,type:'answer'});
    });

    if (alreadyAnswered) {
      const fbYQ = gridTopQ + 2*(aHQ+aGapQ) + 7;
      const wasRightQ = answered[qNum]===q.correct;
      ictx.font='bold 11px '+SANS2; ictx.fillStyle=wasRightQ?'#16c784':'#ea3943'; ictx.textAlign='center';
      ictx.fillText(wasRightQ?'✓ Correct!':'✗ Not quite — see above', IW/2, fbYQ);
      const btnLabelQ = qNum>=quiz.length-1?'SEE RESULTS →':'NEXT QUESTION →';
      const btnYQ=fbYQ+13, btnWQ=165, btnHQ=27, btnXQ=IW/2-btnWQ/2;
      ictx.fillStyle='rgba(255,214,10,0.13)'; irr(btnXQ,btnYQ,btnWQ,btnHQ,6); ictx.fill();
      ictx.strokeStyle='#ffd60a'; ictx.lineWidth=1.2; irr(btnXQ,btnYQ,btnWQ,btnHQ,6); ictx.stroke();
      ictx.font='bold 10px '+SANS2; ictx.fillStyle='#ffd60a';
      ictx.fillText(btnLabelQ,IW/2,btnYQ+18);
      im.answerRects.push({x:btnXQ,y:btnYQ,w:btnWQ,h:btnHQ,type:'next'});
    }

  } else if (allDone) {
    const correct3 = answered.filter((a,i)=>a===quiz[i].correct).length;
    const scoreYQ = dotY + 18;
    ictx.font='bold 20px '+SANS2; ictx.textAlign='center';
    ictx.fillStyle=correct3===quiz.length?'#ffd60a':correct3>0?'#4cc3ff':'#7d8aa0';
    ictx.fillText(correct3+' / '+quiz.length+' correct', IW/2, scoreYQ);
    const msgs3=['Keep studying!','Good effort!','Nice work!'];
    ictx.font='11px '+SANS2; ictx.fillStyle='#7d8aa0';
    ictx.fillText(correct3===quiz.length?'🏆 Perfect! +150 🐚 bonus':msgs3[correct3]||msgs3[0], IW/2, scoreYQ+17);
    if (correct3===quiz.length&&!im._bonusGiven) {
      im._bonusGiven=true; addXP(100); player.shells+=150;
      floaters.push({text:'🏆 PERFECT QUIZ! +100 XP +150 🐚',color:'#ffd60a',y:80,t:3});
    }
    let sumY3=scoreYQ+36;
    quiz.forEach((q,qi)=>{
      const right3=answered[qi]===q.correct;
      ictx.font='9.5px '+SANS2; ictx.fillStyle=right3?'#16c784':'#ea3943'; ictx.textAlign='left';
      // Word-wrap question text
      const fullQ=(right3?'✓ ':'✗ ')+q.q;
      const maxQW=IW-30;
      let wLine='';
      fullQ.split(' ').forEach(word=>{
        const test=wLine?wLine+' '+word:word;
        if(ictx.measureText(test).width>maxQW&&wLine){
          ictx.fillText(wLine,18,sumY3); sumY3+=13; wLine=word;
        } else { wLine=test; }
      });
      if(wLine){ictx.fillText(wLine,18,sumY3); sumY3+=13;}
      if(!right3){ictx.fillStyle='#3ddc6a'; ictx.fillText('→ '+q.answers[q.correct],18,sumY3); sumY3+=14;}
      sumY3+=6;
    });
    // NEXT / RETRY button
    const btnY6=IH-50, btnW6=200, btnH6=36, btnX6=IW/2-btnW6/2;
    const btnCol6=cleared?'#16c784':'#ea3943';
    ictx.fillStyle=btnCol6+'22'; irr(btnX6,btnY6,btnW6,btnH6,8); ictx.fill();
    ictx.strokeStyle=btnCol6; ictx.lineWidth=2; irr(btnX6,btnY6,btnW6,btnH6,8); ictx.stroke();
    ictx.font='bold 13px '+SANS2; ictx.fillStyle=btnCol6; ictx.textAlign='center';
    ictx.fillText(cleared?'NEXT HOUR →':'RETRY HOUR', IW/2, btnY6+23);
    im.answerRects.push({x:btnX6,y:btnY6,w:btnW6,h:btnH6,type:'finish'});
  }

  ictx.textAlign='left';
}

function startMiniGame() {
  im.phase = 'minigame';
  $('imGuessQ').textContent = 'Where does this chart go next?';
  $('imGuess').style.display = 'block';
  drawIntermission();
}

function submitGuess(guess) {
  const correct = guess === im.quizAnswer;
  im.quizResult = correct;
  im.phase = 'done';
  $('imGuess').style.display = 'none';
  $('imResult').style.display = 'block';
  const cleared = im.cleared;
  $('imResultText').innerHTML = correct
    ? '<span style="color:#16c784;font-size:18px">✓ CORRECT! ' + (im.quizAnswer === 'bull' ? '📈' : '📉') + '</span><br><span style="color:#7d8aa0;font-size:11px">The next candle was ' + (im.quizAnswer === 'bull' ? 'BULLISH — price went UP' : 'BEARISH — price went DOWN') + '</span>'
    : '<span style="color:#ea3943;font-size:18px">✗ NOT QUITE...</span><br><span style="color:#7d8aa0;font-size:11px">The next candle was actually ' + (im.quizAnswer === 'bull' ? 'BULLISH 📈' : 'BEARISH 📉') + ' — even pros miss these!</span>';
  $('imNext').textContent = cleared ? 'NEXT HOUR →' : 'RETRY HOUR';
  // Bonus XP for correct guess
  if (correct) {
    addXP(25);
    floaters.push({ text: '+25 XP BONUS!', color: '#ffd60a', y: 64, t: 2 });
  }
}

function closeIntermission(proceed) {
  $('intermission').style.display = 'none';
  $('imGuess').style.display = 'none';
  $('imResult').style.display = 'none';
  paused = false;
  if (proceed && session.cleared) {
    session.level++;
    session.startBal = player.shells;
    addXP(60);
  } else if (proceed && !session.cleared) {
    player.shells = session.startBal;
  }
  vwapNum = vwapDen = 0;
  prePopulateHTF(MARKET_DATA);
  session.candles = 0;
  session.lessonsThisHour = 0;
  session.trades = session.wins = session.net = 0;
  session.tradeLog = [];
  session.inModal = false;
  coins.splice(0); // clear coins for the new hour
  combo.count = 0; combo.t = 0;
  nextSetupIn();
}

const $ = (id) => document.getElementById(id);
const bannerEl = $('setupBanner'), panelEl = $('tradePanel');

let setupZone = null; // {from,to: candle ids, dir} — the highlighted reason
let lastSetupIdx = -1;          // candle index when the last panel was opened (for full-screen expand)
let setupBannerMaxCandleId = -1; // maxSeenCandleId at banner time (exploit guard)

function showBanner(type) {
  if (introFlow && introFlow.active) return; // no setups during intro
  teach('setup'); teach('htf'); teach('vwap');
  bannerT = 1; // flag only — never auto-expires, player must tap TRADE or SKIP
  setupBannerMaxCandleId = maxSeenCandleId; // snapshot — if player peeks ahead, trade is blocked
  const q = setupZone && setupZone.quality;
  const qc = { A: '#16c784', B: '#ffd60a', C: '#7d8aa0' };
  const typeLabel = type || (setupZone && setupZone.type === 'vwap_bounce' ? 'VWAP BOUNCE'
                           : setupZone && setupZone.type === 'trend_break' ? 'TREND BREAK' : 'SETUP');
  bannerEl.innerHTML = q
    ? '&#9889; ' + typeLabel + ' &mdash; GRADE <span style="color:' + qc[q] + '">' + q + '</span> &mdash; TAP TO TRADE'
    : '&#9889; ' + typeLabel + ' &mdash; TAP TO TRADE';
  bannerEl.style.borderColor = q ? qc[q] : '#7c4dff';
  bannerEl.style.display = 'flex';
  turtle.halt = true; // Shell stops at the setup: take your time, read it
}
function hideBanner() {
  bannerT = 0;
  bannerEl.style.display = 'none';
  turtle.halt = false;
  if (!pending && !trade) setupZone = null; // declined/expired — clear it
}
function nextSetupIn() {
  // Level 1: shorter cooldown so beginners get 3-4 setups per hour, not just 1.
  // Each subsequent level keeps the same cadence — setups stay plentiful.
  const base   = session.level === 1 ? 10 : session.level <= 2 ? 12 : 8;
  const spread = session.level === 1 ?  5 : session.level <= 2 ?  5 : 4;
  setupCountdown = base + Math.floor(Math.random() * spread);
}

// Snapshot nearby structure and open the panel (pauses the game)
function openPanel() {
  const cx = turtle.x + turtle.w / 2;
  const idx = candles.findIndex(c => cx >= c.x && cx < c.x + c.w);
  if (idx < 0) { hideBanner(); nextSetupIn(); return; }

  // ── Exploit guard: did the player walk ahead to peek at future candles? ──
  // Allow at most 2 candles of lookahead from the setup candle.
  if (setupBannerMaxCandleId >= 0 && maxSeenCandleId > setupBannerMaxCandleId + 2) {
    hideBanner(); nextSetupIn();
    floaters.push({ text: '⏱ TOO LATE — SETUP EXPIRED', color: '#f3838a', y: 120, t: 2.5 });
    return;
  }

  lastSetupIdx = idx; // store for full-screen chart expand
  const recent = candles.slice(Math.max(0, idx - 10), idx + 1);
  // ATR-style volatility: average candle-to-candle move, used to size
  // the stop so ordinary noise can't tag it
  let atr = 0, maxMove = 0;
  for (let i = 1; i < recent.length; i++) {
    const m = Math.abs(recent[i].h - recent[i-1].h);
    atr += m;
    maxMove = Math.max(maxMove, m, recent[i].wick); // wicks sweep stops too
  }
  atr = Math.max(8, atr / Math.max(1, recent.length - 1));
  pending = {
    entry: candles[idx].h,                       // current price (as height)
    entryPrice: candles[idx].price,              // current price (in dollars)
    hi: Math.max(...recent.map(c => c.h)),       // nearby resistance
    lo: Math.min(...recent.map(c => c.h)),       // nearby support
    atr, maxMove,
    // Default direction = trade WITH the structure break
    dir: setupZone ? setupZone.dir : 'long',
  };
  // Mini infographic: the ACTUAL candles of this setup, annotated
  $('tpChart').innerHTML = setupChartSVG(idx);
  hideBanner(); // after pending is set, so the setup zone survives
  // Stop/target sliders: sensible ranges scaled by volatility
  const sl = $('slSlider'), tp = $('tpSlider');
  sl.min = String(Math.round(Math.max(14, atr)));        // too-tight stops not allowed
  sl.max = String(Math.round(6 * atr + 120));
  tp.min = String(Math.round(Math.max(14, atr)));
  tp.max = String(Math.round(9 * atr + 180));
  applyRecommended();    // seed sliders with the structure-based levels
  setAmountFromSlider(); // seed the amount field from the slider %
  // Leverage row: show only if player has unlocked leverage
  const levRow = $('leverageRow');
  const levBtns = $('leverageBtns');
  if (leverage.unlocked > 1) {
    levRow.style.display = 'flex';
    levBtns.innerHTML = '';
    leverage.tiers.filter(t => t.mult <= leverage.unlocked).forEach(t => {
      const btn = document.createElement('button');
      btn.textContent = t.mult + '×';
      btn.style.cssText = 'padding:6px 10px;font:bold 12px var(--font-ui);border-radius:5px;cursor:pointer;border:1px solid ' +
        (leverage.current === t.mult ? '#ff9f43' : '#2a3442') + ';background:' +
        (leverage.current === t.mult ? 'rgba(255,159,67,0.18)' : 'transparent') + ';color:' +
        (leverage.current === t.mult ? '#ff9f43' : '#7d8aa0') + ';';
      btn.onclick = () => {
        leverage.current = t.mult;
        // Rebuild buttons to refresh highlight
        levBtns.querySelectorAll('button').forEach((b, bi) => {
          const bt = leverage.tiers.filter(tt => tt.mult <= leverage.unlocked)[bi];
          if (bt) {
            b.style.borderColor = leverage.current === bt.mult ? '#ff9f43' : '#2a3442';
            b.style.background  = leverage.current === bt.mult ? 'rgba(255,159,67,0.18)' : 'transparent';
            b.style.color       = leverage.current === bt.mult ? '#ff9f43' : '#7d8aa0';
          }
        });
      };
      levBtns.appendChild(btn);
    });
  } else {
    levRow.style.display = 'none';
  }
  // Similar-trades hint: surface how the player has done on this setup before
  updateTradeHistoryHint(setupZone ? (setupZone.type || 'bos') : 'bos');
  paused = true;         // popup = the game world freezes underneath
  panelEl.classList.add('open');
  $('backdrop').classList.add('open');
}

/* Mini chart for the trade ticket: the last ~9 REAL candles, drawn as
   they appear on the level, with the order block boxed in purple, the
   BOS candle marked, and the broken structure level dashed. The player
   sees the exact picture that made this a setup. */
function setupChartSVG(endIdx) {
  const from = Math.max(0, endIdx - 8);
  const cs = candles.slice(from, endIdx + 1);
  if (!cs.length) return '';
  let lo = Infinity, hi = -Infinity;
  for (const c of cs) { lo = Math.min(lo, Math.min(c.open, c.h)); hi = Math.max(hi, Math.max(c.open, c.h)); }
  const bRng = Math.max(1, hi - lo);
  for (const c of cs) {
    lo = Math.min(lo, Math.min(c.open, c.h) - Math.min(c.wick2 || 0, bRng * 0.4 + 1));
    hi = Math.max(hi, Math.max(c.open, c.h) + Math.min(c.wick  || 0, bRng * 0.4 + 1));
  }
  const VW = 280, VH = 122, chartH = 96, pad = 12;
  const Y = (lvl) => pad + (1 - (lvl - lo) / Math.max(1, hi - lo)) * (chartH - 2 * pad);
  const xw = VW / cs.length;
  let s = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg">';

  // The structure level that broke: highest high BEFORE the BOS candle
  const bosIdx = cs.findIndex(c => c.bos);
  if (bosIdx > 0) {
    const isLong = cs[bosIdx].color === 'green';
    let lvl = isLong ? -Infinity : Infinity;
    for (let i = 0; i < bosIdx; i++) {
      const ext = isLong ? Math.max(cs[i].open, cs[i].h) + cs[i].wick
                         : Math.min(cs[i].open, cs[i].h) - cs[i].wick2;
      lvl = isLong ? Math.max(lvl, ext) : Math.min(lvl, ext);
    }
    s += '<line x1="2" y1="' + Y(lvl) + '" x2="' + (VW - 2) + '" y2="' + Y(lvl) +
         '" stroke="#7d8aa0" stroke-width="1" stroke-dasharray="5 4"/>';
    s += '<text x="4" y="' + (Y(lvl) + (isLong ? -4 : 11)) +
         '" fill="#7d8aa0" font-size="8" font-family="monospace">structure ' +
         (isLong ? 'high' : 'low') + ' — broken</text>';
  }

  for (let i = 0; i < cs.length; i++) {
    const c = cs[i];
    const bx = i * xw + 3, bw2 = xw - 6;
    const yO = Y(c.open), yC = Y(c.h);
    const top = Math.min(yO, yC), bh = Math.max(3, Math.abs(yO - yC));
    const col = c.color === 'green' ? '#16c784' : '#ea3943';
    const cxm = bx + bw2 / 2;
    if (c.wick > 1)  s += '<line x1="' + cxm + '" y1="' + top + '" x2="' + cxm + '" y2="' + Y(Math.max(c.open, c.h) + c.wick) + '" stroke="' + (c.sweep ? '#ff7a45' : '#8b98a8') + '" stroke-width="1.5"/>';
    if (c.wick2 > 1) s += '<line x1="' + cxm + '" y1="' + (top + bh) + '" x2="' + cxm + '" y2="' + Y(Math.min(c.open, c.h) - c.wick2) + '" stroke="#8b98a8" stroke-width="1.5"/>';
    s += '<rect x="' + bx + '" y="' + top + '" width="' + bw2 + '" height="' + bh + '" fill="' + col + '"/>';
    if (c.ob) {
      s += '<rect x="' + (bx - 2) + '" y="' + (top - 3) + '" width="' + (bw2 + 4) + '" height="' + (bh + 6) +
           '" fill="rgba(168,85,247,0.22)" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3 2"/>';
      // Bold label above the ORDER BLOCK candle with downward pointer
      s += '<text x="' + cxm + '" y="' + Math.max(10, top - 5) + '" fill="#d8b4fe" font-size="7.5" font-weight="bold" font-family="monospace" text-anchor="middle">▼ ORDER BLOCK</text>';
    }
    if (c.bos) {
      s += '<text x="' + cxm + '" y="' + Math.max(10, top - 5) + '" fill="#c9b3ff" font-size="7.5" font-weight="bold" font-family="monospace" text-anchor="middle">BOS ▲</text>';
    }
  }
  // Entry marker on the last candle
  const lastC = cs[cs.length - 1];
  s += '<text x="' + (VW - 4) + '" y="' + (Y(lastC.h) - 4) +
       '" fill="#7fd6ff" font-size="8" font-family="monospace" text-anchor="end">you are here</text>';

  // ── WHY THIS SETUP strip ──────────────────────────────────────
  const sType = setupZone ? setupZone.type : 'bos';
  const sDir  = setupZone ? setupZone.dir  : 'long';
  const whyTxt = sType === 'vwap_bounce'
    ? 'VWAP BOUNCE — price bounced off the average'
    : sType === 'trend_break'
    ? 'TREND BREAK — key structure level cleared'
    : 'ORDER BLOCK + BOS — smart money setup';
  const contTxt = 'Expected move: price continues ' + (sDir === 'long' ? 'UP ↑' : 'DOWN ↓');
  s += '<line x1="4" y1="100" x2="276" y2="100" stroke="#1c2737" stroke-width="1"/>';
  s += '<text x="140" y="111" fill="#c9b3ff" font-size="8" font-weight="bold"'
     + ' font-family="monospace" text-anchor="middle">' + whyTxt + '</text>';
  s += '<text x="140" y="119" fill="#7d8aa0" font-size="7.5"'
     + ' font-family="monospace" text-anchor="middle">' + contTxt + '</text>';

  s += '</svg>';
  return s;
}

/* ── Full-screen annotated chart ────────────────────────────────────────────
   Called when the player taps the mini chart in the trade panel.
   Generates a full-viewport SVG with:
     • 12 candles at large scale
     • Arrow-labelled ORDER BLOCK and BOS candles (or trend line / VWAP curve)
     • 🐢 Shell emoji at "you are here" instead of text
     • Two definition cards at the bottom explaining key concepts            */
function setupChartSVGFull(endIdx) {
  if (endIdx < 0) endIdx = candles.length - 1;
  const from = Math.max(0, endIdx - 11);
  const cs = candles.slice(from, endIdx + 1);
  if (!cs.length) return '';

  // Pass 1: body prices only — prevents extreme wicks from squashing the chart
  let lo = Infinity, hi = -Infinity;
  for (const c of cs) {
    lo = Math.min(lo, Math.min(c.open, c.h));
    hi = Math.max(hi, Math.max(c.open, c.h));
  }
  const bodyRng = Math.max(1, hi - lo);
  // Pass 2: include wicks, but cap each at 40% of body range so one spike can't dominate
  for (const c of cs) {
    lo = Math.min(lo, Math.min(c.open, c.h) - Math.min(c.wick2 || 0, bodyRng * 0.4 + 2));
    hi = Math.max(hi, Math.max(c.open, c.h) + Math.min(c.wick  || 0, bodyRng * 0.4 + 2));
  }
  const padRng = (hi - lo) * 0.10; lo -= padRng; hi += padRng;
  const range = Math.max(1, hi - lo);

  const VW = 390, VH = 800;
  const chartX = 10, chartW = VW - 20;
  const chartTop = 62, chartBot = 510;
  const chartH = chartBot - chartTop;
  const nC = cs.length;
  const xw = chartW / nC;

  const Y = (lvl) => chartTop + (1 - (lvl - lo) / range) * chartH;

  const sType = setupZone ? (setupZone.type || 'bos') : 'bos';
  const sDir  = setupZone ? setupZone.dir  : 'long';
  const isLong = sDir === 'long';

  const title = sType === 'vwap_bounce' ? 'VWAP BOUNCE SETUP'
              : sType === 'trend_break'  ? 'TREND BREAK SETUP'
              : 'ORDER BLOCK + BOS SETUP';
  const dirColor  = isLong ? '#16c784' : '#ea3943';
  const dirLabel  = isLong ? '⬆  LONG — BET PRICE GOES UP' : '⬇  SHORT — BET PRICE GOES DOWN';
  const dirBg     = isLong ? 'rgba(22,199,132,0.12)' : 'rgba(234,57,67,0.12)';

  let s = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg">';

  // ── Background ────────────────────────────────────────────────────────────
  s += '<rect width="' + VW + '" height="' + VH + '" fill="#080c12"/>';

  // ── Arrow markers ─────────────────────────────────────────────────────────
  s += '<defs>'
    // downward arrow (OB labels pointing down onto candle)
    + '<marker id="f_arrowDn" markerWidth="9" markerHeight="9" refX="4.5" refY="9" orient="auto">'
    + '<path d="M0,0 L4.5,9 L9,0 Z" fill="#d8b4fe"/></marker>'
    // downward arrow cyan (BOS pointing at candle)
    + '<marker id="f_arrowDnC" markerWidth="9" markerHeight="9" refX="4.5" refY="9" orient="auto">'
    + '<path d="M0,0 L4.5,9 L9,0 Z" fill="#4cc3ff"/></marker>'
    + '</defs>';

  // ── Title strip ───────────────────────────────────────────────────────────
  s += '<rect width="' + VW + '" height="58" fill="#0d1420"/>';
  s += '<text x="' + (VW/2) + '" y="22" fill="#4cc3ff" font-size="14" font-weight="bold"'
     + ' font-family="monospace" text-anchor="middle">' + title + '</text>';
  s += '<rect x="' + (VW/2 - 110) + '" y="30" width="220" height="22" rx="5" fill="' + dirBg + '"/>';
  s += '<text x="' + (VW/2) + '" y="45" fill="' + dirColor + '" font-size="12" font-weight="bold"'
     + ' font-family="monospace" text-anchor="middle">' + dirLabel + '</text>';

  // ── Chart area border + grid ──────────────────────────────────────────────
  s += '<rect x="' + chartX + '" y="' + chartTop + '" width="' + chartW + '" height="' + chartH
     + '" fill="rgba(255,255,255,0.018)" stroke="#1c2737" stroke-width="1" rx="4"/>';
  for (let gi = 1; gi <= 3; gi++) {
    const gy = chartTop + (gi/4) * chartH;
    s += '<line x1="' + chartX + '" y1="' + gy + '" x2="' + (chartX+chartW) + '" y2="' + gy
       + '" stroke="#1c2737" stroke-width="0.5" stroke-dasharray="4 4"/>';
  }

  // ── Structure level line (BOS setup) ─────────────────────────────────────
  const bosIdx = cs.findIndex(c => c.bos);
  if (bosIdx > 0) {
    const bosLong = cs[bosIdx].color === 'green';
    let structLvl = bosLong ? -Infinity : Infinity;
    for (let i = 0; i < bosIdx; i++) {
      const ext = bosLong ? Math.max(cs[i].open, cs[i].h) + cs[i].wick
                          : Math.min(cs[i].open, cs[i].h) - cs[i].wick2;
      structLvl = bosLong ? Math.max(structLvl, ext) : Math.min(structLvl, ext);
    }
    const sy = Y(structLvl);
    s += '<line x1="' + chartX + '" y1="' + sy + '" x2="' + (chartX+chartW) + '" y2="' + sy
       + '" stroke="#4cc3ff" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.55"/>';
    s += '<text x="' + (chartX+8) + '" y="' + (sy + (bosLong ? -5 : 14))
       + '" fill="#4cc3ff" font-size="10" font-family="monospace" opacity="0.75">'
       + 'KEY LEVEL — STRUCTURE ' + (bosLong ? 'HIGH' : 'LOW') + '</text>';
  }

  // ── VWAP curve (vwap_bounce) ──────────────────────────────────────────────
  if (sType === 'vwap_bounce') {
    let vp = '';
    for (let i = 0; i < nC; i++) {
      if (!cs[i].vwap) continue;
      const vx = chartX + i * xw + xw / 2;
      const vy = Y(cs[i].vwap);
      vp += (vp ? ' L' : 'M') + vx.toFixed(1) + ',' + vy.toFixed(1);
    }
    if (vp) {
      s += '<path d="' + vp + '" fill="none" stroke="#ff9f43" stroke-width="2.5" opacity="0.75"/>';
      const lastVwap = cs.slice().reverse().find(c => c.vwap);
      if (lastVwap) {
        const lvy = Y(lastVwap.vwap);
        s += '<text x="' + (chartX+chartW-6) + '" y="' + (lvy - 5)
           + '" fill="#ff9f43" font-size="11" font-weight="bold" font-family="monospace"'
           + ' text-anchor="end">VWAP</text>';
      }
    }
  }

  // ── Key swing level (trend_break) — the exact level that was broken ─────
  if (sType === 'trend_break' && nC >= 3) {
    // Mirror the game's exact formula:
    //   swingHigh = max(Math.max(open, close)) of last 7 candles before break — no wicks
    //   swingLow  = min(Math.min(open, close)) of last 7 candles before break — no wicks
    const preBreak = cs.slice(Math.max(0, nC - 8), nC - 1); // up to 7 candles before break
    let keyLvl;
    if (isLong) {
      // Bull break: close exceeded max BODY high of the prior 7 candles
      keyLvl = preBreak.reduce((m, c) => Math.max(m, Math.max(c.open, c.h)), -Infinity);
    } else {
      // Bear break: close fell below min BODY low of the prior 7 candles
      keyLvl = preBreak.reduce((m, c) => Math.min(m, Math.min(c.open, c.h)), Infinity);
    }
    if (isFinite(keyLvl)) {
      const sy = Y(keyLvl);
      // Full-width dashed golden line
      s += '<line x1="' + chartX + '" y1="' + sy + '" x2="' + (chartX + chartW) + '" y2="' + sy
         + '" stroke="#ffd60a" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.95"/>';
      // Pill label — place above or below depending on direction
      const lvlLbl = isLong ? '▲ RESISTANCE — BROKEN!' : '▼ SUPPORT — BROKEN!';
      const pillW = 168, pillH = 19;
      const pillX = chartX + 8;
      const pillY = isLong ? sy + 5 : sy - pillH - 5;
      const pillyY2 = Math.max(chartTop + 4, Math.min(chartBot - pillH - 4, pillY));
      s += '<rect x="' + pillX + '" y="' + pillyY2 + '" width="' + pillW + '" height="' + pillH
         + '" rx="4" fill="rgba(255,214,10,0.22)" stroke="#ffd60a" stroke-width="1.2"/>';
      s += '<text x="' + (pillX + pillW / 2) + '" y="' + (pillyY2 + 13) + '" fill="#ffd60a"'
         + ' font-size="10" font-weight="bold" font-family="monospace" text-anchor="middle">' + lvlLbl + '</text>';
    }
  }

  // ── Candles ───────────────────────────────────────────────────────────────
  for (let i = 0; i < nC; i++) {
    const c  = cs[i];
    const bx = chartX + i * xw + 5;
    const bw2 = xw - 10;
    const yO  = Y(c.open), yC = Y(c.h);
    const top = Math.min(yO, yC);
    const bh  = Math.max(4, Math.abs(yO - yC));
    const col = c.color === 'green' ? '#16c784' : '#ea3943';
    const cxm = bx + bw2 / 2;

    // Wicks
    if (c.wick > 1)
      s += '<line x1="' + cxm + '" y1="' + (top).toFixed(1) + '" x2="' + cxm
         + '" y2="' + Y(Math.max(c.open, c.h) + c.wick).toFixed(1)
         + '" stroke="' + (c.sweep ? '#ff7a45' : '#8b98a8') + '" stroke-width="2.5"/>';
    if (c.wick2 > 1)
      s += '<line x1="' + cxm + '" y1="' + (top + bh).toFixed(1) + '" x2="' + cxm
         + '" y2="' + Y(Math.min(c.open, c.h) - c.wick2).toFixed(1)
         + '" stroke="#8b98a8" stroke-width="2.5"/>';

    // Body
    s += '<rect x="' + bx.toFixed(1) + '" y="' + top.toFixed(1)
       + '" width="' + bw2.toFixed(1) + '" height="' + bh.toFixed(1)
       + '" fill="' + col + '" rx="1"/>';

    // ── ORDER BLOCK highlight + label ─────────────────────────────────────
    if (c.ob) {
      s += '<rect x="' + (bx - 3) + '" y="' + (top - 4) + '" width="' + (bw2 + 6)
         + '" height="' + (bh + 8) + '" fill="rgba(168,85,247,0.25)" stroke="#a855f7"'
         + ' stroke-width="2" stroke-dasharray="4 3" rx="2"/>';
      // Label + downward arrow above the OB candle
      const lblY = Math.max(chartTop + 14, top - 36);
      const arrY1 = lblY + 16, arrY2 = top - 5;
      if (arrY2 > arrY1 + 4)
        s += '<line x1="' + cxm + '" y1="' + arrY1 + '" x2="' + cxm + '" y2="' + arrY2
           + '" stroke="#d8b4fe" stroke-width="1.5" marker-end="url(#f_arrowDn)"/>';
      s += '<rect x="' + (cxm - 50) + '" y="' + (lblY - 13) + '" width="100" height="17"'
         + ' fill="rgba(168,85,247,0.3)" rx="3"/>';
      s += '<text x="' + cxm + '" y="' + lblY + '" fill="#e9d5ff" font-size="10"'
         + ' font-weight="bold" font-family="monospace" text-anchor="middle">① ORDER BLOCK</text>';
    }

    // ── BOS highlight + label ─────────────────────────────────────────────
    if (c.bos) {
      s += '<rect x="' + (bx - 3) + '" y="' + (top - 4) + '" width="' + (bw2 + 6)
         + '" height="' + (bh + 8) + '" fill="rgba(76,195,255,0.18)" stroke="#4cc3ff"'
         + ' stroke-width="2" rx="2"/>';
      // For BOS, label + arrow can go below (there may be room below the candle)
      const belowY = top + bh + 6;
      const lblY2  = Math.min(chartBot - 20, belowY + 30);
      if (lblY2 - belowY > 4)
        s += '<line x1="' + cxm + '" y1="' + belowY + '" x2="' + cxm + '" y2="' + (lblY2 - 16)
           + '" stroke="#4cc3ff" stroke-width="1.5"/>';
      s += '<rect x="' + (cxm - 60) + '" y="' + (lblY2 - 13) + '" width="120" height="17"'
         + ' fill="rgba(76,195,255,0.2)" rx="3"/>';
      s += '<text x="' + cxm + '" y="' + lblY2 + '" fill="#a5f3ff" font-size="10"'
         + ' font-weight="bold" font-family="monospace" text-anchor="middle">② BREAK OF STRUCTURE</text>';
    }

    // ── Trend-break highlight on the break candle ─────────────────────────
    if (sType === 'trend_break' && i === nC - 1) {
      // Circle spans the full wick range of this candle
      const wTop = Y(Math.max(c.open, c.h) + (c.wick || 0));
      const wBot = Y(Math.min(c.open, c.h) - (c.wick2 || 0));
      const cr = Math.max(22, (wBot - wTop) / 2 + 16);
      const cxm2 = bx + bw2 / 2;
      const cym2 = (wTop + wBot) / 2;
      s += '<circle cx="' + cxm2 + '" cy="' + cym2 + '" r="' + cr
         + '" fill="rgba(255,214,10,0.1)" stroke="#ffd60a" stroke-width="2.5"'
         + ' stroke-dasharray="5 3" opacity="0.95"/>';
      // Label below the circle, above chartBot
      const lblY = Math.min(chartBot - 6, cym2 + cr + 16);
      s += '<text x="' + cxm2 + '" y="' + lblY + '" fill="#ffd60a" font-size="10"'
         + ' font-weight="bold" font-family="monospace" text-anchor="middle">BREAK ⚡</text>';
    }
  }

  // ── Mini turtle "you are here" on the last candle ─────────────────────────
  const lastC  = cs[nC - 1];
  const lastBx = chartX + (nC - 1) * xw + 5;
  const lastBw = xw - 10;
  const lastTop = Math.min(Y(lastC.open), Y(lastC.h));
  const turtleY = Math.max(chartTop + 28, lastTop - 22);
  s += '<text x="' + (lastBx + lastBw / 2) + '" y="' + turtleY
     + '" font-size="22" text-anchor="middle" dominant-baseline="auto">🐢</text>';

  // ── Divider ───────────────────────────────────────────────────────────────
  s += '<line x1="10" y1="520" x2="380" y2="520" stroke="#1c2737" stroke-width="1"/>';

  // ── Definition cards — full-width stacked, beginner-friendly ────────────
  const cardDefs2 = sType === 'vwap_bounce' ? [
    { col: '#ff9f43', icon: '〰', hdr: 'WHAT IS VWAP?',
      lines: [
        'VWAP = the average price of ALL trades today.',
        'Think of it like a magnet — price always returns to it.',
        isLong ? '→ Price dipped below VWAP, then snapped back UP.' : '→ Price spiked above VWAP, then got pushed DOWN.',
      ] },
    { col: dirColor, icon: isLong ? '▲' : '▼', hdr: isLong ? 'YOUR TRADE: LONG ▲ (BET IT GOES UP)' : 'YOUR TRADE: SHORT ▼ (BET IT GOES DOWN)',
      lines: [
        isLong ? 'Bulls defended VWAP — buyers are in control.' : 'Bears rejected VWAP — sellers are in control.',
        isLong ? 'Ride the bounce UP. Stop: below VWAP.' : 'Ride the rejection DOWN. Stop: above VWAP.',
        '',
      ] },
  ] : sType === 'trend_break' ? [
    { col: '#ffd60a', icon: '⚡', hdr: 'WHAT JUST HAPPENED? (TREND BREAK)',
      lines: [
        isLong ? 'See the yellow dashed line? That was KEY RESISTANCE.' : 'See the yellow dashed line? That was KEY SUPPORT.',
        isLong ? 'Price was stuck BELOW it — then it BROKE ABOVE it!' : 'Price was held UP by it — then it CRASHED BELOW it!',
        isLong ? '→ Old ceiling is now a floor. Buyers are winning.' : '→ Old floor is now a ceiling. Sellers are winning.',
      ] },
    { col: dirColor, icon: isLong ? '▲' : '▼', hdr: isLong ? 'YOUR TRADE: LONG ▲ (BET IT GOES UP)' : 'YOUR TRADE: SHORT ▼ (BET IT GOES DOWN)',
      lines: [
        isLong ? 'Bet price keeps going UP past the break.' : 'Bet price keeps going DOWN past the break.',
        isLong ? 'Stop Loss: just BELOW the broken yellow line.' : 'Stop Loss: just ABOVE the broken yellow line.',
        '',
      ] },
  ] : [
    { col: '#d8b4fe', icon: '🟣', hdr: '① WHAT IS AN ORDER BLOCK?',
      lines: [
        'Big banks hide huge buy/sell orders inside certain candles.',
        'The PURPLE BOX = that exact candle. Price returns to "fill" it.',
        '→ When price comes back here, the big move begins again.',
      ] },
    { col: '#4cc3ff', icon: '⚡', hdr: '② WHAT IS A BREAK OF STRUCTURE (BOS)?',
      lines: [
        'The CYAN BOX = price just cleared a key high or low.',
        'This CONFIRMS the order block is active and working.',
        isLong ? '→ Trade UP alongside the smart money!' : '→ Trade DOWN alongside the smart money!',
      ] },
  ];

  const cardStartY = 524, cardH2 = 74, cardGap2 = 6, cardW2 = VW - 20;
  cardDefs2.forEach((cd, ci) => {
    const cy2 = cardStartY + ci * (cardH2 + cardGap2);
    // Card background + left accent stripe
    s += '<rect x="10" y="' + cy2 + '" width="' + cardW2 + '" height="' + cardH2
       + '" fill="rgba(255,255,255,0.04)" stroke="' + cd.col + '" stroke-width="0.75" stroke-opacity="0.45" rx="8"/>';
    s += '<rect x="10" y="' + cy2 + '" width="4" height="' + cardH2 + '" fill="' + cd.col + '" rx="2" opacity="0.9"/>';
    // Header
    s += '<text x="22" y="' + (cy2 + 19) + '" fill="' + cd.col + '" font-size="11" font-weight="bold"'
       + ' font-family="monospace">' + cd.icon + '  ' + cd.hdr + '</text>';
    // Body lines
    cd.lines.forEach((ln, li) => {
      if (!ln) return;
      s += '<text x="22" y="' + (cy2 + 36 + li * 16) + '" fill="' + (li === 2 ? cd.col : '#c7d1de') + '"'
         + ' font-size="10" font-family="monospace">' + ln + '</text>';
    });
  });

  // ── Setup quality badge ───────────────────────────────────────────────────
  const qualBadgeY = cardStartY + 2 * (cardH2 + cardGap2) + 6;
  if (setupZone && setupZone.quality) {
    const qc = { A: '#16c784', B: '#ffd60a', C: '#7d8aa0' };
    const qCol = qc[setupZone.quality] || '#7d8aa0';
    const alignTxt = [
      setupZone.vwapAligned  ? '✓ VWAP aligned'  : '✗ VWAP not aligned',
      setupZone.trendAligned ? '✓ Trend aligned' : '✗ Trend not aligned',
    ];
    s += '<rect x="10" y="' + qualBadgeY + '" width="' + (VW - 20) + '" height="42"'
       + ' fill="rgba(255,255,255,0.03)" stroke="#2a3d55" stroke-width="1" rx="8"/>';
    s += '<text x="20" y="' + (qualBadgeY + 17) + '" fill="' + qCol + '" font-size="11" font-weight="bold"'
       + ' font-family="monospace">GRADE ' + setupZone.quality + '</text>';
    s += '<text x="80" y="' + (qualBadgeY + 17) + '" fill="#7d8aa0" font-size="10" font-family="monospace">'
       + alignTxt[0] + '  ·  ' + alignTxt[1] + '</text>';
    const contTxt = 'Likely continues ' + (sDir === 'long' ? 'UP ↑' : 'DOWN ↓') + ' — likely, never guaranteed';
    s += '<text x="20" y="' + (qualBadgeY + 33) + '" fill="#c7d1de" font-size="10" font-family="monospace">' + contTxt + '</text>';
  }

  // ── Close hint ────────────────────────────────────────────────────────────
  s += '<text x="' + (VW/2) + '" y="' + (VH - 12) + '" fill="#2a3d55" font-size="11"'
     + ' font-family="monospace" text-anchor="middle">TAP ANYWHERE TO CLOSE</text>';

  s += '</svg>';
  return s;
}

/* ── Full-screen trade review chart ─────────────────────────────────────────
   Opens when the player taps a card in the Trade History section.
   Shows annotated candles with entry/SL/TP levels, OB/BOS highlights,
   and a plain-English explanation of why it was a setup and what happened. */
function tradeChartSVGFull(t, opts) {
  if (!t || !t.candleSnap || !t.candleSnap.length) return '';
  // Toggle which overlays render (legend on the review screen). Default: all on.
  const O = Object.assign({ vwap: true, structure: true, ob: true, levels: true }, opts || {});
  const cs = t.candleSnap;
  const sType = t.setupType || 'bos';
  const isLong = t.dir === 'long';
  const isWin  = t.result === 'win';
  // Is the structure break a reversal (ChoCh) rather than a continuation (BOS)?
  const isChoch = sType === 'choch' || cs.some(c => c.choch);

  // Pass 1: body prices + SL/TP/entry — must all be visible
  let lo = Infinity, hi = -Infinity;
  for (const c of cs) {
    lo = Math.min(lo, Math.min(c.open, c.h));
    hi = Math.max(hi, Math.max(c.open, c.h));
  }
  if (t.slH    !== undefined) { lo = Math.min(lo, t.slH);    hi = Math.max(hi, t.slH); }
  if (t.tpH    !== undefined) { lo = Math.min(lo, t.tpH);    hi = Math.max(hi, t.tpH); }
  if (t.entryH !== undefined) { lo = Math.min(lo, t.entryH); hi = Math.max(hi, t.entryH); }
  // VWAP is shown on EVERY trade now. Expand the range to fit it, but cap the
  // expansion (≤60% of the current span on each side) so a far-off session VWAP
  // can't squash the candles — if it's beyond, the line rides the chart edge.
  if (O.vwap) {
    const vwVals = cs.map(c => c.vwap).filter(v => v > 0);
    if (vwVals.length) {
      const span = Math.max(1, hi - lo);
      lo = Math.min(lo, Math.max(Math.min(...vwVals), lo - span * 0.6));
      hi = Math.max(hi, Math.min(Math.max(...vwVals), hi + span * 0.6));
    }
  }
  const bodyRng2 = Math.max(1, hi - lo);
  // Pass 2: include wicks, capped at 40% of body range so spikes don't dominate
  for (const c of cs) {
    lo = Math.min(lo, Math.min(c.open, c.h) - Math.min(c.wick2 || 0, bodyRng2 * 0.4 + 2));
    hi = Math.max(hi, Math.max(c.open, c.h) + Math.min(c.wick  || 0, bodyRng2 * 0.4 + 2));
  }
  const pad = (hi - lo) * 0.10;
  lo -= pad; hi += pad;
  const range = Math.max(1, hi - lo);

  const VW = 390, VH = 760;
  const chartX = 10, chartW = VW - 20;
  const chartTop = 68, chartBot = 480;
  const chartH = chartBot - chartTop;
  const nC = cs.length;
  const xw = chartW / nC;
  const Y = lvl => chartTop + (1 - (lvl - lo) / range) * chartH;

  const typeLabel = sType === 'vwap_bounce' ? 'VWAP BOUNCE'
                  : sType === 'trend_break'  ? 'TREND BREAK'
                  : isChoch                  ? 'CHANGE OF CHARACTER'
                  : 'ORDER BLOCK + BOS';
  const resultCol = isWin ? '#16c784' : '#ea3943';
  const dirLabel  = isLong ? '▲ LONG' : '▼ SHORT';
  const dSign     = t.delta > 0 ? '+' : '−';

  let s = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg">';
  s += '<rect width="' + VW + '" height="' + VH + '" fill="#080c12"/>';

  // Defs — arrow markers
  s += '<defs>'
     + '<marker id="tr_arrDn" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><path d="M0,0 L4,8 L8,0 Z" fill="#d8b4fe"/></marker>'
     + '<marker id="tr_arrDnC" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><path d="M0,0 L4,8 L8,0 Z" fill="#4cc3ff"/></marker>'
     + '</defs>';

  // Title bar
  s += '<rect width="' + VW + '" height="60" fill="#0d1420"/>';
  s += '<text x="' + (VW/2) + '" y="19" fill="#4cc3ff" font-size="13" font-weight="bold" font-family="monospace" text-anchor="middle">' + typeLabel + ' — ' + dirLabel + '</text>';
  // Result badge
  s += '<rect x="' + (VW/2 - 70) + '" y="27" width="140" height="25" rx="5" fill="' + resultCol + '22"/>';
  s += '<text x="' + (VW/2) + '" y="44" fill="' + resultCol + '" font-size="13" font-weight="bold" font-family="monospace" text-anchor="middle">'
     + (isWin ? '✓ WIN' : '✗ LOSS') + '  ' + dSign + fmt(Math.abs(t.delta)) + ' 🐚</text>';

  // Chart area
  s += '<rect x="' + chartX + '" y="' + chartTop + '" width="' + chartW + '" height="' + chartH
     + '" fill="rgba(255,255,255,0.015)" stroke="#1c2737" stroke-width="1" rx="4"/>';
  for (let gi = 1; gi <= 3; gi++) {
    const gy = chartTop + (gi/4) * chartH;
    s += '<line x1="' + chartX + '" y1="' + gy + '" x2="' + (chartX+chartW) + '" y2="' + gy
       + '" stroke="#1c2737" stroke-width="0.5" stroke-dasharray="4 4"/>';
  }

  // ── VWAP curve — drawn on EVERY trade review (toggleable). Points are
  //    clamped into the chart so a far-off VWAP rides the edge with its label. ──
  if (O.vwap) {
    const clampY = (v) => Math.max(chartTop + 1, Math.min(chartBot - 1, Y(v)));
    const vwapPts = cs.map((c, i) => c.vwap ? { i, v: c.vwap } : null).filter(Boolean);
    if (vwapPts.length >= 2) {
      let vPath = '';
      vwapPts.forEach(({ i, v }) => {
        const vx = chartX + i * xw + xw / 2;
        const vy = clampY(v);
        vPath += (vPath ? ' L' : 'M') + vx.toFixed(1) + ',' + vy.toFixed(1);
      });
      s += '<path d="' + vPath + '" fill="none" stroke="#ff9f43" stroke-width="2.5" opacity="0.9"/>';
      const last = vwapPts[vwapPts.length - 1];
      const lvx = chartX + last.i * xw + xw / 2;
      const lvy = Math.max(chartTop + 12, Math.min(chartBot - 6, clampY(last.v)));
      s += '<rect x="' + (lvx - 26) + '" y="' + (lvy - 13) + '" width="52" height="15" rx="3" fill="rgba(255,159,67,0.22)" stroke="#ff9f43" stroke-width="0.8"/>';
      s += '<text x="' + lvx + '" y="' + (lvy - 2) + '" fill="#ff9f43" font-size="9" font-weight="bold" font-family="monospace" text-anchor="middle">VWAP</text>';
    }
  }

  // ── SWING LEVEL (trend_break only) ─────────────────────────────────────
  if (O.structure && sType === 'trend_break') {
    // Mirror game logic: swingHigh/Low uses body prices only (no wicks), last 7 candles before break
    const nCs = cs.length;
    const prevCs = cs.slice(Math.max(0, nCs - 8), nCs - 1);
    let swingLevel;
    if (isLong) {
      // Bull break: close exceeded max BODY high of prior candles
      swingLevel = prevCs.reduce((m, c) => Math.max(m, Math.max(c.open, c.h)), -Infinity);
    } else {
      // Bear break: close fell below min BODY low of prior candles
      swingLevel = prevCs.reduce((m, c) => Math.min(m, Math.min(c.open, c.h)), Infinity);
    }
    if (isFinite(swingLevel)) {
      const sy = Y(swingLevel);
      // Yellow dashed swing level line
      s += '<line x1="' + chartX + '" y1="' + sy + '" x2="' + (chartX + chartW) + '" y2="' + sy
         + '" stroke="#ffd60a" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.9"/>';
      // Pill label
      const swingLbl = isLong ? 'SWING HIGH — BROKEN ↑' : 'SWING LOW — BROKEN ↓';
      const pillW = 148, pillH = 16, pillX = chartX + chartW - pillW - 4;
      const pillY = Math.max(chartTop + 4, sy - pillH - 2);
      s += '<rect x="' + pillX + '" y="' + pillY + '" width="' + pillW + '" height="' + pillH
         + '" rx="3" fill="rgba(255,214,10,0.18)" stroke="#ffd60a" stroke-width="0.8"/>';
      s += '<text x="' + (pillX + pillW / 2) + '" y="' + (pillY + 11) + '" fill="#ffd60a"'
         + ' font-size="9" font-weight="bold" font-family="monospace" text-anchor="middle">' + swingLbl + '</text>';
      // Yellow dashed circle on the last candle (the break candle)
      const breakIdx = nC - 1;
      const bc = cs[breakIdx];
      const bcX = chartX + breakIdx * xw + xw / 2;
      const bcYtop = Y(Math.max(bc.open, bc.h) + (bc.wick || 0));
      const bcYbot = Y(Math.min(bc.open, bc.h) - (bc.wick2 || 0));
      const bcCy = (bcYtop + bcYbot) / 2;
      const bcR = Math.max(12, (bcYbot - bcYtop) / 2 + 8);
      s += '<circle cx="' + bcX + '" cy="' + bcCy + '" r="' + bcR
         + '" fill="none" stroke="#ffd60a" stroke-width="2" stroke-dasharray="4 3" opacity="0.85"/>';
    }
  }

  // ── STRUCTURE LEVEL (Order Block + BOS / ChoCh) — the exact level the break
  //    cleared. ChoCh (reversal) is drawn ORANGE; BOS (continuation) BLUE. ──
  if (O.structure && sType !== 'trend_break' && sType !== 'vwap_bounce') {
    const bosI = cs.findIndex(c => c.bos);
    if (bosI > 0) {
      const bull = cs[bosI].color === 'green';
      let lvl = bull ? -Infinity : Infinity;
      for (let i = 0; i < bosI; i++) {
        const ext = bull ? Math.max(cs[i].open, cs[i].h) + (cs[i].wick || 0)
                         : Math.min(cs[i].open, cs[i].h) - (cs[i].wick2 || 0);
        lvl = bull ? Math.max(lvl, ext) : Math.min(lvl, ext);
      }
      if (isFinite(lvl)) {
        const sy = Y(lvl);
        const rayCol = isChoch ? '#ff9f43' : '#4cc3ff';
        s += '<line x1="' + chartX + '" y1="' + sy + '" x2="' + (chartX + chartW) + '" y2="' + sy
           + '" stroke="' + rayCol + '" stroke-width="1.6" stroke-dasharray="7 4" opacity="0.85"/>';
        const lbl = isChoch
          ? (bull ? 'CHANGE OF CHARACTER — FLIP UP ↑' : 'CHANGE OF CHARACTER — FLIP DOWN ↓')
          : (bull ? 'STRUCTURE HIGH — BROKEN ↑' : 'STRUCTURE LOW — BROKEN ↓');
        const pillW = isChoch ? 224 : 184, pillH = 16, pillX = chartX + 4;
        const pillY = Math.max(chartTop + 4, Math.min(chartBot - pillH - 4, bull ? sy + 4 : sy - pillH - 4));
        s += '<rect x="' + pillX + '" y="' + pillY + '" width="' + pillW + '" height="' + pillH
           + '" rx="3" fill="' + (isChoch ? 'rgba(255,159,67,0.18)' : 'rgba(76,195,255,0.18)') + '" stroke="' + rayCol + '" stroke-width="0.8"/>';
        s += '<text x="' + (pillX + pillW / 2) + '" y="' + (pillY + 11) + '" fill="' + rayCol + '"'
           + ' font-size="9" font-weight="bold" font-family="monospace" text-anchor="middle">' + lbl + '</text>';
      }
    }
  }

  // SL / TP / Entry level lines (drawn before candles so they're beneath)
  if (O.levels) [
    { h: t.tpH,    col: '#16c784', lbl: 'TAKE PROFIT' },
    { h: t.entryH, col: '#ffd60a', lbl: 'ENTRY' },
    { h: t.slH,    col: '#ea3943', lbl: 'STOP LOSS' },
  ].forEach(({ h, col, lbl }) => {
    if (h === undefined) return;
    const ly = Y(h);
    if (ly < chartTop - 2 || ly > chartBot + 2) return;
    s += '<line x1="' + chartX + '" y1="' + ly + '" x2="' + (chartX+chartW) + '" y2="' + ly
       + '" stroke="' + col + '" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.65"/>';
    s += '<text x="' + (chartX + 5) + '" y="' + (ly - 3) + '" fill="' + col
       + '" font-size="9" font-weight="bold" font-family="monospace" opacity="0.85">' + lbl + '</text>';
  });

  // Candles
  for (let i = 0; i < nC; i++) {
    const c   = cs[i];
    const bx  = chartX + i * xw + 5, bw2 = xw - 10;
    const yO  = Y(c.open), yC = Y(c.h);
    const top = Math.min(yO, yC), bh = Math.max(3, Math.abs(yO - yC));
    const col = c.color === 'green' ? '#16c784' : '#ea3943';
    const cxm = bx + bw2 / 2;
    if (c.wick  > 1) s += '<line x1="' + cxm + '" y1="' + top + '" x2="' + cxm + '" y2="' + Y(Math.max(c.open,c.h)+c.wick) + '" stroke="#8b98a8" stroke-width="2"/>';
    if (c.wick2 > 1) s += '<line x1="' + cxm + '" y1="' + (top+bh) + '" x2="' + cxm + '" y2="' + Y(Math.min(c.open,c.h)-c.wick2) + '" stroke="#8b98a8" stroke-width="2"/>';
    s += '<rect x="' + bx + '" y="' + top + '" width="' + bw2 + '" height="' + bh + '" fill="' + col + '" rx="1"/>';
    // OB annotation
    if (c.ob && O.ob) {
      s += '<rect x="' + (bx-2) + '" y="' + (top-3) + '" width="' + (bw2+4) + '" height="' + (bh+6)
         + '" fill="rgba(168,85,247,0.22)" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3 2" rx="2"/>';
      const arrowTipOB = top - 5;
      if (arrowTipOB - 24 > chartTop)
        s += '<line x1="' + cxm + '" y1="' + (arrowTipOB-22) + '" x2="' + cxm + '" y2="' + arrowTipOB
           + '" stroke="#d8b4fe" stroke-width="1.5" marker-end="url(#tr_arrDn)"/>';
      s += '<text x="' + cxm + '" y="' + Math.max(chartTop+14, arrowTipOB-26) + '" fill="#d8b4fe" font-size="10" font-weight="bold" font-family="monospace" text-anchor="middle">ORDER BLOCK</text>';
    }
    // BOS / ChoCh annotation — ChoCh (reversal) is orange, BOS (continuation) blue
    if (c.bos && O.structure) {
      const ch = c.choch;
      const bc = ch ? '#ff9f43' : '#4cc3ff';
      s += '<rect x="' + (bx-2) + '" y="' + (top-3) + '" width="' + (bw2+4) + '" height="' + (bh+6)
         + '" fill="' + (ch ? 'rgba(255,159,67,0.16)' : 'rgba(76,195,255,0.15)') + '" stroke="' + bc + '" stroke-width="1.5" rx="2"/>';
      s += '<text x="' + cxm + '" y="' + Math.max(chartTop+14, top-8) + '" fill="' + bc + '" font-size="10" font-weight="bold" font-family="monospace" text-anchor="middle">' + (ch ? 'ChoCh 🔄' : 'BOS ⚡') + '</text>';
    }
    // Turtle on last candle
    if (i === nC - 1) {
      const turtleYt = Math.max(chartTop + 28, top - 22);
      s += '<text x="' + (bx+bw2/2) + '" y="' + turtleYt + '" font-size="20" text-anchor="middle">🐢</text>';
    }
  }

  // Divider
  s += '<line x1="10" y1="490" x2="380" y2="490" stroke="#1c2737" stroke-width="1"/>';

  // ── WHY THIS SETUP? ────────────────────────────────────────────────────────
  const whyLines = sType === 'vwap_bounce' ? [
    { t: 'WHY THIS SETUP?', b: true, c: '#4cc3ff' },
    { t: 'VWAP = average price of all trades today.', c: '#ff9f43' },
    { t: 'Price always returns to VWAP like a magnet.', c: '#c7d1de' },
    { t: isLong ? 'Price bounced UP off VWAP → bulls defending it.' : 'Price got pushed DOWN from VWAP → bears rejecting it.', c: isLong ? '#16c784' : '#ea3943' },
  ] : sType === 'trend_break' ? [
    { t: 'WHY THIS SETUP?', b: true, c: '#4cc3ff' },
    { t: isLong ? 'See the yellow line? That was KEY RESISTANCE.' : 'See the yellow line? That was KEY SUPPORT.', c: '#ffd60a' },
    { t: isLong ? 'Price broke ABOVE it → buyers took over.' : 'Price broke BELOW it → sellers took over.', c: isLong ? '#16c784' : '#ea3943' },
    { t: isLong ? 'Old ceiling = new floor. Ride the UP move.' : 'Old floor = new ceiling. Ride the DOWN move.', c: '#c7d1de' },
  ] : (function () {
    const hasOB  = cs.some(c => c.ob);
    const hasBOS = cs.some(c => c.bos);
    const lines = [{ t: 'WHY THIS SETUP?', b: true, c: '#4cc3ff' }];
    if (hasOB) {
      lines.push({ t: '🟣 ORDER BLOCK — the last ' + (isLong ? 'red' : 'green') + ' candle before the break.', c: '#d8b4fe' });
      lines.push({ t: '   Price often returns here before continuing.', c: '#c7d1de' });
    }
    if (hasBOS && isChoch) {
      lines.push({ t: '🔄 ChoCh — price broke structure the OTHER way.', c: '#ff9f43' });
      lines.push({ t: '   The trend may be FLIPPING — a reversal, not continuation.', c: '#c7d1de' });
    } else if (hasBOS) {
      lines.push({ t: '⚡ BOS — price broke the blue structure ' + (isLong ? 'high' : 'low') + '.', c: '#4cc3ff' });
      lines.push({ t: '   ' + (isLong ? 'A close above it = buyers in control.' : 'A close below it = sellers in control.'), c: '#c7d1de' });
    }
    return lines;
  })();
  let wyY = 507;
  whyLines.forEach(({ t: lt, b, c: lc }) => {
    s += '<text x="14" y="' + wyY + '" fill="' + lc + '" font-size="11" font-family="monospace"'
       + (b ? ' font-weight="bold"' : '') + '>' + lt + '</text>';
    wyY += 18;
  });

  // ── WHAT HAPPENED? — outcome × setup-quality.
  //    The key trading-psychology lesson: outcome ≠ decision quality. A great
  //    setup can still lose (variance); a weak setup can still win (luck). We
  //    teach the player to judge the SETUP, not the result. ──────────────────
  s += '<line x1="10" y1="590" x2="380" y2="590" stroke="#1c2737" stroke-width="1"/>';
  const grade = (t.quality || 'C').toUpperCase();
  const goodSetup = grade === 'A' || grade === 'B';
  const whatLines = [
    { t: 'WHAT HAPPENED?', b: true, c: '#4cc3ff' },
    { t: isWin
        ? (isLong ? '✓ Price went UP and hit your Take Profit.' : '✓ Price went DOWN and hit your Take Profit.')
        : (isLong ? '✗ Price went DOWN and hit your Stop Loss.' : '✗ Price went UP and hit your Stop Loss.'),
      c: isWin ? '#16c784' : '#ea3943' },
  ];
  if (isWin && goodSetup) {
    whatLines.push({ t: 'A Grade ' + grade + ' setup that paid off. This is your edge —', c: '#c7d1de' });
    whatLines.push({ t: 'high-probability setups win MORE often, over time.', c: '#4a5a70' });
  } else if (isWin && !goodSetup) {
    whatLines.push({ t: 'It won — but this was a LOW-probability (Grade ' + grade + ') setup.', c: '#ffd60a' });
    whatLines.push({ t: "Don't let a lucky win teach a bad habit. Judge the setup,", c: '#9aa7b6' });
    whatLines.push({ t: 'not the result. Next time, wait for A-grade confluence.', c: '#4a5a70' });
  } else if (!isWin && goodSetup) {
    whatLines.push({ t: 'This was a Grade ' + grade + ' setup — you did the right thing.', c: '#9fc8e0' });
    whatLines.push({ t: 'Even great setups lose ~1 in 3. This was NOT a mistake —', c: '#9fc8e0' });
    whatLines.push({ t: "the market just didn't follow through. On to the next.", c: '#6a7e94' });
  } else {
    whatLines.push({ t: 'A low-probability (Grade ' + grade + ') setup that didn\'t work out.', c: '#c7d1de' });
    whatLines.push({ t: 'Be patient — wait for A-grade confluence. The stop kept', c: '#9aa7b6' });
    whatLines.push({ t: 'the loss small, exactly as risk management should.', c: '#4a5a70' });
  }
  let whY2 = 607;
  whatLines.forEach(({ t: lt, b, c: lc }) => {
    s += '<text x="14" y="' + whY2 + '" fill="' + lc + '" font-size="11" font-family="monospace"'
       + (b ? ' font-weight="bold"' : '') + '>' + lt + '</text>';
    whY2 += 18;
  });
  // R:R line
  if (t.rr) {
    const riskAmt = t.rr > 0.01 ? Math.abs(t.delta) / t.rr : 0;
    s += '<text x="14" y="' + whY2 + '" fill="#4a5a70" font-size="10" font-family="monospace">R:R = '
       + t.rr.toFixed(1) + ':1  ·  risked ' + fmt(riskAmt) + ' 🐚  ·  '
       + (isWin ? 'won' : 'lost') + ' ' + fmt(Math.abs(t.delta)) + ' 🐚</text>';
  }

  s += '<text x="' + (VW/2) + '" y="' + (VH-10) + '" fill="#242e3e" font-size="11" font-family="monospace" text-anchor="middle">TAP ANYWHERE TO CLOSE</text>';
  s += '</svg>';
  return s;
}

/* ── Trade REPLAY frame: the same chart, revealed candle-by-candle from entry
   to exit, so the player watches the trade play out to its TP or SL. The axis
   is fixed over the whole sequence so nothing rescales while it animates. ── */
function tradeReplaySVG(entry, n) {
  const R = entry.replay;
  if (!R || !R.candles || !R.candles.length) return '';
  const cs = R.candles, total = cs.length, entryIdx = R.entryIdx;
  const nShown = Math.max(1, Math.min(Math.round(n), total));
  const isLong = entry.dir === 'long', isWin = entry.result === 'win';
  const done = nShown >= total;

  // Fixed price range over ALL candles + levels (no mid-replay rescale)
  let lo = Infinity, hi = -Infinity;
  for (const c of cs) { lo = Math.min(lo, Math.min(c.open, c.h)); hi = Math.max(hi, Math.max(c.open, c.h)); }
  [entry.slH, entry.tpH, entry.entryH].forEach(v => { if (v != null) { lo = Math.min(lo, v); hi = Math.max(hi, v); } });
  const bRng = Math.max(1, hi - lo);
  for (const c of cs) {
    lo = Math.min(lo, Math.min(c.open, c.h) - Math.min(c.wick2 || 0, bRng * 0.4 + 2));
    hi = Math.max(hi, Math.max(c.open, c.h) + Math.min(c.wick  || 0, bRng * 0.4 + 2));
  }
  const pad = (hi - lo) * 0.08; lo -= pad; hi += pad; const range = Math.max(1, hi - lo);

  const VW = 390, VH = 560, chartX = 10, chartW = VW - 20, chartTop = 64, chartBot = 522, chartH = chartBot - chartTop;
  const xw = chartW / total;
  const Y = (v) => chartTop + (1 - (v - lo) / range) * chartH;
  const cw = Math.max(2, xw - (xw > 6 ? 4 : 1)), off = xw > 6 ? 2 : 0.5;

  let s = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg">';
  s += '<rect width="' + VW + '" height="' + VH + '" fill="#080c12"/>';
  s += '<rect width="' + VW + '" height="56" fill="#0d1420"/>';
  s += '<text x="' + (VW/2) + '" y="20" fill="#4cc3ff" font-size="13" font-weight="bold" font-family="monospace" text-anchor="middle">▶ TRADE REPLAY — ' + (isLong ? '▲ LONG' : '▼ SHORT') + '</text>';
  let status, statusCol;
  if (!done) { status = 'In the trade… watching price'; statusCol = '#7d8aa0'; }
  else { status = (isWin ? '✓ TAKE PROFIT HIT  ' : '✗ STOPPED OUT  ') + (entry.delta > 0 ? '+' : '−') + fmt(Math.abs(entry.delta)) + ' 🐚'; statusCol = isWin ? '#16c784' : '#ea3943'; }
  s += '<text x="' + (VW/2) + '" y="42" fill="' + statusCol + '" font-size="12" font-weight="bold" font-family="monospace" text-anchor="middle">' + status + '</text>';

  // Chart frame + grid
  s += '<rect x="' + chartX + '" y="' + chartTop + '" width="' + chartW + '" height="' + chartH + '" fill="rgba(255,255,255,0.015)" stroke="#1c2737" rx="4"/>';
  for (let gi = 1; gi <= 3; gi++) { const gy = chartTop + gi/4*chartH; s += '<line x1="' + chartX + '" y1="' + gy + '" x2="' + (chartX+chartW) + '" y2="' + gy + '" stroke="#1c2737" stroke-width="0.5" stroke-dasharray="4 4"/>'; }

  // SL / TP / Entry lines — the plan, always visible
  [['tpH','#16c784','TAKE PROFIT'],['entryH','#ffd60a','ENTRY'],['slH','#ea3943','STOP LOSS']].forEach(function (a) {
    const v = entry[a[0]]; if (v == null) return; const ly = Y(v); if (ly < chartTop || ly > chartBot) return;
    s += '<line x1="' + chartX + '" y1="' + ly + '" x2="' + (chartX+chartW) + '" y2="' + ly + '" stroke="' + a[1] + '" stroke-width="1.1" stroke-dasharray="6 4" opacity="0.6"/>';
    s += '<text x="' + (chartX+4) + '" y="' + (ly-3) + '" fill="' + a[1] + '" font-size="8.5" font-weight="bold" font-family="monospace" opacity="0.85">' + a[2] + '</text>';
  });
  // Entry vertical marker
  const exL = chartX + (entryIdx + 1) * xw;
  s += '<line x1="' + exL + '" y1="' + chartTop + '" x2="' + exL + '" y2="' + chartBot + '" stroke="#ffd60a" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>';

  // VWAP up to the revealed point (clamped into the chart)
  const clampY = (v) => Math.max(chartTop + 1, Math.min(chartBot - 1, Y(v)));
  let vp = '';
  for (let i = 0; i < nShown; i++) { const c = cs[i]; if (!c.vwap) continue; const vx = chartX + i * xw + xw/2; vp += (vp ? ' L' : 'M') + vx.toFixed(1) + ',' + clampY(c.vwap).toFixed(1); }
  if (vp) s += '<path d="' + vp + '" fill="none" stroke="#ff9f43" stroke-width="2" opacity="0.8"/>';

  // Candles (fixed x positions so they never shift as more reveal)
  for (let i = 0; i < nShown; i++) {
    const c = cs[i], bx = chartX + i * xw + off;
    const yO = Y(c.open), yC = Y(c.h), top = Math.min(yO, yC), bh = Math.max(2, Math.abs(yO - yC));
    const col = c.color === 'green' ? '#16c784' : '#ea3943', cxm = bx + cw/2;
    if (c.wick  > 1) s += '<line x1="' + cxm + '" y1="' + top + '" x2="' + cxm + '" y2="' + Y(Math.max(c.open,c.h)+c.wick) + '" stroke="#8b98a8" stroke-width="1.5"/>';
    if (c.wick2 > 1) s += '<line x1="' + cxm + '" y1="' + (top+bh) + '" x2="' + cxm + '" y2="' + Y(Math.min(c.open,c.h)-c.wick2) + '" stroke="#8b98a8" stroke-width="1.5"/>';
    s += '<rect x="' + bx + '" y="' + top + '" width="' + cw + '" height="' + bh + '" fill="' + col + '" rx="1"/>';
    if (i <= entryIdx) {
      if (c.ob) s += '<rect x="' + (bx-2) + '" y="' + (top-3) + '" width="' + (cw+4) + '" height="' + (bh+6) + '" fill="rgba(168,85,247,0.18)" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="3 2" rx="2"/>';
      if (c.bos) { const bc = c.choch ? '#ff9f43' : '#4cc3ff'; s += '<rect x="' + (bx-2) + '" y="' + (top-3) + '" width="' + (cw+4) + '" height="' + (bh+6) + '" fill="' + (c.choch?'rgba(255,159,67,0.14)':'rgba(76,195,255,0.13)') + '" stroke="' + bc + '" stroke-width="1.2" rx="2"/>'; }
    }
  }
  // Turtle on the latest revealed candle
  const li = nShown - 1, lc = cs[li], lcm = chartX + li * xw + off + cw/2;
  const lty = Math.max(chartTop + 18, Math.min(Y(lc.open), Y(lc.h)) - 16);
  s += '<text x="' + lcm + '" y="' + lty + '" font-size="17" text-anchor="middle">🐢</text>';

  // Progress bar (entry → exit)
  const denom = Math.max(1, total - (entryIdx + 1));
  const prog = Math.max(0, Math.min(1, (nShown - (entryIdx + 1)) / denom));
  s += '<rect x="10" y="' + (VH-14) + '" width="' + (VW-20) + '" height="4" rx="2" fill="#1c2737"/>';
  s += '<rect x="10" y="' + (VH-14) + '" width="' + ((VW-20) * prog).toFixed(1) + '" height="4" rx="2" fill="' + (done ? statusCol : '#4cc3ff') + '"/>';
  s += '</svg>';
  return s;
}

// Reset stop/target to the structure + volatility recommendation
function applyRecommended() {
  if (!pending) return;
  const L = calcLevels(pending);
  // Near the world's price band edges the structural target can clamp
  // degenerate — never recommend less than a volatility-sized distance
  const minD = Math.max(14, pending.atr);
  const slDist = Math.max(minD, pending.dir === 'long' ? pending.entry - L.slH : L.slH - pending.entry);
  const tpDist = Math.max(minD * 1.5, pending.dir === 'long' ? L.tpH - pending.entry : pending.entry - L.tpH);
  $('slSlider').value = String(Math.round(slDist));
  $('tpSlider').value = String(Math.round(tpDist));
  refreshPanel();
}

function closePanel() {
  paused = false;
  pending = null;
  panelEl.classList.remove('open');
  $('backdrop').classList.remove('open');
  if (!trade) { nextSetupIn(); setupZone = null; } // declined — clear & cool down
}

/* ---------- Trading Journal UI ---------- */
const SETUP_LABEL = { bos: 'Break of Structure', ob: 'Order Block', vwap: 'VWAP', sweep: 'Liquidity Sweep', vwap_bounce: 'VWAP Bounce', trend_break: 'Trend Break', choch: 'Change of Character' };
// Map a setup type to the most relevant glossary term key (for cross-linking)
const SETUP_TERM = { bos: 'bos', ob: 'ob', vwap: 'vwap', vwap_bounce: 'vwap', sweep: 'sweep', trend_break: 'bos', choch: 'choch' };
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
function jTimeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}
function renderJournalStats() {
  const n = journal.length;
  const wins = journal.filter(e => e.delta > 0).length;
  const net = journal.reduce((a, e) => a + e.delta, 0);
  const winRate = n ? Math.round(wins / n * 100) : 0;
  const winsNet = journal.filter(e => e.delta > 0).reduce((a, e) => a + e.delta, 0);
  const lossNet = journal.filter(e => e.delta < 0).reduce((a, e) => a + e.delta, 0);
  const avgWin = wins ? winsNet / wins : 0;
  const lossCount = journal.filter(e => e.delta < 0).length;
  const avgLoss = lossCount ? Math.abs(lossNet / lossCount) : 0;
  const stat = (k, v, color) =>
    '<div class="jStat"><div class="k">' + k + '</div><div class="v"' +
    (color ? ' style="color:' + color + '"' : '') + '>' + v + '</div></div>';
  return stat('TRADES', n) +
    stat('WIN RATE', winRate + '%', winRate >= 50 ? '#16c784' : '#e6edf3') +
    stat('NET P&amp;L', (net >= 0 ? '+' : '−') + fmt(Math.abs(net)), net >= 0 ? '#16c784' : '#ea3943') +
    stat('AVG WIN', '+' + fmt(avgWin), '#16c784') +
    stat('AVG LOSS', '−' + fmt(avgLoss), '#ea3943');
}
function renderJournalList() {
  if (!journal.length) {
    return '<div id="jEmpty">No trades logged yet.<br>Take a trade on the chart and it will appear here —<br>every entry, with a note you can add.</div>';
  }
  return journal.map(e => {
    const cls = e.delta > 0 ? 'win' : e.delta < 0 ? 'loss' : 'flat';
    const dcls = e.delta > 0 ? 'up' : e.delta < 0 ? 'down' : 'flat';
    const dsign = e.delta > 0 ? '+' : e.delta < 0 ? '−' : '';
    const dirTxt = e.dir === 'long' ? '▲ LONG' : '▼ SHORT';
    const setup = SETUP_LABEL[e.setupType] || (e.setupType || '—');
    return '<div class="jEntry ' + cls + '">' +
      '<div class="jRow1">' +
        '<span class="jDir ' + e.dir + '">' + dirTxt + '</span>' +
        '<span class="jDelta ' + dcls + '">' + dsign + fmt(Math.abs(e.delta)) + ' SHELLS</span>' +
      '</div>' +
      '<div class="jMeta">' +
        '<span class="tag">' + esc(setup) + '</span>' +
        '<span class="tag">Grade ' + esc(e.quality || 'C') + '</span>' +
        'R:R ' + (e.rr ? e.rr.toFixed(1) : '—') + ' · Bal ' + fmt(e.balanceAfter) +
        ' · Hr ' + (e.hour || '?') + ' · ' + jTimeAgo(e.ts) +
      '</div>' +
      ((e.candleSnap && e.candleSnap.length)
        ? '<button class="jView" data-id="' + e.id + '">&#128269; VIEW FULL CHART</button>' : '') +
      '<textarea class="jNote" data-id="' + e.id + '" placeholder="Add a note — why did you take this trade? What did you learn?">' +
        esc(e.note || '') + '</textarea>' +
    '</div>';
  }).join('');
}
// ── Trade review: an animated REPLAY (the "video") + a static DETAILS view
//    with toggle overlays (VWAP / Structure / OB / Levels). ──
let reviewEntry = null;
let reviewMode = 'replay';      // 'replay' | 'details'
let replayTimer = null;
const reviewOpts = { vwap: true, structure: true, ob: true, levels: true };
const LEGEND_ITEMS = [
  { key: 'vwap',      label: 'VWAP',        color: '#ff9f43' },
  { key: 'structure', label: 'STRUCTURE',  color: '#4cc3ff' },
  { key: 'ob',        label: 'ORDER BLOCK', color: '#a855f7' },
  { key: 'levels',    label: 'SL / TP',     color: '#16c784' },
];
function stopReplay() { if (replayTimer) { clearInterval(replayTimer); replayTimer = null; } }
// Top control bar: depends on the mode
function renderReviewBar() {
  const canReplay = !!(reviewEntry && reviewEntry.replay && reviewEntry.replay.candles && reviewEntry.replay.candles.length);
  let html = '';
  if (reviewMode === 'details') {
    html += LEGEND_ITEMS.map(it => {
      const on = reviewOpts[it.key];
      const style = on ? 'border-color:' + it.color + ';color:' + it.color + ';background:' + it.color + '22;'
                       : 'border-color:#2a3d55;color:#4a5666;';
      return '<button data-act="toggle" data-key="' + it.key + '" style="' + style + '">' + (on ? '●' : '○') + ' ' + it.label + '</button>';
    }).join('');
    if (canReplay) html += '<button data-act="replay" style="border-color:#4cc3ff;color:#4cc3ff;">▶ REPLAY</button>';
  } else {
    if (canReplay) html += '<button data-act="replay" style="border-color:#4cc3ff;color:#4cc3ff;">▶ REPLAY</button>';
    html += '<button data-act="details" style="border-color:#7d8aa0;color:#c7d1de;">📊 DETAILS</button>';
  }
  $('cfLegend').innerHTML = html;
}
function renderReviewChart() {
  if (reviewEntry) $('cfChart').innerHTML = tradeChartSVGFull(reviewEntry, reviewOpts);
}
function showReviewDetails() {
  stopReplay();
  reviewMode = 'details';
  renderReviewChart();
  renderReviewBar();
}
function startReplay() {
  if (!reviewEntry || !reviewEntry.replay || !reviewEntry.replay.candles.length) { showReviewDetails(); return; }
  stopReplay();
  reviewMode = 'replay';
  renderReviewBar();
  const total = reviewEntry.replay.candles.length;
  let n = reviewEntry.replay.entryIdx + 1;      // start on the entry screen
  $('cfChart').innerHTML = tradeReplaySVG(reviewEntry, n);
  let firstTick = true;
  replayTimer = setInterval(() => {
    if (firstTick) { firstTick = false; return; }   // brief pause on the entry frame
    if (n >= total) { stopReplay(); return; }
    n++;
    $('cfChart').innerHTML = tradeReplaySVG(reviewEntry, n);
  }, 240);
}
// Open any trade record (journal entry or per-hour log) — auto-plays the replay
function openReviewChart(entry) {
  if (!entry || !entry.candleSnap || !entry.candleSnap.length) return;
  reviewEntry = entry;
  $('cfLegend').classList.add('on');
  $('chartFull').classList.add('open');

// Control-bar interactions (stop taps from closing the chart underneath)

// Trade panel: show the player's past record on this setup type to inform the decision.
function updateTradeHistoryHint(setupType) {
  const el = $('tpHistory');
  if (!el) return;
  const past = journal.filter(e => e.setupType === setupType);
  if (past.length < 2) { el.style.display = 'none'; return; }
  const wins = past.filter(e => e.delta > 0).length;
  const wr = Math.round(wins / past.length * 100);
  const label = SETUP_LABEL[setupType] || setupType;
  const verdict = wr >= 60 ? 'You read these well — trust it.'
                : wr >= 40 ? 'Mixed results — pick your spot.'
                : 'Tough setup for you — be extra selective.';
  el.innerHTML = 'Your record on <b>' + esc(label) + '</b>: <b>' + wins + 'W&ndash;' +
    (past.length - wins) + 'L</b> (' + wr + '%). ' + verdict +
    ' <span style="opacity:.7">Tap Journal to review.</span>';
  el.style.display = 'block';
}

/* ===== Daily Drill + streak =====
   One fresh challenge a day (seeded by the date, so it's the same for everyone
   and stable on reopen): 2 quiz questions + a guess-the-direction. Finishing it
   grows a day streak that multiplies the Shell reward. The single biggest
   retention loop — a reason to open the app every day. */
const DAILY_KEY = 'shellTradeDaily_v1';
let daily = { lastDate: '', streak: 0, best: 0 };
let dailyOpen = false, dailyPrevPaused = false, ddState = null;
function loadDaily() { try { const r = localStorage.getItem(DAILY_KEY); if (r) daily = Object.assign(daily, JSON.parse(r)); } catch (e) {} }
function saveDaily() {
  try { localStorage.setItem(DAILY_KEY, JSON.stringify(daily)); } catch (e) {}
  window.cloudPushStreak && window.cloudPushStreak();
}
loadDaily();
function ddDateStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function ddToday() { return ddDateStr(new Date()); }
function ddYesterday() { const d = new Date(); d.setDate(d.getDate()-1); return ddDateStr(d); }
function ddDoneToday() { return daily.lastDate === ddToday(); }
function ddMultiplier(streak) { return Math.min(3, 1 + 0.25 * Math.max(0, streak - 1)); }
function ddSeed(s) { let h = 2166136261; for (let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
function ddRng(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a>>>15, 1|a); t = t + Math.imul(t ^ t>>>7, 61|t) ^ t; return ((t ^ t>>>14) >>> 0) / 4294967296; }; }
function ddQuizPool() { const out = []; for (const k in QUIZ_QUESTIONS) for (const q of QUIZ_QUESTIONS[k]) out.push(q); return out; }
function ddGuessRound(rnd) {
  const up = rnd() < 0.5; const cs = []; let lvl = 50;
  for (let i = 0; i < 7; i++) { const drift = (up ? 1 : -1) * (2 + rnd() * 5); const o = lvl; lvl = Math.max(10, Math.min(90, lvl + drift + (rnd()-0.5)*3)); cs.push({ open: o, h: lvl, color: lvl >= o ? 'green' : 'red' }); }
  return { type: 'guess', candles: cs, answer: up ? 'up' : 'down' };
}
function ddBuild() {
  const rnd = ddRng(ddSeed(ddToday()));
  const pool = ddQuizPool(); const picks = []; const used = new Set();
  while (picks.length < 2 && used.size < pool.length) { const i = Math.floor(rnd() * pool.length); if (used.has(i)) continue; used.add(i); picks.push(pool[i]); }
  const rounds = picks.map(q => ({ type: 'quiz', q: q.q, answers: q.answers, correct: q.correct }));
  rounds.push(ddGuessRound(rnd));
  return { rounds, idx: 0, correct: 0, answered: false };
}
function ddGuessChartSVG(cs) {
  const VW = 300, VH = 120, pad = 12; let lo = Infinity, hi = -Infinity;
  for (const c of cs) { lo = Math.min(lo, c.open, c.h); hi = Math.max(hi, c.open, c.h); }
  const rng = Math.max(1, hi - lo); const xw = (VW - 2*pad) / (cs.length + 1);
  const Y = (v) => pad + (1 - (v - lo) / rng) * (VH - 2*pad);
  let s = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg">';
  for (let i = 0; i < cs.length; i++) { const c = cs[i], bx = pad + i*xw + xw*0.2, bw = xw*0.6; const yO = Y(c.open), yC = Y(c.h), top = Math.min(yO,yC), bh = Math.max(2, Math.abs(yO-yC)); s += '<rect x="' + bx + '" y="' + top + '" width="' + bw + '" height="' + bh + '" fill="' + (c.color === 'green' ? '#16c784' : '#ea3943') + '" rx="1"/>'; }
  const qx = pad + cs.length*xw + xw*0.2;
  s += '<rect x="' + qx + '" y="' + pad + '" width="' + (xw*0.6) + '" height="' + (VH-2*pad) + '" fill="rgba(76,195,255,0.08)" stroke="#4cc3ff" stroke-dasharray="3 2"/>';
  s += '<text x="' + (qx + xw*0.3) + '" y="' + (VH/2 + 5) + '" fill="#4cc3ff" font-size="16" font-weight="bold" text-anchor="middle" font-family="monospace">?</text>';
  s += '</svg>'; return s;
}
function renderDailyStreakBar() {
  $('ddStreakLbl').innerHTML = '🔥 ' + daily.streak + ' day streak';
  $('ddMultLbl').innerHTML = '×' + ddMultiplier(daily.streak).toFixed(2) + ' Shells';
}
function renderDailyRound() {
  const st = ddState, r = st.rounds[st.idx];
  let html = '<div id="ddProgress">CHALLENGE ' + (st.idx + 1) + ' / ' + st.rounds.length + '</div>';
  if (r.type === 'quiz') {
    html += '<div class="ddQ">' + r.q + '</div>';
    html += r.answers.map((a, i) => '<button class="ddOpt" data-i="' + i + '">' + esc(a) + '</button>').join('');
  } else {
    html += '<div class="ddQ">The trend is moving — where does price go next?</div>';
    html += '<div id="ddChart">' + ddGuessChartSVG(r.candles) + '</div>';
    html += '<div class="ddGuessRow"><button class="ddGuess up" data-g="up">📈 UP</button><button class="ddGuess down" data-g="down">📉 DOWN</button></div>';
  }
  html += '<div id="ddFeedback"></div>';
  $('ddBody').innerHTML = html;
}
function ddReveal(ok, note) {
  ddState.answered = true; if (ok) ddState.correct++;
  $('ddFeedback').innerHTML = '<span style="color:' + (ok ? '#16c784' : '#ea3943') + '">' + (ok ? '✓ Correct!' : '✗ Not quite.') + '</span>' + (note ? ' <span style="color:#7d8aa0;font-weight:normal">' + note + '</span>' : '');
  $('ddBody').insertAdjacentHTML('beforeend', '<button id="ddNext">' + (ddState.idx < ddState.rounds.length - 1 ? 'NEXT →' : 'SEE RESULTS →') + '</button>');
}
function ddAnswerQuiz(i) {
  const r = ddState.rounds[ddState.idx];
  $('ddBody').querySelectorAll('.ddOpt').forEach((o, j) => { if (j === r.correct) o.classList.add('correct'); else if (j === i) o.classList.add('wrong'); else o.classList.add('dim'); });
  ddReveal(i === r.correct, '');
}
function ddAnswerGuess(g) {
  const r = ddState.rounds[ddState.idx];
  $('ddBody').querySelectorAll('.ddGuess').forEach(b => { if (b.getAttribute('data-g') === r.answer) b.classList.add('up','correct'); });
  ddReveal(g === r.answer, 'Trade WITH the trend.');
}
function ddNext() {
  if (ddState.idx < ddState.rounds.length - 1) { ddState.idx++; ddState.answered = false; renderDailyRound(); }
  else completeDailyDrill();
}
function completeDailyDrill() {
  if (!ddDoneToday()) {
    daily.streak = (daily.lastDate === ddYesterday()) ? daily.streak + 1 : 1;
    daily.lastDate = ddToday();
    daily.best = Math.max(daily.best, daily.streak);
    saveDaily();
  }
  const mult = ddMultiplier(daily.streak);
  const earned = Math.round(ddState.correct * 50 * mult);
  player.shells += earned; addXP(ddState.correct * 15);
  renderDailyStreakBar();
  $('ddBody').innerHTML = '<div id="ddResult">' +
    '<div class="big">' + (ddState.correct >= 2 ? '🎉' : '💪') + '</div>' +
    '<div class="score">' + ddState.correct + ' / ' + ddState.rounds.length + ' correct</div>' +
    '<div class="earn">+' + fmt(earned) + ' 🐚  (×' + mult.toFixed(2) + ' streak bonus)</div>' +
    '<div class="sk">🔥 ' + daily.streak + ' day streak' + (daily.streak > 1 && daily.streak === daily.best ? ' — best yet!' : '') + '</div>' +
    '<div class="sub">Come back tomorrow to keep it going.</div></div>';
  updateDailyBtn();
}
function renderDailyDone() {
  $('ddBody').innerHTML = '<div id="ddResult">' +
    '<div class="big">✅</div><div class="score">Done for today!</div>' +
    '<div class="sk">🔥 ' + daily.streak + ' day streak</div>' +
    '<div class="sub">Come back tomorrow to keep your streak alive.<br>Best streak: ' + daily.best + ' days</div></div>';
}
function updateDailyBtn() {
  const b = $('dailyBtn'); if (!b) return;
  if (ddDoneToday()) { b.classList.add('done'); b.innerHTML = '🔥 STREAK ' + daily.streak; }
  else { b.classList.remove('done'); b.innerHTML = '🔥 DAILY DRILL <span class="dot"></span>'; }
}
function openDailyDrill() {
  if (dailyOpen || lessonOpen || htfZoomState || candleAcademy.active || (introFlow.active && introFlow.phase !== 'run')) return;
  renderDailyStreakBar();
  if (ddDoneToday()) renderDailyDone();
  else { ddState = ddBuild(); renderDailyRound(); }

}
function closeDailyDrill() { $('dailyDrill').classList.remove('open'); paused = dailyPrevPaused; dailyOpen = false; }
$('dailyBtn').addEventListener('click', openDailyDrill);
$('ddClose').addEventListener('click', closeDailyDrill);
$('ddBody').addEventListener('click', (e) => {
  const t = e.target;
  if (t.id === 'ddNext') { ddNext(); return; }

/* ===== Boss fights =====
   A challenge at the end of each hour that GATES the advance to the next hour.
   Data-driven: each boss is a name + rounds (a candle to read OR a plain question)
   with HP for the boss and the player. Correct answers damage the boss; wrong
   answers cost a heart. Retry-friendly — losing just re-reads the lesson.
   Adding a boss for another hour is just another entry in BOSSES. */
function bossCandleSVG(cands) {
  const VW = 300, VH = 150, pad = 16, n = cands.length;
  const Y = (v) => pad + (1 - v / 100) * (VH - 2 * pad);
  const slotW = (VW - 2 * pad) / n;
  let s = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg">';
  cands.forEach((c, i) => {
    const cx = pad + slotW * (i + 0.5), bw = Math.min(46, slotW * 0.5);
    const bodyTop = Y(Math.max(c.o, c.c)), bodyBot = Y(Math.min(c.o, c.c));
    const col = c.c >= c.o ? '#16c784' : '#ea3943';
    if (c.up > 0) s += '<line x1="' + cx + '" y1="' + bodyTop + '" x2="' + cx + '" y2="' + Y(Math.max(c.o, c.c) + c.up) + '" stroke="#c9d1d9" stroke-width="2.5"/>';
    if (c.lo > 0) s += '<line x1="' + cx + '" y1="' + bodyBot + '" x2="' + cx + '" y2="' + Y(Math.min(c.o, c.c) - c.lo) + '" stroke="#c9d1d9" stroke-width="2.5"/>';
    s += '<rect x="' + (cx - bw/2) + '" y="' + bodyTop + '" width="' + bw + '" height="' + Math.max(3, bodyBot - bodyTop) + '" fill="' + col + '" rx="1.5"/>';
  });
  s += '</svg>'; return s;
}

function bfAnswer(i) {

  const r = bfState.boss.rounds[bfState.idx], ok = i === r.correct;

  bfState.idx++;
  if (bfState.idx >= bfState.boss.rounds.length) { return bfState.bossHP <= 0 ? bossWin() : bossLose(); }
