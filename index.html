/* SL/TP sizing — the heart of trade realism.
   The stop sits past structure AND at least 3 ATR away, so ordinary
   noise can't tag it: stopping out requires a genuine sustained move
   against the position (typically 15–40+ candles of price action).
   The target is structure-based, clamped between 1.5R and 3R.
   Levels are kept inside the reachable price band of the world. */
function calcLevels(p) {
  // Stop distance clears: structure, 3× average move, AND 1.6× the
  // biggest recent candle — so no single ordinary candle can stop you out
  const volDist = Math.max(60, 3 * p.atr, 1.6 * p.maxMove);
  if (p.dir === 'long') {
    const riskDist   = Math.max(p.entry - (p.lo - 10), volDist);
    const slH        = Math.max(CFG.levelMin + 2, p.entry - riskDist);
    const risk       = p.entry - slH;
    const rewardDist = Math.min(Math.max((p.hi + 20) - p.entry, 1.5 * risk), 3 * risk);
    const tpH        = Math.min(CFG.levelMax - 2, p.entry + rewardDist);
    return { slH, tpH, risk: Math.max(5, risk), reward: Math.max(10, tpH - p.entry) };
  } else {
    const riskDist   = Math.max((p.hi + 10) - p.entry, volDist);
    const slH        = Math.min(CFG.levelMax - 2, p.entry + riskDist);
    const risk       = slH - p.entry;
    const rewardDist = Math.min(Math.max(p.entry - (p.lo - 20), 1.5 * risk), 3 * risk);
    const tpH        = Math.max(CFG.levelMin + 2, p.entry - rewardDist);
    return { slH, tpH, risk: Math.max(5, risk), reward: Math.max(10, p.entry - tpH) };
  }
}

/* Risk sizing: the AMOUNT field is the source of truth (you type how
   many SHELLS you're risking). The slider is a quick-set for common
   percentages — moving it rewrites the amount. */
function clampAmt() {
  let a = Math.round(+$('riskAmt').value || 0);
  return Math.max(1, Math.min(a, Math.max(1, Math.floor(player.shells))));
}

function setAmountFromSlider() {
  $('riskAmt').value = Math.max(1, Math.round(player.shells * (+$('riskSlider').value) / 100));
  refreshPanel();
}

  if (!pending) return;
  $('btnLong').classList.toggle('active', pending.dir === 'long');
  $('btnShort').classList.toggle('active', pending.dir === 'short');

  $('rrVal').textContent = rr.toFixed(1) + ' : 1';
  const win = fmt(clampAmt() * rr);
  const qc = { A: '#16c784', B: '#ffd60a', C: '#7d8aa0' };
  const why = setupZone ? (
    (setupZone.quality
      ? 'GRADE <b style="color:' + qc[setupZone.quality] + '">' + setupZone.quality + '</b> &mdash; '

  $('tpReason').innerHTML = why + (pending.dir === 'long'

      if (r.type === 'trade') {
        const tradeEntry = (session.tradeLog || [])[r.i];
        if (tradeEntry) openReviewChart(tradeEntry);

        if ((im.quizAnswers || []).length === im.quizQ) {
          im.quizAnswers = im.quizAnswers || [];

/* Live R-multiple of the open trade at the current price.
   1R = the distance from entry to stop. */
function tradeR() {
  const riskDist = trade.dir === 'long' ? trade.entryH - trade.slH
                                        : trade.slH - trade.entryH;
  const move = trade.dir === 'long' ? trade.lastPrice - trade.entryH
                                    : trade.entryH - trade.lastPrice;
  return Math.max(-1, Math.min(trade.rr, move / Math.max(1, riskDist)));
}

// Called once per NEW candle the turtle reaches (backtracking doesn't
// re-trigger). A trade stays open until SL, TP, or a manual close —
// like a real position. Each new candle is a price tick.
function onCandleEntered(c) {
  // The hour advances one market-minute per candle
  if (!session.inModal) {
    session.candles++;
    // Intro flow checkpoints (first play only)
    if (introFlow.active && introFlow.phase === 'run') {
      introFlow.candleCount++;
      if (introFlow.candleCount === 55) { triggerFlashQuiz(); return; }
      if (introFlow.candleCount === 65) { triggerPredictionBet(); return; }
      if (introFlow.candleCount === 75) { triggerIntroBoss(); return; }
    }
    if (session.startBal > 0 && player.shells <= session.startBal * (1 - session.failPct / 100)) return endHour();
    if (session.candles >= session.perHour) return endHour();
  }
  // VWAP update (resets per hour — mirrors how VWAP works on real charts)
  const typical = (Math.max(c.open, c.h) + Math.min(c.open, c.h)) / 2;
  const cv = c.vol || 1;
  vwapNum += typical * cv;
  vwapDen += cv;
  c.vwap = vwapDen > 0 ? vwapNum / vwapDen : c.h;
  if (cv > maxVol) maxVol = cv;
  updateHTF(c);

  // Contextual lessons: warn about obstacles a few candles before arrival
  const i0 = candles.indexOf(c);
  for (let i = i0; i >= 0 && i < Math.min(candles.length, i0 + 5); i++) {
    if (candles[i].bos)   teach('bos');
    if (candles[i].ob)    teach('ob');
    if (candles[i].sweep) teach('sweep');
  }

  if (trade) {
    trade.lastPrice = c.h;
    // Record this candle for the trade replay (entry → exit "film")
    if (trade.path) trade.path.push({ open: c.open, h: c.h, wick: c.wick, wick2: c.wick2,
      color: c.color, ob: !!c.ob, bos: !!c.bos, choch: !!c.choch, vwap: c.vwap || 0 });
    // Upside levels can be tagged intrabar by the wick (the candle's
    // high) — a long's TP gets filled by a spike, and a short's stop
    // gets swept by one. That sweep is a real liquidity lesson.
    const high = Math.max(c.open, c.h) + c.wick; // candle's true high
    const hitTP = trade.dir === 'long' ? high >= trade.tpH : c.h <= trade.tpH;
    const hitSL = trade.dir === 'long' ? c.h <= trade.slH : high >= trade.slH;
    if      (hitSL) resolveTrade('loss');   // SL checked first: conservative
    else if (hitTP) resolveTrade('win');    // set TP reached — take profit
  } else if (c.bos && bannerT <= 0 && !pending && setupCountdown <= 0) {
    /* A SETUP is never random: it fires exactly when Shell reaches a
       Break of Structure. The zone (order block + BOS candle) gets
       highlighted on the chart so the player SEES what triggered it. */
    const i = candles.indexOf(c);
    let obC = null;
    for (let k = 1; k <= 5 && i - k >= 0; k++) {
      if (candles[i - k].ob) { obC = candles[i - k]; break; }
    }
    setupZone = {
      from: obC ? obC.id : c.id - 1,
      to: c.id,
      dir: c.color === 'green' ? 'long' : 'short', // trade WITH the break
      type: c.choch ? 'choch' : 'bos',             // reversal vs continuation
    };
    // Grade the setup: VWAP position + trend structure alignment
    const vwapOk = c.vwap && (
      (setupZone.dir === 'long'  && c.h > c.vwap) ||
      (setupZone.dir === 'short' && c.h < c.vwap));
    const trendOk = checkTrendAlignment(setupZone.dir);
    setupZone.vwapAligned  = !!vwapOk;
    setupZone.trendAligned = !!trendOk;
    setupZone.quality = (vwapOk && trendOk) ? 'A' : (vwapOk || trendOk) ? 'B' : 'C';
    showBanner('SETUP');
  } else if (!trade && bannerT <= 0 && !pending && setupCountdown <= 0) {
    // VWAP bounce setup: last candles touched VWAP, current candle reversed
    if (!setupZone && c.vwap) {
      const seen = candles.filter(cc => cc.id <= maxSeenCandleId && cc.vwap);
      if (seen.length >= 4) {
        const prev1 = seen[seen.length - 2];
        const bullBounce = prev1.h < prev1.vwap && c.h > c.vwap && c.color === 'green';
        const bearRej    = prev1.h > prev1.vwap && c.h < c.vwap && c.color === 'red';
        if (bullBounce || bearRej) {
          setupZone = {
            from: prev1.id, to: c.id,
            dir: bullBounce ? 'long' : 'short',
            type: 'vwap_bounce',
            quality: 'B', vwapAligned: true, trendAligned: false,
          };
          if (checkTrendAlignment(setupZone.dir)) {
            setupZone.trendAligned = true;
            setupZone.quality = 'A';
          }
          showBanner('VWAP BOUNCE');
        }
      }
    }
    // Trend break setup: close beyond recent swing high/low
    if (!setupZone) {
      const seen2 = candles.filter(cc => cc.id <= maxSeenCandleId);
      if (seen2.length >= 8) {
        const recent = seen2.slice(-8);
        const swingHigh = Math.max(...recent.slice(0, -1).map(cc => Math.max(cc.open, cc.h)));
        const swingLow  = Math.min(...recent.slice(0, -1).map(cc => Math.min(cc.open, cc.h)));
        const trendBullBreak = c.h > swingHigh && c.color === 'green';
        const trendBearBreak = c.h < swingLow  && c.color === 'red';
        if (trendBullBreak || trendBearBreak) {
          setupZone = {
            from: recent[0].id, to: c.id,
            dir: trendBullBreak ? 'long' : 'short',
            type: 'trend_break',
            quality: 'B', vwapAligned: false, trendAligned: true,
          };
          if (c.vwap && ((trendBullBreak && c.h > c.vwap) || (trendBearBreak && c.h < c.vwap))) {
            setupZone.vwapAligned = true;
            setupZone.quality = 'A';
          }
          showBanner('TREND BREAK');
        }
      }
    }
  }
  if (setupCountdown > 0) setupCountdown--;
}

function resolveTrade(result) {
  // 'manual' closes at the current R-multiple — profit or loss
  const leveragedAmt = trade.riskAmt * (trade.leverage || 1);
  const delta = result === 'win'    ? leveragedAmt * trade.rr
              : result === 'loss'   ? -leveragedAmt
              : leveragedAmt * tradeR();
  player.shells = Math.max(0, player.shells + delta);
  const col = delta > 0.5 ? COLOR.greenBody
            : delta < -0.5 ? COLOR.redBody : '#7d8aa0';
  const msg = delta > 0.5 ? '+' + fmt(delta)
            : delta < -0.5 ? '−' + fmt(-delta) : 'BREAK EVEN';
  floaters.push({ text: msg, color: col, y: 64, t: 1.5 });
  if (Math.abs(delta) > 0.5) { flashT = 0.5; flashColor = col; }
  if (result === 'loss') shakeT = 0.45; // stop-outs should HURT
  // Reassurance on a GOOD-setup stop-out: a high-probability setup losing is
  // variance, not a mistake. Shown only on A/B losses, so it never nags.
  if (result === 'loss') {
    const g = (trade.quality || 'C').toUpperCase();
    if (g === 'A' || g === 'B') {
      floaters.push({ text: '🌊 Good setup — market didn\'t follow through. Not your fault.', color: '#9fc8e0', y: 118, t: 2.8 });
    }
  }
  // Expectancy tracking: every closed trade updates the running stats
  stats.trades++; session.trades++;
  if (delta > 0) {
    stats.wins++; session.wins++;
    combo.count += 2; combo.t = combo.maxT; // winning trades give a combo boost
  } else {
    combo.count = 0; // loss resets the streak
  }
  stats.net += delta; session.net += delta;
  // Prefer the SETUP snapshot captured at entry (shows the real OB/BOS that
  // triggered this trade). Fall back to an exit-window snapshot only if missing.
  let candleSnap = (trade.setupSnap && trade.setupSnap.length) ? trade.setupSnap : null;
  if (!candleSnap) {
    const cx = turtle.x + turtle.w / 2;
    const snapIdx = candles.findIndex(c => cx >= c.x && cx < c.x + c.w);
    const snap = snapIdx >= 0 ? candles.slice(Math.max(0, snapIdx - 8), snapIdx + 3) : [];
    candleSnap = snap.map(c => ({ open: c.open, h: c.h, wick: c.wick, wick2: c.wick2, color: c.color, ob: !!c.ob, bos: !!c.bos, choch: !!c.choch, vwap: c.vwap || 0 }));
  }
  // Replay "film": the setup candles (entry context) + every candle that played
  // out after entry, with the index of the entry candle. Trimmed to keep storage sane.
  let replay = null;
  if (trade.setupSnap && trade.setupSnap.length) {
    const path = (trade.path || []).slice(0, 60); // cap very long trades
    replay = { candles: trade.setupSnap.concat(path), entryIdx: trade.setupSnap.length - 1 };
  }
  const tradeRecord = {
    dir: trade.dir, result, delta,
    entryH: trade.entryH, slH: trade.slH, tpH: trade.tpH,
    entryPrice: trade.entryPrice,
    candleSnap,
    replay,
    rr: trade.rr,
    setupType: trade.setupType || (setupZone ? (setupZone.type || 'bos') : 'bos'),
    quality:   trade.quality   || (setupZone ? (setupZone.quality || 'C') : 'C'),
  };
  // Record trade for intermission history (per-hour, capped at 10)
  if (session.tradeLog.length < 10) session.tradeLog.push(tradeRecord);
  // Persistent journal: log EVERY trade (uncapped, survives hour resets & reloads),
  // carrying the full chart snapshot so each entry can be reviewed full-screen.
  logJournalTrade(tradeRecord);
  teach(delta > 0 ? 'win' : 'loss');
  addXP(result === 'win' ? 30 : delta > 0 ? 20 : 10);
  trade = null;
  setupZone = null; // the setup that spawned this trade is done
  closeBtnEl.style.display = 'none';
  nextSetupIn();
}
let shakeT = 0; // screen shake on stop-out

function addXP(n) {
  player.xp += n;
  while (player.xp >= player.xpNeeded) {
    player.xp -= player.xpNeeded;
    player.xpNeeded = Math.round(player.xpNeeded * 1.5);
    const prevRank = rankForLevel(player.level);
    player.level++;
    const newRank = rankForLevel(player.level);
    if (newRank.idx !== prevRank.idx) {
      // Crossed into a new rank — make it a moment
      floaters.push({ text: newRank.emoji + ' RANK UP — ' + newRank.name + '!', color: newRank.color, y: 92, t: 3.2 });
      flashT = 0.5; flashColor = newRank.color;
    } else {
      floaters.push({ text: 'LEVEL ' + player.level + '!', color: '#4cc3ff', y: 64, t: 2 });
    }
  }
  window.cloudPushProgress && window.cloudPushProgress(); // sync level/XP/shells to cloud
}

/* ---------- Wick spin ----------
   The signature move: the wick is a vertical POLE. Shell grabs it and
   twirls AROUND it — orbiting the pole's vertical axis, swinging out in
   front and around the back (mirrored + squashed for the 3D illusion)
   while sliding up toward the tip. At the top he's flung forward. */
function startSpin(c) {
  teach('spin');
  const top = candleTop(c);
  turtle.spinning = true;
  turtle.spinT = 0;
  turtle.spinPhase = 0;
  turtle.tipX = c.x + c.w / 2;           // pole x
  turtle.tipY = top - c.wick;            // pole top
  turtle.spinBase = top;                 // pole bottom (candle top)
  // Grab the pole at the current body height, kept inside the segment
  const cy = turtle.y + turtle.h / 2;
  turtle.grabY = Math.max(turtle.tipY + 8, Math.min(cy, top - turtle.h / 2));
  turtle.vy = 0;
  turtle.vxBoost = 0;
  turtle.onGround = false;
}

function updateSpin(dt) {
  turtle.spinT += dt;
  const k = Math.min(1, turtle.spinT / CFG.spinDur); // 0→1 over the twirl
  const phase = k * CFG.spinTurns * Math.PI * 2;     // orbit angle
  turtle.spinPhase = phase;

  // Orbit the vertical axis: sin = side-to-side sway, cos = depth
  // (depth is used by the renderer to mirror/squash the sprite and to
  // draw the pole in front while he's on the back half).
  const cx = turtle.tipX + Math.sin(phase) * CFG.spinRadius;
  const climb = 1 - (1 - k) * (1 - k);               // ease-out climb
  const cy = turtle.grabY + (turtle.tipY + 8 - turtle.grabY) * climb;
  turtle.x = cx - turtle.w / 2;
  turtle.y = cy - turtle.h / 2;
  turtle.rot = Math.sin(phase) * 0.18;               // slight lean into it
  turtle.trail.push({ x: cx, y: cy, life: 1 });

  if (k >= 1) { // release at the tip — flung forward and up
    turtle.spinning = false;
    turtle.rot = 0;
    turtle.vy = CFG.spinReleaseVy;
    turtle.vxBoost = CFG.spinBoost;
    turtle.cdSpin = CFG.spinCooldown;
  }
}

/* ---------- Physics ---------- */
function update(dt) {
  turtle.animT += dt; // drives walk bob, leg swing, flame flicker

  // Motion trail fades out continuously. Entries can have different
  // starting lifetimes (spin vs fling), so filter ALL expired ghosts —
  // not just the oldest — or a negative radius reaches ctx.arc and throws.
  turtle.trail = turtle.trail.filter(p => (p.life -= dt * 2.5) > 0);

  if (turtle.cdSpin > 0) turtle.cdSpin -= dt;
  if (turtle.spinning) { updateSpin(dt); return; } // spin owns the body

  /* --- Horizontal: walk in the facing direction + decaying fling boost.
         Halted (at a setup) = standing still until the player acts --- */
  const prevFront = turtle.x + turtle.w;
  const prevBack  = turtle.x;
  if (!turtle.halt) turtle.x += (CFG.walkSpeed + turtle.vxBoost) * dt * turtle.dir;
  turtle.vxBoost = Math.max(0, turtle.vxBoost - CFG.spinBoostDecay * dt);
  // Keep a short trail going while the fling boost is still strong
  if (turtle.vxBoost > 120) {
    turtle.trail.push({ x: turtle.x + turtle.w / 2, y: turtle.y + turtle.h / 2, life: 0.6 });
  }
  // Can't walk back past the oldest candle still in the world
  if (candles.length && turtle.x < candles[0].x) turtle.x = candles[0].x;

  // Block against candle walls (both directions) while below their top.
  // Physically each candle is a solid column under its body top, so the
  // dead chart space beneath the floating bodies stays out of reach.
  for (const c of candles) {
    const top = candleTop(c);
    const below = turtle.y + turtle.h > top + 2;       // body is below the top
    if (!below) continue;
    if (turtle.dir > 0 && turtle.x + turtle.w > c.x && turtle.x < c.x) {
      turtle.x = c.x - turtle.w;                       // hit a left wall
    } else if (turtle.dir < 0 && turtle.x < c.x + c.w && turtle.x + turtle.w > c.x + c.w) {
      turtle.x = c.x + c.w;                            // hit a right wall
    }
  }

  /* --- Jetpack timers & fuel --- */
  if (turtle.jetT   > 0) turtle.jetT   -= dt;
  if (turtle.flameT > 0) turtle.flameT -= dt;
  else turtle.fuel = Math.min(CFG.fuelMax, turtle.fuel + CFG.fuelRegen * dt);

  /* --- Vertical: gravity (reduced while the jetpack hang window is
         active and we're still rising — that's the extra hang time) --- */
  const prevBottom = turtle.y + turtle.h;
  const gScale = turtle.tucked ? CFG.tuckGravityScale
               : (turtle.jetT > 0 && turtle.vy < 0) ? CFG.jetpackGravityScale : 1;
  turtle.vy += CFG.gravity * gScale * dt;
  turtle.y  += turtle.vy * dt;
  const newBottom = turtle.y + turtle.h;

  turtle.onGround = false;

  if (turtle.vy >= 0) { // only land while moving down
    // Land on a candle body top if we crossed it while overlapping it
    for (const c of candles) {
      const top = candleTop(c);
      const overlapX = turtle.x + turtle.w > c.x && turtle.x < c.x + c.w;
      if (overlapX && prevBottom <= top + 1 && newBottom >= top) {
        turtle.y = top - turtle.h;
        if (c.ob) {
          // Order block = bounce pad: launch instead of landing
          turtle.vy = CFG.obBounceVy;
          turtle.tucked = false;        // pops out of a tuck
          turtle.rollT = 0;
          rings.push({ x: c.x + c.w / 2, y: top, t: 0.5 });
        } else {
          turtle.vy = 0;
          turtle.onGround = true;
        }
        break;
      }
    }
    // Failsafe: fell past the chart floor into the dead space —
    // put Shell back on the most recent candle (no walkable ground
    // exists below the floating candles any more)
    if (!turtle.onGround && newBottom >= groundY + 20) {
      const back = candles.find(cc => cc.id === maxSeenCandleId) || candles[0];
      if (back) {
        turtle.x = back.x + 8;
        turtle.y = candleTop(back) - turtle.h;
        turtle.vy = 0;
        turtle.onGround = true;
        floaters.push({ text: 'OFF THE CHART!', color: '#7d8aa0', y: 64, t: 1.4 });
      }
    }
  }

  /* --- Shell tuck: roll forward on landing, then pop back out --- */
  if (turtle.tucked && turtle.onGround) {
    if (turtle.rollT <= 0) {                          // just touched down
      turtle.rollT = CFG.tuckRollTime;
      turtle.vxBoost = Math.max(turtle.vxBoost, CFG.tuckRollBoost);
    }
    turtle.rollT -= dt;
    turtle.rot += ((CFG.walkSpeed + turtle.vxBoost) * dt) / 14; // ball rolls
    if (turtle.rollT <= 0) { turtle.tucked = false; turtle.rot = 0; }
  }

  /* --- Wick spin trigger ---
     The wick is a physical pole: if the turtle's body crosses the wick
     line (the segment from the candle top up to the wick tip) this
     frame — walking into it OR falling past it — he grabs and spins.
     Only tall wicks count, and a cooldown stops back-to-back spins. */
  if (!turtle.spinning && !turtle.tucked && turtle.cdSpin <= 0) {
    for (const c of candles) {
      if (c.wick < CFG.spinMinWick) continue;
      const wickX = c.x + c.w / 2;
      const crossedFwd  = prevFront <= wickX && turtle.x + turtle.w > wickX;
      const crossedBack = prevBack  >= wickX && turtle.x < wickX;
      if (!crossedFwd && !crossedBack) continue;
      const segBot = candleTop(c);           // wick base (body top)
      const segTop = segBot - c.wick;        // wick tip
      if (turtle.y < segBot && turtle.y + turtle.h > segTop) {
        // Liquidity sweep wicks are traps: walking into one zaps you.
        // The right move is hitting it AIRBORNE — that earns the spin.
        if (c.sweep && turtle.onGround) {
          if (turtle.sweepCdT <= 0) sweepZap();
        } else {
          startSpin(c);
        }
        break;
      }
    }
  }
  if (turtle.sweepCdT > 0) turtle.sweepCdT -= dt;

  /* --- Anti-tunnel ground snap ---
     If anything (spin release, fling, big drop) leaves the turtle
     INSIDE the body of the candle under his centre while falling,
     snap him up onto its top. Candle bodies are always solid floors. */
  if (!turtle.onGround && !turtle.spinning && turtle.vy >= 0) {
    const cx0 = turtle.x + turtle.w / 2;
    const under = candles.find(c => cx0 >= c.x && cx0 < c.x + c.w);
    if (under) {
      const top = candleTop(under);
      if (turtle.y + turtle.h > top + 4) {
        turtle.y = top - turtle.h;
        if (under.ob) {
          turtle.vy = CFG.obBounceVy;            // pads still bounce
          rings.push({ x: under.x + under.w / 2, y: top, t: 0.5 });
        } else {
          turtle.vy = 0;
          turtle.onGround = true;
        }
      }
    }
  }

  /* --- Candle counting: setups + trade resolution tick per candle.
     Only candles NEVER seen before advance the market — walking back
     to review the chart never re-triggers trades or setups. --- */
  const midX = turtle.x + turtle.w / 2;
  const cur = candles.find(c => midX >= c.x && midX < c.x + c.w);
  if (cur && cur.id !== lastCandleId) {
    lastCandleId = cur.id;
    if (cur.id > maxSeenCandleId) {
      maxSeenCandleId = cur.id;
      onCandleEntered(cur);
    }
  }

  /* --- Coin collection --- */
  const tx = turtle.x + turtle.w / 2;
  const ty = turtle.y + turtle.h / 2;
  for (const coin of coins) {
    if (coin.collected) continue;
    coin.bobT += dt * 2.8; // bob animation
    const dist = Math.hypot(tx - coin.x, ty - coin.y);
    if (dist < coin.r + 18) {
      coin.collected = true;
      const earn = 10 * (1 + Math.floor(combo.count / 3)); // combo bonus
      player.shells += earn;
      combo.count++;
      combo.t = combo.maxT;
      addXP(5);
      floaters.push({ text: '+' + earn + ' 🐚', color: '#ffd60a', y: turtle.y - 10, t: 1.2 });
      if (combo.count >= 5 && combo.count % 5 === 0) {
        floaters.push({ text: combo.count + 'x COMBO! 🔥', color: '#ff9f43', y: turtle.y - 28, t: 1.8 });
      }
      // Leverage tier tracking
      leverage.coinsEarned++;
      const nextTier = leverage.tiers.find(t => t.coins === leverage.coinsEarned);
      if (nextTier && nextTier.mult > leverage.unlocked) {
        leverage.unlocked = nextTier.mult;
        leverage.current = nextTier.mult;
        triggerLeverageLesson(nextTier);
        floaters.push({ text: nextTier.label + ' UNLOCKED!', color: '#ff9f43', y: turtle.y - 44, t: 2.5 });
      }
    }
  }

  /* --- Combo timer decay --- */
  if (combo.t > 0) {
    combo.t -= dt;
    if (combo.t <= 0) combo.count = 0;
  }

  /* --- Shell emotion update --- */
  if (trade) {
    const r = tradeR();
    shellEmotion = r > 0.5 ? 'happy' : r < -0.3 ? 'worried' : 'focused';
  } else if (combo.count >= 5) {
    shellEmotion = 'excited';
  } else if (setupZone && bannerT > 0) {
    shellEmotion = 'focused';
  } else {
    shellEmotion = player.shells > session.startBal ? 'happy' : 'focused';
  }
}

/* ---------- Rendering ---------- */
function drawCandle(c, cameraX) {
  // Fog of war: candles beyond the live edge haven't printed yet
  if (c.id > maxSeenCandleId + 2) return;

  const sx  = c.x - cameraX;          // screen x
  const top = candleTop(c);           // body top  = max(open, close)
  const bot = Math.max(groundY - Math.min(c.open, c.h), top + CFG.minBody);
  const bodyH = bot - top;
  const mid = sx + c.w / 2;

  // Upper wick from the body top. Colour-coded: orange = sweep trap,
  // cyan = spinnable pole, grey = ordinary. Tiny wicks aren't drawn.
  if (c.wick >= 2) {
    const spinnable = !c.sweep && c.wick >= CFG.spinMinWick;
    ctx.strokeStyle = c.sweep ? '#ff7a45' : spinnable ? '#7fd6ff' : COLOR.wick;
    ctx.lineWidth = c.sweep ? 3 : spinnable ? 2.5 : 2;
    ctx.beginPath();
    ctx.moveTo(mid, top);
    ctx.lineTo(mid, top - c.wick);
    ctx.stroke();
    if (c.sweep || spinnable) {
      ctx.globalAlpha = 0.55 + Math.sin(turtle.animT * 7) * 0.35;
      ctx.fillStyle = c.sweep ? '#ffb86b' : '#aee6ff';
      ctx.beginPath();
      ctx.arc(mid, top - c.wick, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Lower wick below the floating body — like a real chart
  if (c.wick2 >= 2) {
    ctx.strokeStyle = COLOR.wick;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(mid, bot);
    ctx.lineTo(mid, bot + c.wick2);
    ctx.stroke();
  }

  // BOS impulse candles glow — the structure break is unmissable
  if (c.bos) {
    ctx.globalAlpha = 0.22 + Math.sin(turtle.animT * 5) * 0.08;
    ctx.fillStyle = c.color === 'green' ? COLOR.greenBody : COLOR.redBody;
    ctx.fillRect(sx - 4, top - 4, c.w + 8, bodyH + 8);
    ctx.globalAlpha = 1;
  }

  // Body: open → close, floating on the chart
  ctx.fillStyle = c.color === 'green' ? COLOR.greenBody : COLOR.redBody;
  ctx.fillRect(sx, top, c.w, bodyH);

  // Lighter highlight stripe on the left edge
  ctx.fillStyle = c.color === 'green' ? COLOR.greenStripe : COLOR.redStripe;
  ctx.fillRect(sx, top, 6, bodyH);

  // Order block: pulsing purple bounce pad on the body top, labelled
  if (c.ob) {
    ctx.globalAlpha = 0.45 + Math.sin(turtle.animT * 6) * 0.2;
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(sx + 1, top, c.w - 2, Math.min(12, bodyH));
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#d8b4fe';
    ctx.fillRect(sx + 1, top, c.w - 2, 2.5);
    if (!c.bos) {
      ctx.font = 'bold 9px ' + MONO;
      ctx.fillStyle = '#d8b4fe';
      ctx.textAlign = 'center';
      ctx.fillText('OB', mid, top - c.wick - 6);
      ctx.textAlign = 'left';
    }
  }

  // BOS label above the candle
  if (c.bos) {
    ctx.font = 'bold 10px ' + MONO;
    ctx.fillStyle = '#c9b3ff';
    ctx.textAlign = 'center';
    ctx.fillText('BOS', mid, top - c.wick - 8);
    ctx.textAlign = 'left';
  }

  // Inspected candle: cyan dashed outline while its card is open
  if (c.id === inspectId) {
    ctx.strokeStyle = '#7fd6ff';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(sx - 3, top - c.wick - 4, c.w + 6, bodyH + c.wick + c.wick2 + 8);
    ctx.setLineDash([]);
  }
}

/* Rounded-rect helper (with fallback for browsers without ctx.roundRect) */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
  else ctx.rect(x, y, w, h);
}

/* ---- Shell the turtle ----
   Drawn inside the collision box (46x30), facing right.
   Layers back-to-front: legs → jetpack → head+sunglasses → dome shell
   with hexagon pattern. Bob/leg-swing are visual only — physics untouched. */
function drawTurtle(cameraX) {
  const w = turtle.w, h = turtle.h;
  const sx = turtle.x - cameraX;
  // Gentle bob while walking; frozen mid-air and while halted at a setup
  const moving = turtle.onGround && !turtle.halt;
  const bob  = moving ? Math.sin(turtle.animT * 9) * 1.4 : 0;
  const step = moving ? Math.sin(turtle.animT * 9) * 2.2 : 0;
  const sy = turtle.y + bob;

  ctx.save();
  ctx.translate(sx, sy);

  // Face the walking direction (sprite is drawn facing right)
  if (turtle.dir < 0) {
    ctx.translate(w / 2, h / 2);
    ctx.scale(-1, 1);
    ctx.translate(-w / 2, -h / 2);
  }

  /* Tucked: Shell is a compact ball — just the dome as a circle with
     the hex pattern, rotating as it drops and rolls. Head, legs and
     jetpack are pulled in. */
  if (turtle.tucked) {
    const r = 14;
    ctx.translate(w / 2, h / 2);
    ctx.rotate(turtle.rot);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = COLOR.turtleShell;
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = COLOR.turtleOutline;
    ctx.stroke();
    // Centre hexagon + three spokes (makes the rotation visible)
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const a = (Math.PI / 3) * i;
      const px = Math.cos(a) * 5, py = Math.sin(a) * 5;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const a = (Math.PI * 2 / 3) * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 5, Math.sin(a) * 5);
      ctx.lineTo(Math.cos(a) * (r - 2), Math.sin(a) * (r - 2));
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  // Pole twirl: mirror + squash horizontally as Shell orbits the wick.
  // cos(phase) > 0 = front of the pole (facing right, full width),
  // cos(phase) < 0 = back of the pole (mirrored), near 0 = edge-on.
  if (turtle.spinning) {
    const depth = Math.cos(turtle.spinPhase);
    const squash = Math.sign(depth || 1) * Math.max(0.25, Math.abs(depth));
    ctx.translate(w / 2, h / 2);
    ctx.rotate(turtle.rot);
    ctx.scale(squash, 1);
    ctx.translate(-w / 2, -h / 2);
  }

  /* Legs: two stubs swinging in opposite phase */
  ctx.fillStyle = COLOR.turtleBody;
  rr(w * 0.28 + step, h - 7 - bob, 8, 7 + bob, 3); ctx.fill(); // front leg
  rr(w * 0.54 - step, h - 7 - bob, 8, 7 + bob, 3); ctx.fill(); // back leg

  /* Jetpack: compact pack strapped to the back of the shell */
  ctx.fillStyle = COLOR.jetpackBody;
  rr(-1, h * 0.28, 9, h * 0.52, 3); ctx.fill();
  ctx.fillStyle = COLOR.jetpackDark;                // nozzle
  ctx.fillRect(1.5, h * 0.78, 4, 3.5);
  // Exhaust flame: tiny idle flicker, big burst while the jetpack fires
  const boost = turtle.flameT > 0;
  const f = boost ? 12 + Math.sin(turtle.animT * 45) * 3.5
                  : 3 + Math.sin(turtle.animT * 25) * 1.2;
  const fw = boost ? 3 : 2;                         // half-width of the flame
  ctx.fillStyle = COLOR.flameOuter;
  ctx.beginPath();
  ctx.moveTo(3.5 - fw, h * 0.78 + 3.5);
  ctx.lineTo(3.5 + fw, h * 0.78 + 3.5);
  ctx.lineTo(3.5, h * 0.78 + 3.5 + f);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = COLOR.flameInner;
  ctx.beginPath();
  ctx.arc(3.5, h * 0.78 + 4.5 + (boost ? 2 : 0), boost ? 2.2 : 1.3, 0, Math.PI * 2);
  ctx.fill();

  /* Neck + round head poking out the front */
  ctx.fillStyle = COLOR.turtleBody;
  ctx.fillRect(w * 0.68, h * 0.34, 8, 8);           // neck
  ctx.beginPath();
  ctx.arc(w * 0.85, h * 0.38, 8, 0, Math.PI * 2);   // head
  ctx.fill();
  // Expression: changes with emotion (happy/worried/excited/focused)
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  if (shellEmotion === 'happy' || shellEmotion === 'excited') {
    // Big smile (wider arc)
    ctx.arc(w * 0.88, h * 0.44, 3.5, 0.1 * Math.PI, 0.7 * Math.PI);
  } else if (shellEmotion === 'worried') {
    // Frown
    ctx.arc(w * 0.88, h * 0.52, 3, -0.65 * Math.PI, -0.15 * Math.PI);
  } else {
    // Neutral/focused: straight line
    ctx.moveTo(w * 0.855, h * 0.47); ctx.lineTo(w * 0.905, h * 0.47);
  }
  ctx.stroke();
  // Sweat drop when worried
  if (shellEmotion === 'worried') {
    ctx.fillStyle = '#4cc3ff';
    ctx.beginPath(); ctx.arc(w * 0.98, h * 0.34, 1.8, 0, Math.PI * 2); ctx.fill();
  }
  // Stars/sparkles when excited
  if (shellEmotion === 'excited') {
    ctx.fillStyle = '#ffd60a';
    ctx.font = '5px serif';
    ctx.fillText('✦', w * 0.99, h * 0.18);
    ctx.fillText('✦', w * 1.04, h * 0.32);
  }

  /* Big round sunglasses: two dark oval lenses + bridge + arm */
  ctx.fillStyle = COLOR.lens;
  ctx.beginPath();
  ctx.ellipse(w * 0.83, h * 0.30, 3.4, 3.0, 0, 0, Math.PI * 2); // back lens
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.95, h * 0.30, 3.4, 3.0, 0, 0, Math.PI * 2); // front lens
  ctx.fill();
  ctx.strokeStyle = COLOR.lens;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(w * 0.86, h * 0.30); ctx.lineTo(w * 0.92, h * 0.30); // bridge
  ctx.moveTo(w * 0.80, h * 0.30); ctx.lineTo(w * 0.72, h * 0.26); // arm to shell
  ctx.stroke();
  // Glint so the lenses read as glass
  ctx.fillStyle = COLOR.lensShine;
  ctx.beginPath();
  ctx.arc(w * 0.955, h * 0.27, 1.0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(w * 0.835, h * 0.27, 1.0, 0, Math.PI * 2); ctx.fill();

  /* Dome shell: flat bottom, arched top, drawn over the neck */
  const shellL = w * 0.08, shellR = w * 0.74;
  const shellBot = h * 0.82, shellTop = h * 0.02;
  ctx.beginPath();
  ctx.moveTo(shellL, shellBot);
  ctx.bezierCurveTo(shellL, shellTop, shellR, shellTop, shellR, shellBot);
  ctx.closePath();
  ctx.fillStyle = COLOR.turtleShell;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.stroke();

  // Belly band along the shell's flat bottom
  ctx.fillStyle = COLOR.turtleBelly;
  rr(shellL + 2, shellBot - 4, shellR - shellL - 4, 4, 2); ctx.fill();

  /* Hexagon pattern: one centre hex + spokes radiating to the rim.
     Clipped to the dome so lines never poke outside the shell. */
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(shellL, shellBot);
  ctx.bezierCurveTo(shellL, shellTop, shellR, shellTop, shellR, shellBot);
  ctx.closePath();
  ctx.clip();
  const hcx = (shellL + shellR) / 2, hcy = h * 0.45, hr = 5.5;
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    const px = hcx + Math.cos(a) * hr, py = hcy + Math.sin(a) * hr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  for (let i = 0; i < 6; i++) {                     // spokes outward
    const a = (Math.PI / 3) * i - Math.PI / 6;
    ctx.beginPath();
    ctx.moveTo(hcx + Math.cos(a) * hr, hcy + Math.sin(a) * hr);
    ctx.lineTo(hcx + Math.cos(a) * hr * 2.6, hcy + Math.sin(a) * hr * 2.6);
    ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}

/* ---- HTF full-screen zoom overlay ----------------------------------------
   When a player taps a timeframe row in the HTF panel, this overlay opens.
   It shows ALL accumulated candles for that TF with:
   · BOS + OB structures auto-detected within the TF data
   · VWAP line running from the first HTF candle
   · Trend lines (swing-pivot highs and lows)
   · A tiny Shell icon showing current price position
   Tapping anywhere dismisses it.
   -------------------------------------------------------------------------- */
function drawHTFZoom() {
  const tfIdx = htfZoomState.tfIdx;
  const tf    = htf[tfIdx];
  const label = HTF_LABELS[tfIdx];

  // Full-screen backdrop
  ctx.fillStyle = 'rgba(5, 8, 14, 0.97)';
  ctx.fillRect(0, 0, W, H);

  // Header bar
  ctx.fillStyle = '#0d1320';
  ctx.fillRect(0, 0, W, 36);
  ctx.fillStyle = '#1c2737';
  ctx.fillRect(0, 35, W, 1);
  ctx.font = 'bold 11px ' + MONO;
  ctx.fillStyle = '#4cc3ff';
  ctx.textAlign = 'center';
  ctx.fillText(label + '  MARKET STRUCTURE  (' + label + ' Time Frame)', W / 2 - 30, 23);
  ctx.font = '9px ' + MONO;
  ctx.fillStyle = '#46546a';
  ctx.fillText('TAP ANYWHERE TO CLOSE', W / 2 + 70, 23);
  ctx.textAlign = 'left';

  // Build candle array: closed + current building (partial), then apply scroll window
  const allRaw = [...tf.candles];
  if (tf.cur) allRaw.push({ ...tf.cur, partial: true });
  const MAX_VISIBLE = 60; // max candles shown on screen at once
  const scrollOff = Math.max(0, Math.min(htfZoomState.scrollOff || 0, Math.max(0, allRaw.length - MAX_VISIBLE)));
  htfZoomState.scrollOff = scrollOff;
  const rawStart = Math.max(0, allRaw.length - MAX_VISIBLE - scrollOff);
  const rawEnd   = Math.max(0, allRaw.length - scrollOff);
  const all = allRaw.slice(rawStart, rawEnd);
  // Map miniJ (absolute index in allRaw) to relative index for rendering
  const miniJAbs = htfZoomState.miniJ;
  const miniJRel = miniJAbs - rawStart;

  if (all.length < 3) {
    ctx.font = '11px ' + MONO;
    ctx.fillStyle = '#7d8aa0';
    ctx.textAlign = 'center';
    ctx.fillText(label + ' candles are still building...', W / 2, H / 2 - 10);
    const prog = tf.cur ? tf.cur.n + ' / ' + tf.period + ' minutes' : '0 complete';
    ctx.fillText('(' + prog + ')', W / 2, H / 2 + 14);
    ctx.font = 'bold 9px ' + MONO;
    ctx.fillStyle = '#4cc3ff';
    ctx.fillText('TAP TO RETURN', W / 2, H - 18);
    ctx.textAlign = 'left';
    return;
  }

  // Chart area
  const cX = 14, cY = 42, cW = W - 64, cH = H * 0.60;

  // Price range with padding
  let lo = Infinity, hi = -Infinity;
  for (const c of all) { lo = Math.min(lo, c.lo); hi = Math.max(hi, c.hi); }
  const rng = Math.max(1, hi - lo);
  lo -= rng * 0.10; hi += rng * 0.10;
  const range = hi - lo;
  const CY = (v) => cY + cH * (1 - (v - lo) / range);

  // Candle sizing
  const nC  = all.length;
  const cw  = Math.max(5, Math.min(28, (cW - 10) / nC - 2));
  const cg  = Math.max(1, cw * 0.12);

  // Grid lines + right-side price axis
  ctx.font = '8px ' + MONO;
  ctx.textAlign = 'right';
  const anchor = candles.find(cc => cc.id === maxSeenCandleId);
  const ppp = anchor ? anchor.price / (CFG.pxPerPct * 100) : 0;
  for (let i = 0; i <= 5; i++) {
    const v = lo + (range / 5) * i;
    const gy = CY(v);
    ctx.strokeStyle = 'rgba(42, 52, 66, 0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cX, gy); ctx.lineTo(cX + cW + 44, gy); ctx.stroke();
    if (anchor && ppp) {
      ctx.fillStyle = '#5a6b82';
      ctx.fillText(fmtPrice(anchor.price + (v - anchor.h) * ppp), W - 4, gy - 2);
    }
  }
  ctx.textAlign = 'left';

  // Save layout geometry so pointerup can map taps to candles
  htfZoomState._cX = cX; htfZoomState._cY = cY; htfZoomState._cW = cW; htfZoomState._cH = cH;
  htfZoomState._cw = cw; htfZoomState._cg = cg; htfZoomState._nC = nC;
  htfZoomState._lo = lo; htfZoomState._range = range;

  // ---- Detect BOS + OB within the HTF candle set ----
  const htfSetups = [];
  for (let i = 5; i < all.length; i++) {
    const prevHi = Math.max(...all.slice(i-5, i).map(c => Math.max(c.open, c.h)));
    const prevLo = Math.min(...all.slice(i-5, i).map(c => Math.min(c.open, c.h)));
    const bull = all[i].h > prevHi;
    const bear = all[i].h < prevLo;
    if (bull || bear) {
      const dir  = bull ? 'long' : 'short';
      const want = bull ? 'red' : 'green';
      let obIdx  = i - 1;
      for (let k = i - 1; k >= Math.max(0, i - 4); k--) {
        if (all[k].color === want) { obIdx = k; break; }
      }
      htfSetups.push({ bosIdx: i, obIdx, dir, sLvl: bull ? prevHi : prevLo });
    }
  }
  // Store for tap-to-inspect
  htfZoomState._htfSetups = htfSetups;

  // Broken-structure dashed levels — show only the 4 most recent to reduce clutter
  const recentSetups = htfSetups.slice(-4);
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  recentSetups.forEach((s, si) => {
    const gy = CY(s.sLvl);
    if (gy < cY || gy > cY + cH) return;
    const isLatest = si === recentSetups.length - 1;
    ctx.strokeStyle = isLatest ? 'rgba(76,195,255,0.55)' : 'rgba(90,107,130,0.30)';
    ctx.beginPath(); ctx.moveTo(cX, gy); ctx.lineTo(cX + cW + 44, gy); ctx.stroke();
    if (isLatest) {
      ctx.font = '7px ' + MONO; ctx.fillStyle = 'rgba(76,195,255,0.7)';
      ctx.textAlign = 'right';
      ctx.fillText('KEY LEVEL', cX + cW + 43, gy - 3);
      ctx.textAlign = 'left';
    }
  });
  ctx.setLineDash([]);

  // ---- HTF swing-pivot trend lines ----
  const tpH = [], tpL = [];
  for (let i = 2; i < all.length - 2; i++) {
    const hi = all[i].hi, lo2 = all[i].lo;
    if ([1,2].every(d => hi > all[i-d].hi && hi > all[i+d].hi)) tpH.push({ j: i, v: hi });
    if ([1,2].every(d => lo2 < all[i-d].lo && lo2 < all[i+d].lo)) tpL.push({ j: i, v: lo2 });
  }
  const drawHTFLine = (p1, p2, col, lbl) => {
    if (!p1 || !p2) return;
    const x1 = cX + p1.j * (cw + cg) + cw / 2;
    const x2 = cX + p2.j * (cw + cg) + cw / 2;
    const y1 = CY(p1.v), y2 = CY(p2.v);
    if (x1 === x2) return;
    const slope = (y2 - y1) / (x2 - x1);
    const xEnd = cX + cW;
    const yEnd = y2 + slope * (xEnd - x2);
    ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(xEnd, yEnd); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.7; ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x1, y1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x2, y2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Label at the right end of the line
    const ly2 = Math.max(cY + 10, Math.min(cY + cH - 4, yEnd));
    ctx.font = '7px ' + MONO; ctx.fillStyle = col; ctx.textAlign = 'right';
    ctx.fillText(lbl, xEnd - 2, ly2 - 3);
    ctx.textAlign = 'left';
  };
  if (tpH.length >= 2) drawHTFLine(tpH[tpH.length-2], tpH[tpH.length-1], 'rgba(234,57,67,0.65)', 'RESISTANCE TREND');
  if (tpL.length >= 2) drawHTFLine(tpL[tpL.length-2], tpL[tpL.length-1], 'rgba(22,199,132,0.65)', 'SUPPORT TREND');

  // ---- VWAP line ----
  let vwN = 0, vwD = 0;
  const vwapVals = all.map(c => {
    const typ = (c.hi + c.lo + c.h) / 3;
    const v = c.vol || 1;
    vwN += typ * v; vwD += v;
    return vwD > 0 ? vwN / vwD : c.h;
  });
  ctx.strokeStyle = 'rgba(255, 200, 60, 0.75)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  all.forEach((c, j) => {
    const sx = cX + j * (cw + cg) + cw / 2;
    const sy = CY(vwapVals[j]);
    j === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  });
  ctx.stroke();

  // ---- Candles ----
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 350); // 0–1 pulsing for setup highlights
  const inspectedSetup = htfZoomState._inspectSetup || null;
  all.forEach((c, j) => {
    const x    = cX + j * (cw + cg);
    const col  = c.color === 'green' ? COLOR.greenBody : COLOR.redBody;
    const bTop = CY(Math.max(c.open, c.h));
    const bBot = CY(Math.min(c.open, c.h));
    const bh   = Math.max(2, bBot - bTop);
    const midX = x + cw / 2;
    const isOB  = htfSetups.some(s => s.obIdx  === j);
    const setup = htfSetups.find(s => s.bosIdx === j);
    const isInspected = inspectedSetup && (inspectedSetup.bosIdx === j || inspectedSetup.obIdx === j);

    // Wick
    ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(midX, CY(c.hi)); ctx.lineTo(midX, CY(c.lo)); ctx.stroke();

    // OB shading — pulses
    if (isOB) {
      const alpha = isInspected ? 0.55 : (0.20 + 0.15 * pulse);
      ctx.globalAlpha = alpha; ctx.fillStyle = '#a855f7';
      ctx.fillRect(x - 2, bTop - 2, cw + 4, bh + 4);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#a855f7'; ctx.lineWidth = isInspected ? 1.5 : 0.8;
      ctx.setLineDash([2, 2]); ctx.strokeRect(x - 2, bTop - 2, cw + 4, bh + 4);
      ctx.setLineDash([]);
    }

    // BOS glow — pulses
    if (setup) {
      const alpha = isInspected ? 0.45 : (0.12 + 0.10 * pulse);
      ctx.globalAlpha = alpha; ctx.fillStyle = col;
      ctx.fillRect(x - 4, bTop - 4, cw + 8, bh + 8);
      ctx.globalAlpha = 1;
    }

    // Body
    if (c.partial) {
      ctx.globalAlpha = 0.55; ctx.fillStyle = col; ctx.fillRect(x, bTop, cw, bh); ctx.globalAlpha = 1;
      ctx.strokeStyle = col; ctx.lineWidth = 0.8;
      ctx.setLineDash([2, 2]); ctx.strokeRect(x, bTop, cw, bh); ctx.setLineDash([]);
    } else {
      ctx.fillStyle = col; ctx.fillRect(x, bTop, cw, bh);
    }

    // Structure labels — clean, no duplicate "TAP" on every candle
    ctx.textAlign = 'center';
    if (setup) {
      ctx.font = 'bold 8px ' + MONO; ctx.fillStyle = '#4cc3ff';
      ctx.fillText('BOS ⚡', midX, CY(c.hi) - 5);
    } else if (isOB) {
      ctx.font = 'bold 7px ' + MONO; ctx.fillStyle = '#d8b4fe';
      ctx.fillText('OB', midX, CY(c.hi) - 4);
    }
    ctx.textAlign = 'left';
  });

  // ---- Tap-to-inspect callout ----
  if (inspectedSetup) {
    const s = inspectedSetup;
    const bosX = cX + s.bosIdx * (cw + cg) + cw / 2;
    const bosCandle = all[s.bosIdx];
    const tipY = bosCandle ? CY(bosCandle.hi) - 14 : cY + 20;
    const isLong = s.dir === 'long';
    const tipW = 154, tipH = 56;
    const tipX = Math.min(Math.max(bosX - tipW / 2, 4), W - tipW - 4);
    // Background
    ctx.fillStyle = 'rgba(10,14,26,0.96)';
    rr(tipX, tipY - tipH, tipW, tipH, 8); ctx.fill();
    ctx.strokeStyle = isLong ? '#16c784' : '#ea3943'; ctx.lineWidth = 1.5;
    rr(tipX, tipY - tipH, tipW, tipH, 8); ctx.stroke();
    // Content
    ctx.font = 'bold 10px ' + MONO; ctx.textAlign = 'left';
    ctx.fillStyle = isLong ? '#3ddc6a' : '#f3838a';
    ctx.fillText((isLong ? '▲ BULLISH' : '▼ BEARISH') + ' SETUP', tipX + 9, tipY - tipH + 17);
    ctx.font = '9px ' + MONO; ctx.fillStyle = '#c9d1d9';
    ctx.fillText('BOS: Price broke ' + (isLong ? 'above' : 'below') + ' prior range', tipX + 9, tipY - tipH + 31);
    ctx.fillText('OB at candle ' + (s.obIdx - s.bosIdx) + ' = entry zone', tipX + 9, tipY - tipH + 44);
    ctx.font = '8px ' + MONO; ctx.fillStyle = '#46546a'; ctx.textAlign = 'right';
    ctx.fillText('TAP ELSEWHERE TO DISMISS', tipX + tipW - 6, tipY - 5);
    ctx.textAlign = 'left';
  }

  // ---- Mini Shell: movable character on the HTF chart ----
  const nCTotal = allRaw.length; // total candle count (for "YOU ARE HERE" check)
  // Clamp miniJ to valid range in the full array
  htfZoomState.miniJ = Math.max(0, Math.min(htfZoomState.miniJ, nCTotal - 1));
  const dispJ = Math.max(0, Math.min(miniJRel, all.length - 1)); // visible position
  const miniC = all[dispJ];
  if (miniC && dispJ >= 0 && dispJ < all.length) {
    const mFloor = CY(Math.max(miniC.open, miniC.h)); // top of the candle body
    const mOffY  = htfZoomState.miniY || 0;
    const mx = cX + dispJ * (cw + cg) + cw / 2;
    const my = mFloor + mOffY;
    // Price level line
    ctx.strokeStyle = 'rgba(76, 195, 255, 0.35)';
    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cX, mFloor); ctx.lineTo(cX + cW + 44, mFloor); ctx.stroke();
    ctx.setLineDash([]);
    // Mini Shell body
    ctx.fillStyle = COLOR.turtleShell;
    ctx.beginPath(); ctx.arc(mx, my - 6, 7, Math.PI, 0); ctx.fill();
    ctx.fillStyle = COLOR.turtleBody;
    ctx.beginPath(); ctx.arc(mx + 8, my - 7, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COLOR.turtleBody; ctx.fillRect(mx - 7, my - 3, 16, 4);
    const isLive = htfZoomState.miniJ >= nCTotal - 1;
    ctx.font = isLive ? 'bold 8px ' + MONO : '7px ' + MONO;
    ctx.fillStyle = isLive ? '#4cc3ff' : '#7d8aa0';
    ctx.textAlign = 'center';
    ctx.fillText(isLive ? 'NOW' : (htfZoomState.miniJ - (nC - 1)) + '', mx, my - 18);
    ctx.textAlign = 'left';
  }

  // VWAP label pinned to right side
  const lastVY = CY(vwapVals[all.length - 1]);
  if (lastVY > cY && lastVY < cY + cH) {
    ctx.font = '7px ' + MONO; ctx.fillStyle = 'rgba(255,200,60,0.85)';
    ctx.textAlign = 'right'; ctx.fillText('VWAP', W - 5, lastVY - 3); ctx.textAlign = 'left';
  }

  // ---- Legend strip ----
  const ly = cY + cH + 12;
  // Row 1: key terms
  ctx.font = '8px ' + MONO;
  const legendItems = [
    { col: '#a855f7', t: '■ OB = Order Block (big bank entry zone)' },
    { col: '#4cc3ff', t: '  ·  BOS ⚡ = Break of Structure (momentum shift)' },
    { col: 'rgba(255,200,60,0.8)', t: '  ·  — VWAP  ·  - - Trend Line' },
  ];
  let legendX = cX;
  legendItems.forEach(({ col, t }) => {
    ctx.fillStyle = col;
    ctx.fillText(t, legendX, ly);
    legendX += ctx.measureText(t).width;
  });

  // Row 2: structure count + current setup grade
  ctx.font = '8.5px ' + MONO;
  if (htfSetups.length) {
    ctx.fillStyle = '#c9b3ff'; ctx.textAlign = 'right';
    ctx.fillText(htfSetups.length + ' structure event' + (htfSetups.length > 1 ? 's' : '') + ' on this Time Frame', W - 8, ly);
    ctx.textAlign = 'left';
  }
  if (setupZone && setupZone.quality) {
    const qc = { A: '#16c784', B: '#ffd60a', C: '#7d8aa0' };
    const q  = setupZone.quality;
    ctx.font = '9px ' + MONO; ctx.fillStyle = '#7d8aa0';
    ctx.fillText('Current 1m setup: GRADE ', cX, ly + 16);
    ctx.font = 'bold 9px ' + MONO; ctx.fillStyle = qc[q];
    ctx.fillText(q + (setupZone.vwapAligned ? '  ✓ VWAP' : '  ✗ VWAP') +
                    (setupZone.trendAligned ? '  ✓ Trend' : '  ✗ Trend'), cX + 132, ly + 16);
  }

  // Row 3: tap hint (single, not per-candle)
  if (!inspectedSetup && htfSetups.length) {
    ctx.font = '8px ' + MONO; ctx.fillStyle = 'rgba(76,195,255,0.6)'; ctx.textAlign = 'center';
    ctx.fillText('TAP any BOS ⚡ or OB candle to inspect it', W / 2, ly + 32);
    ctx.textAlign = 'left';
  }

  // Bottom hint bar
  ctx.font = '8px ' + MONO; ctx.fillStyle = '#46546a'; ctx.textAlign = 'center';
  const scrollStr = (htfZoomState.scrollOff || 0) > 0 ? '  · ← ' + (htfZoomState.scrollOff || 0) + ' candles back' : '';
  ctx.fillText('SWIPE ← → to explore history  ·  SWIPE ↑ to jump' + scrollStr, W / 2, H - 22);
  ctx.font = 'bold 9px ' + MONO; ctx.fillStyle = '#4cc3ff';
  ctx.fillText('TAP ANYWHERE TO RETURN TO GAME', W / 2, H - 10);
  ctx.textAlign = 'left';
}

/* ---- VWAP line drawn on the main chart ---- */
function drawVWAP(cameraX) {
  const vis = candles.filter(c => c.vwap &&
    c.id <= maxSeenCandleId &&
    c.x + c.w > cameraX - 50 && c.x < cameraX + W + 50);
  if (vis.length < 2) return;
  ctx.strokeStyle = 'rgba(255, 200, 60, 0.75)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  let started = false;
  for (const c of vis) {
    const sx = c.x + c.w / 2 - cameraX;
    const sy = groundY - c.vwap;
    if (!started) { ctx.moveTo(sx, sy); started = true; }
    else ctx.lineTo(sx, sy);
  }
  if (started) ctx.stroke();
  // Label pinned to the right edge of the line
  const last = vis[vis.length - 1];
  const sy = groundY - last.vwap;
  if (sy > camY + 60 && sy < groundY - 4) {
    ctx.font = '8px ' + MONO;
    ctx.fillStyle = 'rgba(255, 200, 60, 0.9)';
    ctx.textAlign = 'right';
    ctx.fillText('VWAP', W - 5, sy - 3);
    ctx.textAlign = 'left';
  }
}

/* ---- Volume bars in the dead space just below the chart floor ---- */
function drawVolumeBars(cameraX) {
  const barMaxH = 11, y0 = groundY + 4;
  for (const c of candles) {
    if (c.id > maxSeenCandleId + 2) continue;
    const sx = c.x - cameraX;
    if (sx > W + 10 || sx + c.w < -10 || !c.vol) continue;
    const barH = Math.max(2, Math.round((c.vol / maxVol) * barMaxH));
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = c.color === 'green' ? COLOR.greenBody : COLOR.redBody;
    ctx.fillRect(sx + 1, y0, c.w - 2, barH);
    ctx.globalAlpha = 1;
  }
}

/* ---- Auto trend lines: connect last two swing-pivot highs (resistance)
   and last two swing-pivot lows (support) then extend to screen edges ---- */
function drawTrendLines(cameraX) {
  const seen = candles.filter(c => c.id <= maxSeenCandleId);
  if (seen.length < 8) return;
  const pivH = [], pivL = [];
  for (let i = 3; i < seen.length - 3; i++) {
    const hi = Math.max(seen[i].open, seen[i].h) + seen[i].wick;
    const lo = Math.min(seen[i].open, seen[i].h) - (seen[i].wick2 || 0);
    const okH = [1,2,3].every(d =>
      hi > Math.max(seen[i-d].open, seen[i-d].h) + seen[i-d].wick &&
      hi > Math.max(seen[i+d].open, seen[i+d].h) + seen[i+d].wick);
    const okL = [1,2,3].every(d =>
      lo < Math.min(seen[i-d].open, seen[i-d].h) - (seen[i-d].wick2 || 0) &&
      lo < Math.min(seen[i+d].open, seen[i+d].h) - (seen[i+d].wick2 || 0));
    if (okH) pivH.push({ wx: seen[i].x + seen[i].w / 2, wy: groundY - hi });
    if (okL) pivL.push({ wx: seen[i].x + seen[i].w / 2, wy: groundY - lo });
  }
  const drawLine = (p1, p2, col) => {
    if (!p1 || !p2 || p1.wx === p2.wx) return;
    const slope = (p2.wy - p1.wy) / (p2.wx - p1.wx);
    const yL = p2.wy + slope * (cameraX - p2.wx);
    const yR = p2.wy + slope * (cameraX + W - p2.wx);
    if (Math.min(yL, yR) > groundY + 5 || Math.max(yL, yR) < camY + 50) return;
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 5]);
    ctx.beginPath();
    ctx.moveTo(0, yL);
    ctx.lineTo(W, yR);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = col;
    [p1, p2].forEach(p => {
      if (p.wx >= cameraX && p.wx <= cameraX + W) {
        ctx.beginPath();
        ctx.arc(p.wx - cameraX, p.wy, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  };
  if (pivH.length >= 2) drawLine(pivH[pivH.length-2], pivH[pivH.length-1], 'rgba(234,57,67,0.45)');
  if (pivL.length >= 2) drawLine(pivL[pivL.length-2], pivL[pivL.length-1], 'rgba(22,199,132,0.45)');
}

/* ---- HTF mini-panel: 5m / 15m / 1h candles, always visible top-right ----
   Shows 3 closed candles + 1 building (partial/dashed) per timeframe.
   Teaching purpose: check HTF direction before acting on a 1m setup. ---- */
function drawHTFPanel() {
  const nCandles = 4; // 3 closed + 1 building
  const cw = 14, gap = 2, labelW = 28, padH = 5;
  const rowH = 23;
  const panW = labelW + nCandles * (cw + gap) + 8;
  const panH = htf.length * rowH + padH * 2;
  const px = W - panW - 4, py = 50;

  ctx.fillStyle = 'rgba(10, 14, 20, 0.88)';
  rr(px, py, panW, panH, 5); ctx.fill();
  ctx.strokeStyle = '#2a3442';
  ctx.lineWidth = 0.8;
  rr(px, py, panW, panH, 5); ctx.stroke();

  htf.forEach((tf, row) => {
    const ry = py + padH + row * rowH;
    const midY = ry + rowH / 2;

    // Label — brighter when the TF has data (indicates it's tappable)
    const hasData = tf.candles.length > 0 || tf.cur;
    ctx.font = 'bold 7px ' + MONO;
    ctx.fillStyle = hasData ? '#7fd6ff' : '#3d4b5e';
    ctx.textAlign = 'left';
    ctx.fillText(HTF_LABELS[row], px + 4, midY + 3);
    if (hasData) {
      ctx.font = '6px ' + MONO;
      ctx.fillStyle = '#46546a';
      ctx.fillText('▶', px + 4 + 18, midY + 3);
    }

    // Build display: last (nCandles-1) closed candles + building partial candle
    const all = [...tf.candles.slice(-(nCandles - 1))];
    if (tf.cur) all.push({ ...tf.cur, partial: true });

    if (!all.length) {
      ctx.fillStyle = '#3d4b5e';
      ctx.fillText('—', px + labelW + 2, midY + 3);
      return;
    }

    const lo = Math.min(...all.map(c => c.lo));
    const hi = Math.max(...all.map(c => c.hi));
    const range = Math.max(1, hi - lo);
    const scaleH = rowH - 6;
    const cx0 = px + labelW + 2;

    all.forEach((c, j) => {
      const x = cx0 + j * (cw + gap);
      const col = c.color === 'green' ? COLOR.greenBody : COLOR.redBody;
      const bodyTop = ry + 2 + scaleH * (1 - (Math.max(c.open, c.h) - lo) / range);
      const bodyBot = ry + 2 + scaleH * (1 - (Math.min(c.open, c.h) - lo) / range);
      const bh = Math.max(2, bodyBot - bodyTop);
      const chiH = c.hi !== undefined ? c.hi : Math.max(c.open, c.h);
      const chiL = c.lo !== undefined ? c.lo : Math.min(c.open, c.h);
      const wickT = ry + 2 + scaleH * (1 - (chiH - lo) / range);
      const wickB = ry + 2 + scaleH * (1 - (chiL - lo) / range);
      const midX = x + cw / 2;

      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(midX, wickT); ctx.lineTo(midX, wickB); ctx.stroke();

      if (c.partial) {
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = col; ctx.fillRect(x, bodyTop, cw, bh);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = col; ctx.lineWidth = 0.8;
        ctx.setLineDash([2, 2]);
        ctx.strokeRect(x, bodyTop, cw, bh);
        ctx.setLineDash([]);
      } else {
        ctx.fillStyle = col; ctx.fillRect(x, bodyTop, cw, bh);
      }
    });
  });

  ctx.font = '6px ' + MONO;
  ctx.fillStyle = '#3d4b5e';
  ctx.textAlign = 'right';
  ctx.fillText('HTF', px + panW - 3, py + panH - 2);
  ctx.textAlign = 'left';
}

function render(cameraX) {
  // Dark trading-terminal background
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(0, 0, W, H);

  // World layer: shifted by the vertical camera (HUD stays fixed).
  // A decaying random jolt is added after a stop-out.
  ctx.save();
  const jolt = shakeT > 0 ? 16 * shakeT : 0;
  ctx.translate((Math.random() - 0.5) * jolt, -camY + (Math.random() - 0.5) * jolt);

  // Chart floor: thin muted line. Candles FLOAT above it like a real
  // chart — the space underneath is dead chart space (reserved: ads).
  ctx.strokeStyle = COLOR.ground;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, groundY + 0.5);
  ctx.lineTo(W, groundY + 0.5);
  ctx.stroke();

  /* MISSION PANEL in the dead chart space — the goal in plain numbers.
     One glance answers: what do I need, where am I, what kills me. */
  {
    const target = Math.round(session.startBal * (1 + session.targetPct / 100));
    const fail   = Math.round(session.startBal * (1 - session.failPct / 100));
    const minsLeft = session.perHour - session.candles;
    const x0 = 14, y0 = groundY + 22;

    ctx.font = 'bold 10px ' + MONO;
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('MISSION — HOUR ' + session.level, x0, y0);
    ctx.fillStyle = '#c7d1de';
    ctx.font = '11px ' + MONO;
    const frac0 = Math.max(0, Math.min(1, (player.shells - fail) / (target - fail)));
    const dangerStr = player.shells < fail * 1.05 ? ' ⚠ DANGER' : frac0 < 0.5 && minsLeft < 20 ? ' · NEED SETUPS!' : '';
    ctx.fillText('Reach ' + fmt(target) + ' SHELLS · ' + minsLeft + ' min left' + dangerStr, x0, y0 + 17);

    // Progress bar: BUST on the left end, GOAL on the right end,
    // the fill is where your balance sits between them
    const frac = frac0;
    const hitGoal = player.shells >= target;
    drawBar(x0, y0 + 26, W - 28, 9, frac, hitGoal ? COLOR.greenBody : '#4cc3ff');

    ctx.font = '9px ' + MONO;
    ctx.fillStyle = COLOR.redBody;
    ctx.fillText('BUST ' + fmt(fail), x0, y0 + 49);
    ctx.fillStyle = hitGoal ? COLOR.greenBody : '#e6edf3';
    ctx.textAlign = 'center';
    ctx.fillText('NOW ' + fmt(player.shells) + (hitGoal ? ' ✓' : ''), W / 2, y0 + 49);
    ctx.fillStyle = COLOR.greenBody;
    ctx.textAlign = 'right';
    ctx.fillText('GOAL ' + fmt(target), W - 14, y0 + 49);
    ctx.textAlign = 'left';
  }

  /* Price axis (right side): height ↔ dollars, anchored to the candle
     nearest the screen centre so labels always match the local chart */
  const midWorldX = cameraX + W / 2;
  const anchor = candles.find(c => midWorldX >= c.x && midWorldX < c.x + c.w)
              || candles[Math.floor(candles.length / 2)];
  let ppp = 0; // dollars per pixel of height
  if (anchor) {
    ppp = anchor.price / (CFG.pxPerPct * 100);
    ctx.font = '9px ' + MONO;
    ctx.textAlign = 'right';
    const yStart = Math.ceil((camY + 70) / 90) * 90;
    for (let y = yStart; y < camY + H - 30; y += 90) {
      if (y > groundY - 6) continue;
      ctx.strokeStyle = 'rgba(90, 107, 130, 0.13)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
      ctx.stroke();
      const price = anchor.price + ((groundY - anchor.h) - y) * ppp;
      ctx.fillStyle = '#5a6b82';
      ctx.fillText(fmtPrice(price), W - 5, y - 3);
    }
    ctx.textAlign = 'left';
  }

  for (const c of candles) drawCandle(c, cameraX);

  // VWAP line, trend lines, and volume bars (layered over candle bodies)
  drawVWAP(cameraX);
  drawTrendLines(cameraX);
  drawVolumeBars(cameraX);

  // Coins: gold spinning discs on candle tops
  for (const coin of coins) {
    if (coin.collected) continue;
    const sx = coin.x - cameraX;
    if (sx < -30 || sx > W + 30) continue;
    const bob = Math.sin(coin.bobT) * 3;
    const sy = coin.y + bob;
    // Glow (teal shell colour)
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = '#40e0d0';
    ctx.beginPath(); ctx.arc(sx, sy, coin.r + 4, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Body
    ctx.fillStyle = '#40e0d0';
    ctx.beginPath(); ctx.ellipse(sx, sy, coin.r, coin.r * 0.7, 0, 0, Math.PI * 2); ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(220,255,252,0.6)';
    ctx.beginPath(); ctx.ellipse(sx - 1.5, sy - 1, coin.r * 0.35, coin.r * 0.2, -0.4, 0, Math.PI * 2); ctx.fill();
    // Shell spiral mark
    ctx.font = 'bold 7px ' + MONO; ctx.fillStyle = '#006b63'; ctx.textAlign = 'center';
    ctx.fillText('🐚', sx, sy + 3); ctx.textAlign = 'left';
  }

  // Combo counter (shown when combo >= 3)
  if (combo.count >= 3) {
    const alpha = Math.min(1, combo.t / 1.5);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 13px ' + MONO;
    ctx.fillStyle = '#ffd60a';
    ctx.textAlign = 'right';
    ctx.fillText('🔥 ' + combo.count + 'x COMBO', W - 12, groundY + 22);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }

  /* SETUP ZONE: while a setup is live, the candles that constitute it
     (order block → BOS) are boxed so the player sees WHY the banner
     fired. Tapping the candles inside explains each one. */
  if (setupZone) {
    const zc = candles.filter(c => c.id >= setupZone.from && c.id <= setupZone.to);
    if (zc.length) {
      let x0 = Infinity, x1 = -Infinity, yTop = Infinity, yBot = -Infinity;
      for (const c of zc) {
        x0 = Math.min(x0, c.x);
        x1 = Math.max(x1, c.x + c.w);
        yTop = Math.min(yTop, candleTop(c) - c.wick);
        yBot = Math.max(yBot, groundY - Math.min(c.open, c.h) + c.wick2);
      }
      const pulse = 0.5 + Math.sin(turtle.animT * 5) * 0.25;
      ctx.fillStyle = 'rgba(76, 195, 255, 0.07)';
      ctx.fillRect(x0 - 6 - cameraX, yTop - 14, x1 - x0 + 12, yBot - yTop + 22);
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#4cc3ff';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(x0 - 6 - cameraX + 0.5, yTop - 13.5, x1 - x0 + 12, yBot - yTop + 22);
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      ctx.font = 'bold 9px ' + MONO;
      ctx.fillStyle = '#4cc3ff';
      ctx.fillText('SETUP: OB + BOS ' + (setupZone.dir === 'long' ? '▲' : '▼'),
                   x0 - 4 - cameraX, yTop - 19);
    }
  }

  /* THE LIVE EDGE: the future hasn't printed. A fog veil hides
     everything past the last revealed candle — the player trades the
     right edge of the chart, just like real life. */
  const lastVis = candles.find(cc => cc.id === maxSeenCandleId + 2)
               || candles[candles.length - 1];
  if (lastVis) {
    const edgeX = lastVis.x + lastVis.w - cameraX;
    if (edgeX < W + 60) {
      const g = ctx.createLinearGradient(edgeX - 56, 0, edgeX, 0);
      g.addColorStop(0, 'rgba(10, 14, 20, 0)');
      g.addColorStop(1, 'rgba(10, 14, 20, 0.98)');
      ctx.fillStyle = g;
      ctx.fillRect(edgeX - 56, camY - 300, 56, H + 600);
      ctx.fillStyle = 'rgba(10, 14, 20, 0.98)';
      ctx.fillRect(edgeX, camY - 300, Math.max(0, W - edgeX) + 60, H + 600);
      // Dashed marker so the boundary reads as "now"
      ctx.strokeStyle = 'rgba(76, 195, 255, 0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(edgeX + 0.5, camY + 60);
      ctx.lineTo(edgeX + 0.5, groundY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '8px ' + MONO;
      ctx.fillStyle = 'rgba(76, 195, 255, 0.5)';
      ctx.textAlign = 'center';
      ctx.fillText('LIVE EDGE', edgeX, camY + 54);
      ctx.textAlign = 'left';
    }
  }

  // Open trade: SL / TP / entry levels drawn straight onto the chart.
  // The turtle is literally walking the price — the player watches the
  // candle tops climb toward TP or sink toward SL in real time.
  if (trade && anchor) {
    const lvl = (h, color, label, dash) => {
      const y = groundY - h;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(dash);
      ctx.beginPath();
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = 'bold 10px ' + MONO;
      ctx.fillStyle = color;
      // Name on the left, dollar price on the right — like a platform
      const price = anchor.price + (h - anchor.h) * ppp;
      ctx.fillText(label + ' ' + fmtPrice(price), 8, y - 4);
    };
    lvl(trade.tpH,    COLOR.greenBody, 'TAKE PROFIT', [7, 5]);
    lvl(trade.slH,    COLOR.redBody,   'STOP LOSS',   [7, 5]);
    lvl(trade.entryH, '#7d8aa0',       'ENTRY',       [2, 4]);
  }

  // Bounce-pad rings: expanding purple circles from order blocks
  for (const r of rings) {
    ctx.globalAlpha = r.t * 1.6;
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(r.x - cameraX, r.y, 8 + (0.5 - r.t) * 110, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Motion trail (wick spin + fling): fading green ghosts behind Shell
  for (const p of turtle.trail) {
    if (p.life <= 0) continue;
    ctx.globalAlpha = p.life * 0.35;
    ctx.fillStyle = COLOR.turtleShell;
    ctx.beginPath();
    ctx.arc(p.x - cameraX, p.y, Math.max(0.5, 3 + 9 * p.life), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  drawTurtle(cameraX);

  // While Shell is on the back half of the twirl, the pole (wick)
  // passes in FRONT of him — redraw it over the sprite.
  if (turtle.spinning && Math.cos(turtle.spinPhase) < 0) {
    ctx.strokeStyle = COLOR.wick;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(turtle.tipX - cameraX, turtle.spinBase);
    ctx.lineTo(turtle.tipX - cameraX, turtle.tipY);
    ctx.stroke();
  }

  ctx.restore();
  drawHUD();
}

/* ---------- HUD: minimal trading-terminal top bar ----------
   SHELLS balance | LVL + XP bar | jetpack FUEL bar.
   Dark, monospace, hairline borders — like a tiny exchange UI. */
const MONO = 'ui-monospace, Menlo, Consolas, monospace';
const SANS = "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif";

function drawBar(x, y, bw, bh, frac, fillColor) {
  ctx.strokeStyle = '#2a3442';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, bw, bh);
  ctx.fillStyle = fillColor;
  ctx.fillRect(x + 1.5, y + 1.5, Math.max(0, (bw - 3) * Math.min(1, frac)), bh - 2);
}

function drawHUD() {
  const bar = 46;
  // Bar background + hairline bottom border
  ctx.fillStyle = 'rgba(10, 14, 20, 0.92)';
  ctx.fillRect(0, 0, W, bar);
  ctx.fillStyle = '#2a3442';
  ctx.fillRect(0, bar, W, 1);

  // Jetpack fuel (left) — dims while a burst is unaffordable
  ctx.font = '9px ' + MONO;
  ctx.fillStyle = '#7d8aa0';
  ctx.fillText('FUEL', 12, 17);
  drawBar(12, 24, 88, 7, turtle.fuel / CFG.fuelMax,
          turtle.fuel >= CFG.jetpackCost ? COLOR.flameOuter : '#6e5436');

  // Rank + Level + XP progress (centre). The XP bar = progress to next rank.
  const lx = Math.round(W * 0.42);
  const rk = rankForLevel(player.level);
  ctx.font = '9px ' + MONO;
  ctx.fillStyle = '#7d8aa0';
  ctx.fillText('LVL', lx, 17);
  ctx.font = 'bold 12px ' + MONO;
  ctx.fillStyle = '#e6edf3';
  ctx.fillText(String(player.level), lx + 24, 17);
  ctx.font = 'bold 10px ' + SANS;
  ctx.fillStyle = rk.color;
  ctx.fillText(rk.emoji + ' ' + rk.name, lx + 44, 17);
  drawBar(lx, 24, 90, 7, player.xp / player.xpNeeded, rk.color);

  // SHELLS balance (right, right-aligned) — the number players watch.
  // While a trade is open it shows EQUITY (balance + unrealised P&L),
  // ticking green/red with the market: the player feels the position.
  ctx.textAlign = 'right';
  ctx.font = '10px ' + SANS;
  ctx.fillStyle = '#7d8aa0';
  ctx.fillText('SHELLS', W - 12, 17);
  const uPnL = trade ? trade.riskAmt * (trade.leverage || 1) * tradeR() : 0;
  ctx.font = 'bold 17px ' + MONO;
  ctx.fillStyle = !trade ? COLOR.greenBody
                : uPnL >= 0 ? COLOR.greenBody : COLOR.redBody;
  ctx.fillText(fmt(player.shells + uPnL), W - 12, 36);
  // Leverage badge
  if (leverage.current > 1 && trade) {
    ctx.font = 'bold 9px ' + SANS;
    ctx.fillStyle = '#ff9f43';
    ctx.fillText(leverage.current + '×LEV', W - 12, 48);
  }
  if (trade) {
    ctx.font = 'bold 10px ' + MONO;
    ctx.fillStyle = uPnL >= 0 ? COLOR.greenBody : COLOR.redBody;
    ctx.fillText((uPnL >= 0 ? '+' : '−') + fmt(Math.abs(uPnL)) + ' OPEN', W - 12, 50);
  }
  ctx.textAlign = 'left';

  // Open-trade chip just under the bar — or running stats between trades
  if (trade) {
    ctx.font = 'bold 10px ' + MONO;
    ctx.fillStyle = trade.dir === 'long' ? COLOR.greenBody : COLOR.redBody;
    const levLabel = (trade.leverage || 1) > 1 ? ' · ' + (trade.leverage || 1) + '×LEV' : '';
    ctx.fillText(
      (trade.dir === 'long' ? '▲ LONG' : '▼ SHORT') +
      ' · RISK ' + fmt(trade.riskAmt) + levLabel +
      ' · TARGET +' + fmt(trade.riskAmt * (trade.leverage || 1) * trade.rr) + ' SHELLS', 12, 60);
  } else if (stats.trades > 0) {
    ctx.font = '10px ' + MONO;
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText(
      'TRADES ' + stats.trades +
      ' · WIN ' + Math.round(stats.wins / stats.trades * 100) + '%' +
      ' · NET ' + (stats.net >= 0 ? '+' : '−') + fmt(Math.abs(stats.net)) + ' SHELLS', 12, 60);
  }

  // Hour progress: thin bar along the very top of the screen
  ctx.fillStyle = '#1c2737';
  ctx.fillRect(0, 0, W, 3);
  ctx.fillStyle = '#4cc3ff';
  ctx.fillRect(0, 0, W * Math.min(1, session.candles / session.perHour), 3);

  // Data source + hour clock — players should know the chart is real
  ctx.font = '8px ' + MONO;
  ctx.fillStyle = '#46546a';
  ctx.textAlign = 'center';
  ctx.fillText('HOUR ' + session.level + ' · MIN ' + session.candles + '/' + session.perHour +
               ' · ' + dataSource, W / 2, 58);
  ctx.textAlign = 'left';

  // Floating P&L / level-up texts (rise and fade under the balance)
  for (const f of floaters) {
    ctx.globalAlpha = Math.min(1, f.t);
    ctx.font = 'bold 14px ' + MONO;
    ctx.textAlign = 'right';
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, W - 12, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // Win/loss full-screen flash
  if (flashT > 0) {
    ctx.globalAlpha = flashT * 0.22;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  drawHTFPanel();
  if (htfZoomState) drawHTFZoom(); // full-screen overlay — drawn last, on top of everything
}

/* =========================================================
   CANDLE ACADEMY — tap-through intro cards
   Draws onto the main canvas before the game loop starts.
   drawAcadShell() is a self-contained turtle renderer that
   doesn't depend on the live turtle game object.
   ========================================================= */

function drawAcadShell(cx, cy, scale, emotion) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const w = 40, h = 36, ox = -w / 2, oy = -h / 2;

  // Legs
  ctx.fillStyle = COLOR.turtleBody;
  rr(ox + w * 0.28, oy + h * 0.78, 8, 7, 3); ctx.fill();
  rr(ox + w * 0.54, oy + h * 0.78, 8, 7, 3); ctx.fill();

  // Neck + head
  ctx.fillRect(ox + w * 0.68, oy + h * 0.34, 8, 8);
  ctx.beginPath();
  ctx.arc(ox + w * 0.85, oy + h * 0.38, 8, 0, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  if (emotion === 'happy' || emotion === 'excited') {
    ctx.arc(ox + w * 0.88, oy + h * 0.44, 3.5, 0.1 * Math.PI, 0.7 * Math.PI);
  } else if (emotion === 'worried') {
    ctx.arc(ox + w * 0.88, oy + h * 0.52, 3, -0.65 * Math.PI, -0.15 * Math.PI);
  } else {
    ctx.moveTo(ox + w * 0.855, oy + h * 0.47);
    ctx.lineTo(ox + w * 0.905, oy + h * 0.47);
  }
  ctx.stroke();

  // Shell dome
  const shellL = ox + w * 0.08, shellR = ox + w * 0.74;
  const shellBot = oy + h * 0.82, shellTop = oy + h * 0.02;
  ctx.beginPath();
  ctx.moveTo(shellL, shellBot);
  ctx.bezierCurveTo(shellL, shellTop, shellR, shellTop, shellR, shellBot);
  ctx.closePath();
  ctx.fillStyle = COLOR.turtleShell;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.stroke();

  // Belly band
  ctx.fillStyle = COLOR.turtleBelly;
  rr(shellL + 2, shellBot - 4, shellR - shellL - 4, 4, 2); ctx.fill();

  // Hex pattern clipped to dome
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(shellL, shellBot);
  ctx.bezierCurveTo(shellL, shellTop, shellR, shellTop, shellR, shellBot);
  ctx.closePath();
  ctx.clip();
  const hcx2 = (shellL + shellR) / 2, hcy2 = oy + h * 0.45, hr2 = 5.5;
  ctx.strokeStyle = COLOR.turtleOutline;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const a = (Math.PI / 3) * i;
    if (i === 0) ctx.moveTo(hcx2 + Math.cos(a) * hr2, hcy2 + Math.sin(a) * hr2);
    else         ctx.lineTo(hcx2 + Math.cos(a) * hr2, hcy2 + Math.sin(a) * hr2);
  }
  ctx.stroke();
  for (let i = 0; i < 3; i++) {
    const a = (Math.PI * 2 / 3) * i;
    ctx.beginPath();
    ctx.moveTo(hcx2 + Math.cos(a) * hr2, hcy2 + Math.sin(a) * hr2);
    ctx.lineTo(hcx2 + Math.cos(a) * (hr2 + 8), hcy2 + Math.sin(a) * (hr2 + 8));
    ctx.stroke();
  }
  ctx.restore();

  // Sunglasses
  ctx.fillStyle = COLOR.lens;
  ctx.beginPath();
  ctx.ellipse(ox + w * 0.83, oy + h * 0.30, 3.4, 3.0, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(ox + w * 0.95, oy + h * 0.30, 3.4, 3.0, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = COLOR.lens;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(ox + w * 0.86, oy + h * 0.30);
  ctx.lineTo(ox + w * 0.92, oy + h * 0.30);
  ctx.stroke();
  ctx.fillStyle = COLOR.lensShine;
  ctx.beginPath();
  ctx.arc(ox + w * 0.955, oy + h * 0.27, 1.0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(ox + w * 0.835, oy + h * 0.27, 1.0, 0, Math.PI * 2); ctx.fill();

  // Graduation cap — Shell is in study mode during the Academy
  const hatHx = ox + w * 0.85;             // align with head centre
  const hatBY = oy + h * 0.38 - 8;        // top of the head circle
  ctx.fillStyle = '#12151e';
  ctx.fillRect(hatHx - 7, hatBY - 9, 14, 9);   // square cap top
  ctx.fillRect(hatHx - 12, hatBY,    24, 3);    // wide flat brim
  ctx.strokeStyle = '#ffd60a'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(hatHx + 4, hatBY - 7);
  ctx.lineTo(hatHx + 11, hatBY + 2);
  ctx.stroke();
  ctx.fillStyle = '#ffd60a';
  ctx.beginPath(); ctx.arc(hatHx + 11, hatBY + 2, 2, 0, Math.PI * 2); ctx.fill();

  // Excited sparkles
  if (emotion === 'excited') {
    ctx.fillStyle = '#ffd60a';
    ctx.font = (5 / scale) + 'px serif';  // compensate for outer scale
    ctx.textAlign = 'center';
    ctx.fillText('✦', w * 0.99 + ox, h * 0.10 + oy);
    ctx.fillText('✦', w * 1.08 + ox, h * 0.28 + oy);
  }

  ctx.restore();
}

function drawCandleAcademy() {
  const ac = candleAcademy;
  const cx = W / 2;
  const FONT_UI = '-apple-system, BlinkMacSystemFont, system-ui, sans-serif';
  const bob = Math.sin(ac.t * 2) * 3;  // gentle float

  // Background
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle dot grid
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let gx = 20; gx < W; gx += 40) {
    for (let gy = 20; gy < H; gy += 40) {
      ctx.beginPath(); ctx.arc(gx, gy, 1, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Progress dots
  const dotR = 4, dotGap = 16;
  for (let i = 0; i < ac.total; i++) {
    ctx.beginPath();
    ctx.arc(cx + (i - (ac.total - 1) / 2) * dotGap, 40, dotR, 0, Math.PI * 2);
    ctx.fillStyle = i === ac.card ? '#7c4dff' : 'rgba(255,255,255,0.14)';
    ctx.fill();
  }

  // SKIP button (top-right)
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rr(W - 66, 20, 52, 30, 6); ctx.fill();
  ctx.fillStyle = '#5a6b82';
  ctx.font = '11px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.fillText('SKIP', W - 40, 40);

  // ---- Card content ----
  const card = ac.card;

  if (card === 0) {
    // Speech bubble — centered near the top, tail pointing down to Shell.
    // Width is clamped to the screen so it never runs off the edge.
    const bw = Math.min(296, W - 36), bh = 84;
    const bx = cx - bw / 2, by = H * 0.10;
    ctx.fillStyle = 'rgba(22,16,44,0.96)';
    rr(bx, by, bw, bh, 12); ctx.fill();
    ctx.strokeStyle = '#7c4dff'; ctx.lineWidth = 1.5;
    rr(bx, by, bw, bh, 12); ctx.stroke();
    // Downward tail (centered)
    ctx.beginPath();
    ctx.moveTo(cx - 12, by + bh);
    ctx.lineTo(cx, by + bh + 15);
    ctx.lineTo(cx + 12, by + bh);
    ctx.closePath();
    ctx.fillStyle = 'rgba(22,16,44,0.96)'; ctx.fill();
    ctx.strokeStyle = '#7c4dff'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 15px ' + FONT_UI;
    ctx.fillText("Hey! I'm Shell 🐢", cx, by + 27);
    ctx.fillStyle = '#7fd6ff'; ctx.font = '12px ' + FONT_UI;
    ctx.fillText('Win trades → earn 🐚 SHELLS', cx, by + 49);
    ctx.fillStyle = '#ffd60a';
    ctx.fillText('Reach +2% profit to level up!', cx, by + 70);

    // Shell mascot, centered below the bubble
    drawAcadShell(cx, H * 0.44 + bob, 5.2, 'excited');

    // Title + subtitle
    ctx.font = 'bold 28px ' + FONT_UI;
    ctx.fillStyle = '#c9b3ff'; ctx.textAlign = 'center';
    ctx.fillText('CHART QUEST', cx, H * 0.68);
    ctx.font = '15px ' + FONT_UI;
    ctx.fillStyle = '#7d8aa0';
    ctx.fillText('Learn crypto. One candle at a time.', cx, H * 0.74);

    // Floating stars around the shell
    ctx.font = '18px serif'; ctx.fillStyle = '#ffd60a';
    ctx.fillText('✦', cx + Math.cos(ac.t) * 70 + 58, H * 0.44 + Math.sin(ac.t * 0.7) * 16 - 40);
    ctx.fillText('✦', cx + Math.cos(ac.t + 2) * 60 - 68, H * 0.44 + Math.sin(ac.t * 0.9 + 1) * 14 - 22);

  } else if (card === 1) {
    // What is a candle? — compact layout with timeframe section
    ctx.font = 'bold 21px ' + FONT_UI;
    ctx.fillStyle = '#ffd60a';
    ctx.textAlign = 'center';
    ctx.fillText('WHAT IS A CANDLE? 🕯️', cx, H * 0.12);

    const cw = 32, bodyH = 64;

    // ── Green candle (left) ──────────────────────────────────────
    const gcx = W * 0.27, gcTop = H * 0.19, gcBot = gcTop + bodyH;
    ctx.strokeStyle = '#8b98a8'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(gcx, gcTop - 18); ctx.lineTo(gcx, gcTop);
    ctx.moveTo(gcx, gcBot);      ctx.lineTo(gcx, gcBot + 14);
    ctx.stroke();
    ctx.fillStyle = COLOR.greenBody;
    rr(gcx - cw / 2, gcTop, cw, bodyH, 3); ctx.fill();
    ctx.strokeStyle = '#0d9460'; ctx.lineWidth = 1.5;
    rr(gcx - cw / 2, gcTop, cw, bodyH, 3); ctx.stroke();
    ctx.fillStyle = '#16c784'; ctx.font = 'bold 15px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('GREEN', gcx, gcTop - 26);
    // ── Red candle (right) ───────────────────────────────────────
    const rcx = W * 0.73, rcTop = H * 0.21, rcBot = rcTop + bodyH;
    ctx.strokeStyle = '#8b98a8'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rcx, rcTop - 10); ctx.lineTo(rcx, rcTop);
    ctx.moveTo(rcx, rcBot);      ctx.lineTo(rcx, rcBot + 20);
    ctx.stroke();
    ctx.fillStyle = COLOR.redBody;
    rr(rcx - cw / 2, rcTop, cw, bodyH, 3); ctx.fill();
    ctx.strokeStyle = '#b52a30'; ctx.lineWidth = 1.5;
    rr(rcx - cw / 2, rcTop, cw, bodyH, 3); ctx.stroke();
    ctx.fillStyle = '#ea3943'; ctx.font = 'bold 15px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('RED', rcx, rcTop - 18);

    // Bottom labels aligned to the same Y so they read as a pair
    const labelY = Math.max(gcBot, rcBot) + 26;
    ctx.font = 'bold 12px ' + FONT_UI;
    ctx.fillStyle = '#3ddc6a'; ctx.textAlign = 'center';
    ctx.fillText('📈 Price went UP', gcx, labelY);
    ctx.fillStyle = '#f3838a';
    ctx.fillText('📉 Price went DOWN', rcx, labelY);

    // vs
    ctx.fillStyle = '#2a3442'; ctx.font = '13px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillText('vs', cx, gcTop + bodyH / 2 + 5);

    // ── Time frame section ───────────────────────────────────────
    // Each candle represents ONE unit of the selected time frame.
    // This section makes that crystal clear for a first-timer.
    const tfY = Math.max(gcBot, rcBot) + 40;

    ctx.fillStyle = 'rgba(124,77,255,0.08)';
    rr(W * 0.04, tfY - 16, W * 0.92, 86, 8); ctx.fill();
    ctx.strokeStyle = 'rgba(124,77,255,0.24)'; ctx.lineWidth = 1;
    rr(W * 0.04, tfY - 16, W * 0.92, 86, 8); ctx.stroke();

    ctx.fillStyle = '#c9b3ff'; ctx.font = 'bold 11px ' + FONT_UI;
    ctx.textAlign = 'center';
