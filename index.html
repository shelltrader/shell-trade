<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Chart Quest</title>
<style>
  /* Portrait stage, letterboxed on wide screens. The game + all overlays live
     inside #stage; the transform makes position:fixed overlays resolve to the
     stage box (not the viewport), so everything stays in the portrait frame. */
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
  #stage {
    position: fixed; top: 0; left: 0; overflow: hidden;
    background: #0a0e14; transform: translateZ(0);
    box-shadow: 0 0 0 1px #1c2737, 0 10px 60px rgba(0,0,0,0.6);
  }
  canvas#game { display: block; position: absolute; left: 0; top: 0; touch-action: none; }
  canvas { display: block; touch-action: none; }

  :root {
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }

  /* --- SETUP DETECTED banner (Step 6) --- */
  #setupBanner {
    display: none; position: fixed; left: 50%; bottom: calc(30px + env(safe-area-inset-bottom));
    transform: translateX(-50%); z-index: 20; cursor: pointer;
    background: rgba(22, 16, 44, 0.95); color: #c9b3ff;
    border: 1px solid #7c4dff; border-radius: 8px; padding: 13px 22px;
    font: bold 14px var(--font-ui);
    box-shadow: 0 0 18px rgba(124, 77, 255, 0.45);
    animation: bannerPulse 1s ease-in-out infinite;
    user-select: none; -webkit-user-select: none; white-space: nowrap;
    align-items: center; gap: 12px;
  }
  #bannerSkip {
    background: none; border: 1px solid rgba(124,77,255,0.5); border-radius: 50%;
    color: #7c4dff; font-size: 12px; width: 22px; height: 22px;
    line-height: 1; cursor: pointer; flex-shrink: 0; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #bannerSkip:hover { background: rgba(124,77,255,0.2); color: #c9b3ff; }
  @keyframes bannerPulse { 50% { box-shadow: 0 0 34px rgba(124, 77, 255, 0.9); } }

  /* --- Trade panel: clean centered popup (game pauses underneath) --- */
  #backdrop {
    position: fixed; inset: 0; z-index: 25;
    background: rgba(4, 6, 10, 0.62);
    opacity: 0; pointer-events: none; transition: opacity 0.22s ease;
  }
  #backdrop.open { opacity: 1; pointer-events: auto; }
  #tradePanel, #endModal {
    position: fixed; left: 50%; top: 50%; z-index: 30;
    width: min(330px, 90vw); box-sizing: border-box;
    background: #0d1320; border: 1px solid #2a3442; border-radius: 14px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.6);
    padding: 20px 18px 18px;
    font: 13px var(--font-ui); color: #c7d1de;
    transform: translate(-50%, -50%) scale(0.92); opacity: 0;
    pointer-events: none; transition: transform 0.22s ease, opacity 0.22s ease;
  }
  #tradePanel.open, #endModal.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
  #emTitle { text-align: center; font-weight: bold; font-size: 15px; letter-spacing: 2px; margin-bottom: 12px; }
  #emBody  { line-height: 1.8; color: #7d8aa0; margin-bottom: 14px; }
  #emBody b { color: #e6edf3; }
  #emBtn {
    width: 100%; padding: 13px 0; font: bold 13px var(--font-ui);
    background: #14222f; border: 1px solid #4cc3ff; color: #4cc3ff;
    border-radius: 7px; cursor: pointer;
  }
  #tpTitle {
    text-align: center; font-weight: bold; font-size: 11px;
    letter-spacing: 2px; color: #7d8aa0; margin-bottom: 14px;
  }

  /* --- Manual close button while a trade is open --- */
  #closeTradeBtn {
    display: none; position: fixed; left: 50%; bottom: calc(26px + env(safe-area-inset-bottom));
    transform: translateX(-50%); z-index: 20; cursor: pointer;
    font: bold 13px var(--font-ui);
    padding: 12px 20px; border-radius: 8px; white-space: nowrap;
    background: #0d1320;
    user-select: none; -webkit-user-select: none;
  }
  #closeTradeBtn.pos { border: 1px solid #16c784; color: #16c784; box-shadow: 0 0 14px rgba(22,199,132,0.3); }
  #closeTradeBtn.neg { border: 1px solid #ea3943; color: #ea3943; box-shadow: 0 0 14px rgba(234,57,67,0.3); }
  .tp-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  #tradePanel button { font-family: inherit; cursor: pointer; border-radius: 6px; }
  #btnLong, #btnShort {
    flex: 1; padding: 11px 0; font-weight: bold; font-size: 14px;
    background: transparent; border: 1px solid #2a3442; color: #7d8aa0;
  }
  #btnLong.active  { background: rgba(22,199,132,0.13); border-color: #16c784; color: #16c784; }
  #btnShort.active { background: rgba(234,57,67,0.13);  border-color: #ea3943; color: #ea3943; }
  .tp-stats { justify-content: space-between; color: #7d8aa0; }
  .tp-stats b { color: #e6edf3; }
  #riskSlider { flex: 1; accent-color: #4cc3ff; }
  #riskAmt {
    flex: 1; min-width: 0; background: #0a0e14; border: 1px solid #2a3442;
    color: #e6edf3; font: inherit; padding: 8px 10px; border-radius: 6px;
  }
  #btnConfirm {
    width: 100%; padding: 13px 0; font-weight: bold; font-size: 14px;
    background: #14222f; border: 1px solid #4cc3ff; color: #4cc3ff;
  }
  #btnClose {
    position: absolute; top: 6px; right: 8px; padding: 4px 8px;
    background: none; border: none; color: #7d8aa0; font-size: 15px;
  }
  #tpReason {
    text-align: center; color: #7d8aa0; font-size: 11px;
    line-height: 1.5; margin: -6px 0 14px;
  }
  #tpReason b { color: #c7d1de; }
  #tpChart { margin: -4px 0 10px; cursor: pointer; }
  #tpChart svg {
    display: block; width: 100%; height: auto;
    background: #0a0e14; border: 1px solid #1c2737; border-radius: 8px;
  }
  #tpChart::after { content: '⤢ TAP TO EXPAND'; font: 9px var(--font-ui); color: #3a4a5c; display: block; text-align: right; margin-top: -4px; }
  /* Full-screen chart overlay */
  #chartFull {
    display: none; position: fixed; inset: 0; z-index: 80;
    background: #080c12; flex-direction: column;
    align-items: stretch; justify-content: flex-start; padding: 0;
  }
  #chartFull.open { display: flex; }
  /* SVG fills the entire screen — no border-radius, no padding, no max-width */
  #chartFull svg { width: 100%; height: 100%; max-width: none; display: block; }
  /* Title and hint are now embedded inside the SVG — hide the HTML wrappers */
  #chartFull .cf-hint, #chartFull .cf-title { display: none; }
  /* Toggle legend on the trade-review chart */
  #cfLegend {
    display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 82;
    padding: 8px 10px; gap: 6px; flex-wrap: wrap; justify-content: center;
    background: rgba(8,12,18,0.9); border-bottom: 1px solid #1c2737;
  }
  #cfLegend.on { display: flex; }
  #cfLegend button {
    font: bold 10px var(--font-ui); letter-spacing: 0.3px; padding: 7px 11px;
    border-radius: 16px; cursor: pointer; border: 1px solid #2a3d55;
    background: #0d1320; color: #4a5666;
  }

  /* --- Daily Drill + streak --- */
  #dailyBtn {
    position: fixed; left: 12px; bottom: calc(54px + env(safe-area-inset-bottom)); z-index: 15; cursor: pointer;
    font: bold 11px var(--font-ui); letter-spacing: 0.5px;
    padding: 9px 13px; border-radius: 8px; white-space: nowrap;
    background: #0d1320; border: 1px solid #ff9f43; color: #ff9f43;
    box-shadow: 0 0 12px rgba(255,159,67,0.2);
    user-select: none; -webkit-user-select: none;
  }
  #dailyBtn.done { border-color: #2a3d55; color: #7d8aa0; box-shadow: none; }
  #dailyBtn .dot { display:inline-block; width:7px; height:7px; border-radius:50%;
    background:#ff9f43; margin-left:5px; animation: ddpulse 1.1s ease-in-out infinite; }
  @keyframes ddpulse { 50% { opacity: 0.3; } }
  #dailyDrill {
    display: none; position: fixed; inset: 0; z-index: 72;
    background: #080c12; flex-direction: column; font: 13px var(--font-ui); color: #c7d1de;
  }
  #dailyDrill.open { display: flex; }
  #ddHeader {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px; border-bottom: 1px solid #1c2737; flex-shrink: 0;
  }
  #ddHeader .ddt { font-weight: bold; font-size: 14px; letter-spacing: 2px; color: #ff9f43; }
  #ddClose { background: none; border: 1px solid #2a3442; border-radius: 7px;
    color: #7d8aa0; font: bold 13px var(--font-ui); padding: 7px 13px; cursor: pointer; }
  #ddStreakBar { display:flex; align-items:center; justify-content:space-between;
    padding: 11px 18px; border-bottom: 1px solid #1c2737; flex-shrink: 0; font-family: var(--font-mono); }
  #ddStreakBar .flame { color: #ff9f43; font-weight: bold; font-size: 14px; }
  #ddStreakBar .mult { color: #16c784; font-weight: bold; }
  #ddBody { flex: 1; overflow-y: auto; padding: 18px 16px 28px; }
  #ddProgress { font-size: 11px; color: #7d8aa0; letter-spacing: 1px; margin-bottom: 10px; font-family: var(--font-mono); }
  .ddQ { font-size: 15px; font-weight: bold; color: #e6edf3; line-height: 1.4; margin-bottom: 14px; }
  #ddChart { margin-bottom: 14px; } #ddChart svg { width: 100%; display: block; background:#0a0e14; border:1px solid #1c2737; border-radius:8px; }
  .ddOpt { display: block; width: 100%; text-align: left; box-sizing: border-box;
    margin-bottom: 9px; padding: 13px 14px; cursor: pointer; border-radius: 9px;
    background: #0d1320; border: 1px solid #2a3442; color: #c7d1de; font: 13px var(--font-ui); }
  .ddOpt:hover { border-color: #4cc3ff; }
  .ddOpt.correct { border-color: #16c784; background: rgba(22,199,132,0.13); color: #16c784; }
  .ddOpt.wrong   { border-color: #ea3943; background: rgba(234,57,67,0.13); color: #ea3943; }
  .ddOpt.dim     { opacity: 0.5; }
  .ddGuessRow { display:flex; gap:12px; }
  .ddGuess { flex:1; padding:16px 0; font:bold 15px var(--font-ui); border-radius:10px; cursor:pointer; }
  .ddGuess.up { background:rgba(22,199,132,0.12); border:2px solid #16c784; color:#16c784; }
  .ddGuess.down { background:rgba(234,57,67,0.12); border:2px solid #ea3943; color:#ea3943; }
  #ddFeedback { margin-top: 12px; font-size: 13px; font-weight: bold; min-height: 20px; }
  #ddNext { margin-top: 16px; width: 100%; padding: 14px 0; font: bold 14px var(--font-ui);
    background: #14222f; border: 1px solid #4cc3ff; color: #4cc3ff; border-radius: 8px; cursor: pointer; }
  #ddResult { text-align: center; padding: 30px 16px; }
  #ddResult .big { font-size: 40px; }
  #ddResult .score { font-size: 22px; font-weight: bold; color: #e6edf3; margin: 8px 0; }
  #ddResult .earn { font-size: 16px; color: #ffd60a; font-weight: bold; margin: 10px 0; font-family: var(--font-mono); }
  #ddResult .sk { font-size: 15px; color: #ff9f43; font-weight: bold; margin: 14px 0 4px; }
  #ddResult .sub { color: #7d8aa0; font-size: 13px; }

  /* --- Boss fights (end-of-hour challenge) --- */
  #bossFight { display: none; position: fixed; inset: 0; z-index: 75; background: #0a0610; flex-direction: column; font: 13px var(--font-ui); color: #c7d1de; }
  #bossFight.open { display: flex; }
  #bfHeader { text-align: center; padding: 18px 16px 8px; flex-shrink: 0; }
  #bfHeader .em { font-size: 42px; }
  #bfHeader .nm { font-weight: bold; font-size: 18px; letter-spacing: 2px; color: #ff5d6c; margin-top: 2px; }
  #bfHeader .tg { font-size: 10px; letter-spacing: 3px; color: #7d8aa0; }
  #bfHP { display: flex; gap: 4px; justify-content: center; padding: 0 16px 7px; flex-shrink: 0; }
  #bfHP .seg { width: 34px; height: 9px; border-radius: 3px; background: #2a1420; border: 1px solid #5a2433; }
  #bfHP .seg.full { background: #ff5d6c; border-color: #ff5d6c; box-shadow: 0 0 8px rgba(255,93,108,0.5); }
  #bfHearts { text-align: center; font-size: 15px; letter-spacing: 3px; padding-bottom: 9px; flex-shrink: 0; }
  #bfBody { flex: 1; overflow-y: auto; padding: 8px 16px 24px; border-top: 1px solid #2a1420; }
  #bfChart svg { width: 100%; display: block; background: #0a0e14; border: 1px solid #1c2737; border-radius: 8px; margin-bottom: 12px; }
  .bfQ { font-size: 15px; font-weight: bold; color: #e6edf3; text-align: center; line-height: 1.4; margin: 6px 0 12px; }
  .bfOpt { display: block; width: 100%; box-sizing: border-box; margin-bottom: 9px; padding: 13px 14px; cursor: pointer; border-radius: 9px; background: #0d1320; border: 1px solid #2a3442; color: #c7d1de; font: 13px var(--font-ui); text-align: left; }
  .bfOpt:hover { border-color: #4cc3ff; }
  .bfOpt.correct { border-color: #16c784; background: rgba(22,199,132,0.13); color: #16c784; }
  .bfOpt.wrong   { border-color: #ea3943; background: rgba(234,57,67,0.13); color: #ea3943; }
  .bfOpt.dim     { opacity: 0.5; }
  #bfFeedback { text-align: center; font-size: 12px; margin-top: 8px; min-height: 18px; line-height: 1.5; color: #9aa7b6; }
  #bfNext { margin-top: 14px; width: 100%; padding: 14px 0; font: bold 14px var(--font-ui); background: #14222f; border: 1px solid #4cc3ff; color: #4cc3ff; border-radius: 8px; cursor: pointer; }
  .bfBtnRow { display: flex; gap: 10px; margin-top: 16px; }
  .bfBtnRow button { flex: 1; padding: 13px 0; font: bold 13px var(--font-ui); border-radius: 8px; cursor: pointer; }
  .bfRetry { background: #14222f; border: 1px solid #ff9f43; color: #ff9f43; }
  .bfSkip  { background: transparent; border: 1px solid #2a3442; color: #7d8aa0; }
  #bfResult { text-align: center; padding: 24px 10px; }
  #bfResult .big { font-size: 46px; }
  #bfResult .ttl { font-size: 20px; font-weight: bold; margin: 8px 0; }
  #bfResult .earn { color: #ffd60a; font-weight: bold; font-family: var(--font-mono); margin: 8px 0; }
  #bfResult .sub { color: #7d8aa0; font-size: 13px; }

  /* --- Lesson cards: contextual teaching, stay until dismissed --- */
  #lesson {
    position: fixed; top: 70px; left: 50%; z-index: 28;
    transform: translateX(-50%) translateY(-10px);
    width: min(330px, 90vw); box-sizing: border-box;
    background: rgba(13, 19, 32, 0.98); border: 1px solid #4cc3ff;
    border-radius: 12px; padding: 13px 15px;
    font: 13px var(--font-ui); color: #c7d1de;
    line-height: 1.6; opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
  }
  #lesson.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #lesson b.ttl {
    display: block; color: #4cc3ff; font-size: 11px;
    letter-spacing: 1.5px; margin-bottom: 5px;
  }
  #lesson svg { display: block; width: 100%; height: auto; margin: 8px 0; }
  #lesson button {
    display: block; width: 100%; margin-top: 10px; padding: 10px 0;
    font: bold 13px var(--font-ui);
    background: #14222f; border: 1px solid #4cc3ff; color: #4cc3ff;
    border-radius: 7px; cursor: pointer;
  }
  #btnRec {
    padding: 6px 10px; font-size: 10px; font-weight: bold;
    background: transparent; border: 1px solid #2a3442; color: #7d8aa0;
  }
  .tp-row b.val { min-width: 64px; text-align: right; color: #e6edf3; }

  /* --- Candle inspector: tap any candle to read it --- */
  #inspect {
    display: none; position: fixed; z-index: 26; width: 252px;
    box-sizing: border-box;
    background: rgba(13, 19, 32, 0.98); border: 1px solid #2a3442;
    border-radius: 10px; padding: 10px 12px;
    font: 11px var(--font-ui); color: #c7d1de;
    line-height: 1.55; pointer-events: none;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }
  #inspect b.t { display: block; font-size: 9px; letter-spacing: 1.5px; margin-bottom: 3px; }
  #inspect .ohlc { margin-top: 6px; color: #7d8aa0; font-size: 10px; }

  /* --- Trading Journal (persistent trade log + notes) --- */
  #journalBtn {
    position: fixed; left: 12px; bottom: calc(14px + env(safe-area-inset-bottom)); z-index: 15; cursor: pointer;
    font: bold 11px var(--font-ui); letter-spacing: 0.5px;
    padding: 9px 13px; border-radius: 8px; white-space: nowrap;
    background: #0d1320; border: 1px solid #4cc3ff; color: #4cc3ff;
    box-shadow: 0 0 12px rgba(76,195,255,0.18);
    user-select: none; -webkit-user-select: none;
  }
  #journalBtn:hover { background: #14222f; }
  #journalPanel {
    display: none; position: fixed; inset: 0; z-index: 70;
    background: #080c12; flex-direction: column;
    font: 13px var(--font-ui); color: #c7d1de;
  }
  #journalPanel.open { display: flex; }
  #jHeader {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px; border-bottom: 1px solid #1c2737; flex-shrink: 0;
  }
  #jHeader .jt { font-weight: bold; font-size: 14px; letter-spacing: 2px; color: #e6edf3; }
  #jClose {
    background: none; border: 1px solid #2a3442; border-radius: 7px;
    color: #7d8aa0; font: bold 13px var(--font-ui); padding: 7px 13px; cursor: pointer;
  }
  #jClose:hover { color: #e6edf3; border-color: #4cc3ff; }
  #jStats {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 18px;
    border-bottom: 1px solid #1c2737; flex-shrink: 0;
  }
  .jStat {
    flex: 1; min-width: 84px; background: #0d1320; border: 1px solid #1c2737;
    border-radius: 9px; padding: 9px 11px;
  }
  .jStat .k { font-size: 9px; letter-spacing: 1px; color: #7d8aa0; }
  .jStat .v { font-size: 17px; font-weight: bold; margin-top: 3px; color: #e6edf3; }
  #jList { flex: 1; overflow-y: auto; padding: 12px 14px 28px; }
  .jEntry {
    background: #0d1320; border: 1px solid #1c2737; border-left-width: 3px;
    border-radius: 10px; padding: 11px 13px; margin-bottom: 10px;
  }
  .jEntry.win { border-left-color: #16c784; }
  .jEntry.loss { border-left-color: #ea3943; }
  .jEntry.flat { border-left-color: #7d8aa0; }
  .jRow1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .jDir { font-weight: bold; font-size: 13px; }
  .jDir.long { color: #16c784; } .jDir.short { color: #ea3943; }
  .jDelta { font-weight: bold; font-size: 14px; font-family: var(--font-mono); }
  .jDelta.up { color: #16c784; } .jDelta.down { color: #ea3943; } .jDelta.flat { color: #7d8aa0; }
  .jMeta { margin-top: 6px; font-size: 10px; color: #7d8aa0; font-family: var(--font-mono); }
  .jMeta .tag {
    display: inline-block; padding: 2px 6px; border-radius: 5px; margin-right: 5px;
    background: rgba(124,77,255,0.14); border: 1px solid rgba(124,77,255,0.4); color: #c9b3ff;
  }
  .jNote {
    width: 100%; box-sizing: border-box; margin-top: 9px; resize: vertical;
    min-height: 34px; background: #0a0e14; border: 1px solid #2a3442; border-radius: 7px;
    color: #c7d1de; font: 12px var(--font-ui); padding: 7px 9px; line-height: 1.5;
  }
  .jNote::placeholder { color: #4a5666; }
  .jNote:focus { outline: none; border-color: #4cc3ff; }
  .jView {
    margin-top: 9px; width: 100%; padding: 9px 0; cursor: pointer;
    background: #14222f; border: 1px solid #2a3d55; border-radius: 7px;
    color: #4cc3ff; font: bold 11px var(--font-ui); letter-spacing: 0.5px;
  }
  .jView:hover { border-color: #4cc3ff; background: #16283a; }
  #jEmpty { text-align: center; color: #4a5666; padding: 60px 20px; line-height: 1.7; }
  /* Journal entry points on other screens */
  #imJournalBtn {
    position: absolute; top: 14px; right: 14px; z-index: 5; cursor: pointer;
    font: bold 11px var(--font-ui); padding: 8px 12px; border-radius: 8px;
    background: rgba(13,19,32,0.9); border: 1px solid #4cc3ff; color: #4cc3ff;
  }
  #tpJournalBtn {
    display: block; width: 100%; margin: -4px 0 12px; padding: 8px 0; cursor: pointer;
    background: transparent; border: 1px dashed #2a3d55; border-radius: 7px;
    color: #7d8aa0; font: bold 11px var(--font-ui); letter-spacing: 0.5px;
  }
  #tpJournalBtn:hover { color: #4cc3ff; border-color: #4cc3ff; }
  #tpHistory {
    margin: -4px 0 12px; padding: 8px 10px; border-radius: 7px; font-size: 11px;
    background: rgba(76,195,255,0.06); border: 1px solid rgba(76,195,255,0.22);
    color: #9fc8e0; line-height: 1.5; text-align: center;
  }
  #tpHistory b { color: #e6edf3; }

  /* Journal tabs + sections */

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';

/* =========================================================
   SUPABASE AUTH & CLOUD SYNC
   - Auth overlay shown on load; user picks sign in / sign up / guest
   - On sign-up: local data uploaded to cloud
   - On sign-in: cloud data pulled (cloud wins)
   - During play: trades/notes/streak/progress pushed on each save
   ========================================================= */
(function initSupabase() {
  const SUPA_URL  = 'https://ymxppzhczvmiuoncuqqu.supabase.co';
  const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteHBwemhjenZtaXVvbmN1cXF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODY4MDEsImV4cCI6MjA5NzA2MjgwMX0.aOHGPgBCEhQvS74n9Evl5gL9-dFBZwUE0yVw6gjtY0k';
  // NOTE: The anon key is intentionally public — it is safe for client-side use.
  // The service-role key is NEVER used here and must never be added to this file.
  // All data access is gated by Row Level Security in Supabase.
  // ---- Domain lock — game only runs on authorised hosts ----
  const _ALLOWED_HOSTS = ['chart-quest-game.netlify.app', 'localhost', '127.0.0.1'];
  if (!_ALLOWED_HOSTS.includes(location.hostname)) {
    document.getElementById('authOverlay').innerHTML =
      '<div style="position:fixed;inset:0;background:#0a0e14;display:flex;align-items:center;' +
      'justify-content:center;color:#ea3943;font:bold 14px -apple-system,sans-serif;' +
      'letter-spacing:2px;text-align:center;padding:40px">NOT AUTHORIZED</div>';
    return; // Exit IIFE — Supabase never initialises
  }

  const _supa    = supabase.createClient(SUPA_URL, SUPA_ANON);
  let   _supaUser = null;
  // Expose only the minimal API the rest of the game needs via named functions,
  // not as raw globals — reduces the attack surface for console-based exfiltration.
  window._supaSignedIn = () => !!_supaUser;

  // ---- Cloud push helpers (all fire-and-forget; failures are silent) ----

  window.cloudPushProgress = async function() {
    if (!_supaUser) return;
    try {
      const { data: { session: _s } } = await _supa.auth.getSession();
      if (!_s) return;
      await fetch(SUPA_URL + '/functions/v1/update-progress', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + _s.access_token,
          'Content-Type':  'application/json'
        },
        body: JSON.stringify({
          shells:       player.shells,
          player_level: player.level,
          xp:           player.xp
        })
      });
    } catch(e) {}
  };

  window.cloudPushTrade = async function(trade) {
    if (!_supaUser || !trade) return;
    try {
      await _supa.from('journal_trades').insert({
        user_id:    _supaUser.id,
        trade_data: trade
      });
    } catch(e) {}
  };

  window.cloudPushNotes = async function() {
    if (!_supaUser) return;
    try {
      await _supa.from('journal_notes').delete().eq('user_id', _supaUser.id);
      if (journalNotes.length > 0) {
        await _supa.from('journal_notes').insert(
          journalNotes.map(n => ({ user_id: _supaUser.id, note_data: n }))
        );
      }
    } catch(e) {}
  };

  window.cloudPushStreak = async function() {
    if (!_supaUser) return;
    try {
      await _supa.from('daily_streak').upsert({
        id:             _supaUser.id,
        streak:         daily.streak,
        best_streak:    daily.best,
        last_drill_date: daily.lastDate || null,
        updated_at:     new Date().toISOString()
      });
    } catch(e) {}
  };

  // ---- Pull all cloud data (cloud wins) ----
  async function pullCloudData() {
    if (!_supaUser) return;
    try {
      // Progress
      const { data: profile } = await _supa
        .from('profiles').select('*').eq('id', _supaUser.id).single();
      if (profile) {
        player.shells    = profile.shells;
        player.level     = profile.player_level;
        player.xp        = profile.xp;
        player.xpNeeded  = Math.round(100 * Math.pow(1.5, profile.player_level - 1));
        session.startBal = profile.shells; // align hour fail/pass threshold
      }

      // Trades
      const { data: trades } = await _supa.from('journal_trades')
        .select('trade_data').eq('user_id', _supaUser.id)
        .order('created_at', { ascending: false }).limit(150);
      if (trades && trades.length > 0) {
        journal     = trades.map(t => t.trade_data);
        journalSeq  = journal.reduce((m, e) => Math.max(m, e.id || 0), 0);
        try { localStorage.setItem(JOURNAL_KEY, JSON.stringify(journal)); } catch(e) {}
      }

      // Notes
      const { data: notes } = await _supa.from('journal_notes')
        .select('note_data').eq('user_id', _supaUser.id)
        .order('created_at', { ascending: false });
      if (notes && notes.length > 0) {
        journalNotes = notes.map(n => n.note_data);
        noteSeq      = journalNotes.reduce((m, n) => Math.max(m, n.id || 0), 0);
        try { localStorage.setItem(NOTES_KEY, JSON.stringify(journalNotes)); } catch(e) {}
      }

      // Streak
      const { data: streak } = await _supa.from('daily_streak')
        .select('*').eq('id', _supaUser.id).single();
      if (streak) {
        daily.streak   = streak.streak;
        daily.best     = streak.best_streak;
        daily.lastDate = streak.last_drill_date || '';
        try { localStorage.setItem(DAILY_KEY, JSON.stringify(daily)); } catch(e) {}
      }
    } catch(e) {}
  }

  // ---- Upload local data (called on first sign-up) ----
  async function pushLocalDataToCloud() {
    if (!_supaUser) return;
    await window.cloudPushProgress();
    try {
      if (journal.length > 0) {
        await _supa.from('journal_trades').insert(
          journal.map(t => ({ user_id: _supaUser.id, trade_data: t }))
        );
      }
    } catch(e) {}
    await window.cloudPushNotes();
    await window.cloudPushStreak();
  }

  // ---- Auth UI helpers ----
  function authSetError(msg) {
    const el = document.getElementById('authError');
    if (!el) return;
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }
  function authSetLoading(on) {
    const btn     = document.getElementById('authSubmitBtn');
    const spinner = document.getElementById('authSpinner');
    if (btn)     btn.disabled      = on;
    if (spinner) spinner.style.display = on ? 'block' : 'none';
  }

  let authMode = 'signin';
  function setAuthMode(mode) {
    authMode = mode;
    authSetError('');
    const title    = document.getElementById('authTitle');
    const btn      = document.getElementById('authSubmitBtn');
    const siTab    = document.getElementById('authTabSignin');
    const suTab    = document.getElementById('authTabSignup');
    const passInput = document.getElementById('authPass');
    if (mode === 'signin') {
      if (title) title.textContent = 'Welcome back';
      if (btn)   btn.textContent   = 'SIGN IN';
      if (siTab) siTab.classList.add('active');
      if (suTab) suTab.classList.remove('active');
      if (passInput) passInput.setAttribute('autocomplete', 'current-password');
    } else {
      if (title) title.textContent = 'Create your account';
      if (btn)   btn.textContent   = 'CREATE ACCOUNT';
      if (siTab) siTab.classList.remove('active');
      if (suTab) suTab.classList.add('active');
      if (passInput) passInput.setAttribute('autocomplete', 'new-password');
    }
  }

  async function doAuth() {
    const email = (document.getElementById('authEmail')?.value || '').trim();
    const pass  =  document.getElementById('authPass')?.value  || '';
    if (!email || !pass) { authSetError('Enter your email and password.'); return; }
    if (pass.length < 6) { authSetError('Password must be at least 6 characters.'); return; }
    authSetLoading(true);
    authSetError('');
    let res;
    if (authMode === 'signup') {
      res = await _supa.auth.signUp({ email, password: pass });
      if (!res.error && res.data.user) {
        _supaUser = res.data.user;
        await pushLocalDataToCloud();
        resolveAuth();
      } else {
        authSetError(res.error?.message || 'Sign up failed. Try again.');
      }
    } else {
      res = await _supa.auth.signInWithPassword({ email, password: pass });
      if (!res.error && res.data.user) {
        _supaUser = res.data.user;
        await pullCloudData();
        resolveAuth();
      } else {
        authSetError(res.error?.message || 'Incorrect email or password.');
      }
    }
    authSetLoading(false);
  }

  // ---- Boot: check for existing session, then wire up listeners ----
  _supa.auth.getSession().then(({ data: { session: existing } }) => {
    if (existing?.user) {

    });
    q('accountBtn')    ?.addEventListener('click', window.openAccountPanel);
    q('apClose')       ?.addEventListener('click', closeAccountPanel);
    q('apSignOut')     ?.addEventListener('click', doSignOut);

/* The game is PORTRAIT. On a phone in portrait it fills the screen; on a wider
   screen (desktop, or a phone rotated) it's a centered portrait column with
   letterbox bars. MAX_ASPECT is the widest width:height the play area may take. */
const MAX_ASPECT = 0.58; // ~ taller than 16:9 phones, so those fill fully
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const availW = window.innerWidth, availH = window.innerHeight;
  // Portrait play area: cap the width so it never exceeds MAX_ASPECT
  H = availH;
  W = Math.min(availW, Math.round(availH * MAX_ASPECT));

  stageY = 0;

  stageEl.style.left   = stageX + 'px';
  stageEl.style.top    = stageY + 'px';
  stageEl.style.width  = W + 'px';
  stageEl.style.height = H + 'px';
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels
  groundY = Math.round(H * 0.7); // baseline across the lower third
}

/* ---------- Helpers ---------- */
function rand(min, max) { return min + Math.random() * (max - min); }

/* ---------- Candles (the platforms) ----------
   Each candle: x (world coords), w, h (body height above ground),
   wick length, and color key ('green' | 'red').
   The walkable surface is the TOP of the body: groundY - h.        */
let candles = [];
let nextCandleId = 0; // stable ids — indices shift when old candles are pruned

function pushCandle(x, w, h, color, wick, flags) {
  // OPEN = the previous candle's close, exactly like a real chart.
  // The body floats between open and close; wicks extend beyond it.
  const open = candles.length ? candles[candles.length - 1].h : h - 15;
  candles.push({ id: nextCandleId++, x, w, h, open,
                 wick: wick !== undefined ? wick : rand(CFG.wickMin, CFG.wickMax),
                 wick2: (flags && flags.wick2 !== undefined) ? flags.wick2 : rand(2, 9),
                 // Colour is DERIVED from open vs close — never passed in —
                 // so a green candle is always a real up-candle and vice versa
                 color: h >= open ? 'green' : 'red',
                 // Synthetic volume: bigger body/impulse = more volume (BOS candles spike)
                 vol: Math.round(Math.max(5, Math.abs(h - open) * rand(1.2, 3.0) *
                      ((flags && flags.bos) ? 3.0 : (flags && flags.sweep) ? 1.8 : 1))),
                 price: (flags && flags.price) || market.price, // dollar price
                 bos: !!(flags && flags.bos),
                 choch: !!(flags && flags.choch),
                 sweep: !!(flags && flags.sweep),
                 ob: !!(flags && flags.ob) });
  return x + w; // returns the right edge, handy for chaining
}

// The walkable platform: the TOP of the candle body = max(open, close)
function candleTop(c) {
  return groundY - Math.max(c.open, c.h);
}

/* ---------- Market data: a 1-minute NY-open session ----------
   390 minutes of [closeMove%, upperWick%] with realistic structure:
   a volatility burst at the open that decays toward midday, slow trend
   segments, volatility clustering, and mostly wickless candles — real
   rejection wicks only appear on sweep spikes (those are the spin poles).
   Deterministic seed = the same "day" replays every run.
   TO USE A REAL CHART: replace NY_OPEN with an exported array of
   [closePct, upperWickPct] per minute — everything else just works. */
function buildReplay(seed) {
  const m32 = (a) => () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) | 0;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
  const rnd = m32(seed);
  const gauss = () => {
    let u = 0, v = 0;
    while (!u) u = rnd();
    while (!v) v = rnd();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };
  const out = [];
  let cluster = 1, drift = 0, driftLeft = 0;
  for (let i = 0; i < 390; i++) {
    const base = 0.022 + 0.075 * Math.exp(-i / 22);  // open burst → midday calm
    cluster = Math.max(0.5, Math.min(2.8, cluster + 0.25 * (rnd() - 0.5) + 0.05 * (1 - cluster)));
    if (driftLeft-- <= 0) { drift = (rnd() - 0.5) * 0.014; driftLeft = 8 + Math.floor(rnd() * 25); }
    let d = gauss() * base * cluster + drift;
    let wick = Math.abs(gauss()) * base * 0.35;      // most candles: tiny/no wick
    let wickLo = Math.abs(gauss()) * base * 0.3;     // lower wick, usually small
    if (rnd() < 0.030) { d *= 3.5 + rnd() * 2; wick = Math.abs(d) * (0.4 + rnd() * 0.9); }
    d = Math.max(-0.45, Math.min(0.45, d));
    out.push([+d.toFixed(4), +Math.min(0.12, wick).toFixed(4), +Math.min(0.08, wickLo).toFixed(4)]);
  }
  return out;
}
const NY_OPEN = buildReplay(20260611); // offline fallback session

/* REAL CHART DATA: at load the game fetches actual BTC/USDT 1-minute
   history from Binance's public API (no key, CORS-open, works straight
   from the browser). Each row becomes [closeMove%, upperWick%] — the
   exact format of the fallback — so the level IS a real chart.
   Later, live mode can use the same pipeline via Binance's public
   WebSocket (btcusdt@kline_1m): every closed candle spawns a platform. */
let MARKET_DATA = NY_OPEN;
let dataSource = 'SIM REPLAY';
let priceBase = 100; // dollar price of the first candle (real when live data loads)

// "$109,234" / "$98.45" — sensible precision at any magnitude
function fmtPrice(p) {
  const a = Math.abs(p);
  return '$' + (a >= 1000 ? fmt(p) : a >= 10 ? p.toFixed(2) : p.toFixed(3));
}
try {
  fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=500')
    .then(r => r.json())
    .then(rows => {
      // Validate: must be an array of arrays with numeric OHLC fields
      if (!Array.isArray(rows) || rows.length < 10) return;
      const out = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i], rp = rows[i-1];
        // Each row is [openTime, open, high, low, close, ...] — all strings from Binance
        const open  = parseFloat(r[1]),  high  = parseFloat(r[2]),
              low   = parseFloat(r[3]),  close = parseFloat(r[4]),
              prevClose = parseFloat(rp[4]);
        // Reject any row with non-finite, negative, or clearly bogus values
        if (!isFinite(open) || !isFinite(high) || !isFinite(low) ||
            !isFinite(close) || !isFinite(prevClose)) continue;
        if (open <= 0 || high <= 0 || low <= 0 || close <= 0) continue;
        if (high < low || high < open || high < close) continue;  // structurally invalid
        if (Math.abs(close - prevClose) / prevClose > 0.5) continue; // >50% move = bad data
        out.push([
          (close - prevClose) / prevClose * 100,            // close-to-close %
          Math.max(0, (high - Math.max(open, close)) / prevClose * 100), // upper wick %
          Math.max(0, (Math.min(open, close) - low) / prevClose * 100),  // lower wick %
        ]);
      }
      if (out.length > 100) {
        MARKET_DATA = out;
        dataSource = 'BTC/USDT 1m · BINANCE';
        priceBase = parseFloat(rows[0][4]);  // real dollars on the axis
        if (!isFinite(priceBase) || priceBase <= 0) return; // safety guard
        market.price = priceBase;
        prePopulateHTF(MARKET_DATA); // re-build HTF history from real data
        teach('realdata');
      }
    })
    .catch(() => {}); // offline → fallback replay keeps the game running
} catch (e) { /* no fetch available */ }

const market = { level: 100, price: 100, idx: 0, eventIn: 12, trendDir: 1 };

/* Structure events ride on top of the replay data:
   BOS  — an impulse candle breaking structure (a wall to jetpack over,
          or a cliff to tuck down). The candle BEFORE it becomes an
          order block: a purple bounce pad (the real OB concept — the
          last opposing candle before the impulse).
   SWEEP— a long trap wick that zaps SHELLS if walked into on the
          ground; hitting it airborne earns the wick spin instead. */
function nextCandle() {
  const [dPct, wickPct, loPct = 0.005] = MARKET_DATA[market.idx % MARKET_DATA.length];
  market.idx = (market.idx + 1) % 1e9;              // loop the session
  let step = dPct * CFG.pxPerPct;
  let wick = Math.min(160, wickPct * CFG.pxPerPct);  // real wick distribution
  const wick2 = Math.min(120, loPct * CFG.pxPerPct); // lower wick
  let bos = false, sweep = false, choch = false, ob = Math.random() < CFG.obChance;

  if (--market.eventIn <= 0) {
    market.eventIn = CFG.eventMin + Math.floor(Math.random() * (CFG.eventMax - CFG.eventMin + 1));
    if (Math.random() < CFG.bosShare) {
      const mag = rand(CFG.bosMin, CFG.bosMax);
      // Direction: CONTINUE the prevailing trend (a BOS), giving runs of breaks
      // the same way. Occasionally reverse on purpose, and always reverse when
      // continuing would run off the top/bottom of the world — that first
      // counter-trend break is a Change of Character (ChoCh).
      let dir = market.trendDir;
      if (Math.random() < CFG.chochChance) dir = -dir;     // occasional deliberate reversal
      const projected = market.level + dir * mag;
      if      (projected > CFG.levelMax - 10) dir = -1;    // ceiling → must reverse down
      else if (projected < CFG.levelMin + 10) dir =  1;    // floor → must reverse up
      step = dir * mag;
      bos = true;                          // every structure break drives gameplay
      if (dir !== market.trendDir) { choch = true; market.trendDir = dir; } // reversal = ChoCh
    } else {
      sweep = true;
      wick = rand(CFG.sweepWickMin, CFG.sweepWickMax);
    }
  }

  market.level = Math.max(CFG.levelMin, Math.min(CFG.levelMax, market.level + step));
  market.price *= 1 + dPct / 100;   // true dollar price rides along
  return { h: market.level, color: step >= 0 ? 'green' : 'red', wick, wick2, bos, sweep, choch, ob,
           price: market.price };
}

function initCandles() {
  candles = [];
  // The three opening candles: two green, one red, different heights.
  let x = 50;
  x = pushCandle(x, 70, 130, 'green');
  x = pushCandle(x, 75, 175, 'red');
  x = pushCandle(x, 65, 100, 'green');
  // Market continues from the last opening candle
  market.level = 100;
  market.price = priceBase;
  market.trendDir = 1; // structure starts biased up
  for (const c of candles) c.price = priceBase; // opening candles share the base
}

// Keep generating candles ahead of the camera; drop ones far behind it.
function maintainCandles(cameraX) {
  let last = candles[candles.length - 1];
  while (last.x + last.w < cameraX + W + 200) {
    const gap = rand(CFG.gapMin, CFG.gapMax);
    const w   = rand(CFG.candleMinW, CFG.candleMaxW);
    const c   = nextCandle();
    // The order block = the last OPPOSING candle before the impulse
    // (e.g. the final red candle before a bullish break) — bounce pad
    if (c.bos && candles.length) {
      // OB = the LAST opposing-colour candle before the impulse (e.g. the final
      // red candle before a bullish break). Search back up to 5; if no genuine
      // opposing candle exists, mark NONE — never mislabel a same-colour candle.
      const want = c.color === 'green' ? 'red' : 'green';
      let k = -1;
      for (let i = 0; i < 5 && candles.length - 1 - i >= 0; i++) {
        if (candles[candles.length - 1 - i].color === want) { k = candles.length - 1 - i; break; }
      }
      if (k >= 0) candles[k].ob = true;
    }
    pushCandle(last.x + last.w + gap, w, c.h, c.color, c.wick, c);
    last = candles[candles.length - 1];
    // Spawn a shell on ~25% of candle tops (not on BOS/sweep candles — too chaotic)
    if (!c.bos && !c.sweep && Math.random() < 0.25) {
      const cx2 = last.x + last.w / 2;
      const cy2 = candleTop(last) - 12; // hover above the candle
      coins.push({ x: cx2, y: cy2, r: 6, collected: false, bobT: Math.random() * Math.PI * 2 });
    }
  }
  // Keep a generous buffer behind the camera so the player can turn
  // around and walk back to review what they passed
  while (candles.length && candles[0].x + candles[0].w < cameraX - 2500) {
    candles.shift();
  }
  // Prune shells that are far behind
  for (let i = coins.length - 1; i >= 0; i--) {
    if (coins[i].x < cameraX - 2600) coins.splice(i, 1);
  }
}

/* ---------- Player state: currency & progression ----------

  { name: 'OCTOPUS',    emoji: '🐙', color: '#c9a0ff', blurb: 'Understands liquidity & VWAP.' },

// 12345.6 → "12,346" for terminal-style display
const fmt = (n) => Math.round(n).toLocaleString('en-US');

/* ---------- Turtle ---------- */
const turtle = {

  vy: 0,           // vertical velocity

/* ---- Shells: collectible shells placed on candle tops.

/* ---- Shell emotion: happy/worried/focused face based on game state ---- */

/* ---- Higher Timeframe aggregation: 5m, 15m, 1h.
   Each 1m candle entered feeds these rolling candles. The panel in
   the top-right shows the HTF picture so players can check alignment
   before taking a 1m setup — the core multi-timeframe discipline. ---- */
const HTF_LABELS = ['5m', '15m', '1h'];
const htf = [
  { period: 5,  candles: [], cur: null },
  { period: 15, candles: [], cur: null },
  { period: 60, candles: [], cur: null },
];

/* Pre-populate HTF arrays from raw market data so players see 15-20 candles
   of history the moment they tap any HTF timeframe — no walking required.
   We simulate 1200 data points (= 20 completed 1h candles) through updateHTF
   using fake candle objects; this does NOT affect game state or 1m candles. */
function prePopulateHTF(data) {
  htf.forEach(tf => { tf.candles = []; tf.cur = null; }); // reset before re-building
  let level = 100, prevH = 100;
  const N = Math.min(1200, data.length);
  for (let i = 0; i < N; i++) {
    const [dPct, wickPct, loPct] = data[i];
    const step = dPct * CFG.pxPerPct;
    level = Math.max(CFG.levelMin, Math.min(CFG.levelMax, level + step));
    const wick  = Math.min(160, (wickPct || 0) * CFG.pxPerPct);
    const wick2 = Math.min(120, (loPct  || 0.005) * CFG.pxPerPct);
    const vol   = Math.round(Math.max(5, Math.abs(step) * 1.5));
    const fakec = { open: prevH, h: level, wick, wick2, vol };
    updateHTF(fakec);
    prevH = level;
  }
}

function updateHTF(c) {
  for (const tf of htf) {
    if (!tf.cur) {
      tf.cur = { open: c.open, h: c.h,
                 hi: Math.max(c.open, c.h) + c.wick,
                 lo: Math.min(c.open, c.h) - (c.wick2 || 0),
                 vol: c.vol || 0, n: 1 };
    } else {
      tf.cur.h   = c.h;
      tf.cur.hi  = Math.max(tf.cur.hi, Math.max(c.open, c.h) + c.wick);
      tf.cur.lo  = Math.min(tf.cur.lo, Math.min(c.open, c.h) - (c.wick2 || 0));
      tf.cur.vol += c.vol || 0;
      tf.cur.n++;
    }
    tf.cur.color = tf.cur.h >= tf.cur.open ? 'green' : 'red';
    if (tf.cur.n >= tf.period) {
      tf.candles.push({ ...tf.cur });
      if (tf.candles.length > 40) tf.candles.shift();
      tf.cur = null;
    }
  }
}

/* ---- Trend alignment: higher lows = uptrend (take longs),
   lower highs = downtrend (take shorts). Used by the quality scorer. ---- */
function checkTrendAlignment(dir) {
  const seen = candles.filter(c => c.id <= maxSeenCandleId);
  if (seen.length < 10) return false;
  const pivH = [], pivL = [];
  for (let i = 3; i < seen.length - 3; i++) {
    const hi = Math.max(seen[i].open, seen[i].h) + seen[i].wick;
    const lo = Math.min(seen[i].open, seen[i].h) - (seen[i].wick2 || 0);
    if ([1,2,3].every(d =>
      hi > Math.max(seen[i-d].open, seen[i-d].h) + seen[i-d].wick &&
      hi > Math.max(seen[i+d].open, seen[i+d].h) + seen[i+d].wick))
      pivH.push(hi);
    if ([1,2,3].every(d =>
      lo < Math.min(seen[i-d].open, seen[i-d].h) - (seen[i-d].wick2||0) &&
      lo < Math.min(seen[i+d].open, seen[i+d].h) - (seen[i+d].wick2||0)))
      pivL.push(lo);
  }
  if (dir === 'long'  && pivL.length >= 2) return pivL[pivL.length-1] > pivL[pivL.length-2];
  if (dir === 'short' && pivH.length >= 2) return pivH[pivH.length-1] < pivH[pivH.length-2];
  return false;
}

/* HTF zoom state: null = closed, { tfIdx, miniJ, miniVy, miniJumping } = overlay open */
let htfZoomState = null;
function openHTFZoom(tfIdx) {
  const tf = htf[tfIdx];
  const nC = tf.candles.length + (tf.cur ? 1 : 0);
  htfZoomState = {
    tfIdx,
    miniJ: Math.max(0, nC - 1), // Mini Shell starts at the rightmost (latest) candle
    scrollOff: 0,               // how many candles from the right are hidden by scrolling left
    miniVy: 0,
    miniOnGround: true,
    miniJumping: false,
  };
}
function closeHTFZoom() { htfZoomState = null; }

// Liquidity sweep zap: the trap got you — lose a slice of the balance
function sweepZap() {
  const dmg = Math.min(player.shells, Math.max(50, player.shells * CFG.sweepDmgPct / 100));
  player.shells -= dmg;
  turtle.sweepCdT = CFG.sweepCd;
  floaters.push({ text: '−' + fmt(dmg) + ' SWEPT', color: COLOR.redBody, y: 64, t: 1.5 });
  flashT = 0.4; flashColor = COLOR.redBody;
  shakeT = 0.35;
}

function spawnTurtle() {
  const first = candles[0];
  turtle.x = first.x + 8;
  turtle.y = candleTop(first) - turtle.h; // standing on candle #1's body
  turtle.vy = 0;
  turtle.onGround = true;
  turtle.fuel = CFG.fuelMax;
  turtle.jetT = turtle.flameT = 0;
  turtle.spinning = false;
  turtle.cdSpin = turtle.vxBoost = turtle.rot = 0;
  turtle.trail = [];
  turtle.tucked = false;
  turtle.rollT = 0;
  turtle.halt = false;
}

function jump() {
  if (turtle.spinning || turtle.tucked) return; // committed to spin/ball
  turtle.halt = false; // any action resumes from a setup stop
  if (turtle.onGround) {
    turtle.vy = CFG.jumpVelocity;
    turtle.onGround = false;
    turtle.flameT = 0.18; // small jetpack puff — turtle always uses the pack
    combo.count++;
    combo.t = combo.maxT;
  }
}

// Jetpack: usable on the ground OR mid-air, as long as there's enough fuel.
// Firing it mid-tuck pops Shell out of the ball (expert recovery move).
function fireJetpack() {
  if (turtle.spinning) return;               // committed to the spin
  if (turtle.fuel < CFG.jetpackCost) return; // empty tank — no boost
  turtle.halt = false;
  turtle.tucked = false;
  turtle.rollT = 0;
  turtle.rot = 0;
  turtle.fuel -= CFG.jetpackCost;
  turtle.vy = CFG.jetpackVelocity;
  turtle.onGround = false;
  turtle.jetT = CFG.jetpackHang;   // physics: reduced gravity window
  turtle.flameT = 0.45;            // visual: big exhaust flame
}

// Shell tuck: retract into the shell mid-air and slam downward.
// Used to descend quickly and safely after a tall candle drop.
function shellTuck() {
  if (turtle.spinning || turtle.tucked) return;
  turtle.halt = false;
  if (turtle.onGround) return;                 // only useful in the air
  turtle.tucked = true;
  turtle.jetT = 0;                             // cancels any jetpack hang
  turtle.vy = Math.max(turtle.vy, CFG.tuckMinVy); // instant downward kick
}

/* ---------- Input ----------
   Desktop:  Space = jump, ArrowUp / W = jetpack, ArrowDown / S = tuck.
   Pointer (touch + mouse): tap = jump, swipe up = jetpack,
   swipe down = shell tuck.
   Swipes fire the moment they pass the threshold; a plain tap fires
   jump on release (so we can tell the gestures apart). */
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return; // don't eat auth typing
  if (lessonOpen) { // lesson card owns input — Space/Enter = OK
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); dismissLesson(); }
    return;
  }
  if (htfZoomState) { if (e.code === 'Escape') closeHTFZoom(); return; }
  if (dailyOpen) { if (e.code === 'Escape') closeDailyDrill(); return; } // daily drill owns input
  if (journalOpen) { if (e.code === 'Escape') closeJournal(); return; } // journal owns input
  if (paused) { if (e.code === 'Escape') closePanel(); return; } // panel owns input
  if (e.code === 'Space')                          { e.preventDefault(); jump(); }
  if (e.code === 'ArrowUp'    || e.code === 'KeyW') { e.preventDefault(); fireJetpack(); }
  if (e.code === 'ArrowDown'  || e.code === 'KeyS') { e.preventDefault(); shellTuck(); }
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') { e.preventDefault(); turtle.dir = -1; turtle.halt = false; }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); turtle.dir = 1;  turtle.halt = false; }
});

let pointer = null; // active gesture: {x0,y0: start, fired: swipe already fired?}
window.addEventListener('pointerdown', (e) => {
  // Candle Academy greeting: any tap dismisses immediately
  if (candleAcademy.active) {
    e.preventDefault();
    candleAcademy.active = false;
    return;
  }
  // Intro Flow: route taps to the active checkpoint handler
  if (introFlow.active && introFlow.phase === 'quiz') {
    e.preventDefault();
    handleIntroQuizTap(e.clientX - stageX, e.clientY - stageY);
    return;
  }
  if (introFlow.active && introFlow.phase === 'bet') {
    e.preventDefault();
    handleIntroBetTap(e.clientX - stageX, e.clientY - stageY);
    return;
  }
  // HTF zoom overlay: capture gesture for Mini Shell movement
  if (htfZoomState) { e.preventDefault(); pointer = { x0: e.clientX, y0: e.clientY, fired: false }; return; }
  if (inspectT > 0) hideInspector(); // any touch clears an open inspector
  // Only react to taps on the game itself — not the banner/panel/lesson UI
  if (paused || lessonOpen || e.target !== canvas) return;
  e.preventDefault();
  pointer = { x0: e.clientX, y0: e.clientY, fired: false };
});
window.addEventListener('pointermove', (e) => {
  if (!pointer || pointer.fired) return;
  const dx = e.clientX - pointer.x0;
  const dy = e.clientY - pointer.y0;
  if (Math.abs(dy) >= Math.abs(dx)) {
    if (dy < -28) { pointer.fired = true; fireJetpack(); }     // swipe up
    if (dy >  28) { pointer.fired = true; shellTuck();  }      // swipe down
  } else {
    if (dx < -32) { pointer.fired = true; turtle.dir = -1; turtle.halt = false; } // swipe left: turn around
    if (dx >  32) { pointer.fired = true; turtle.dir = 1;  turtle.halt = false; } // swipe right: forwards
  }
});
window.addEventListener('pointerup', (e) => {
  // Map viewport coords → stage-local (canvas) coords for hit-testing
  const lx = e.clientX - stageX, ly = e.clientY - stageY;
  // HTF zoom: swipe left/right = move Mini Shell; swipe up = jump; tap = close
  if (htfZoomState) {
    if (pointer) {
      const dx = e.clientX - pointer.x0;
      const dy = e.clientY - pointer.y0;
      if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        const step = dx > 0 ? Math.ceil(dx / 40) : Math.floor(dx / 40);
        const tfNow2 = htf[htfZoomState.tfIdx];
        const totalC2 = tfNow2.candles.length + (tfNow2.cur ? 1 : 0);
        const newJ = Math.max(0, Math.min(htfZoomState.miniJ + step, totalC2 - 1));
        htfZoomState.miniJ = newJ;
        // Scroll the view window so Shell is always visible
        const MAX_VIS = 60;
        const rawStart2 = Math.max(0, totalC2 - MAX_VIS - (htfZoomState.scrollOff || 0));
        const relJ = newJ - rawStart2;
        if (relJ < 2 && (htfZoomState.scrollOff || 0) < totalC2 - MAX_VIS) {
          htfZoomState.scrollOff = Math.min(totalC2 - MAX_VIS, (htfZoomState.scrollOff || 0) + Math.abs(step));
        } else if (relJ > MAX_VIS - 3 && (htfZoomState.scrollOff || 0) > 0) {
          htfZoomState.scrollOff = Math.max(0, (htfZoomState.scrollOff || 0) - Math.abs(step));
        }
        pointer = null; return;
      }
      if (dy < -30 && Math.abs(dy) > Math.abs(dx) * 1.2) {
        htfZoomState.miniVy = -450;
        htfZoomState.miniOnGround = false;
        pointer = null; return;
      }
    }
    // Tap (no swipe): check for setup candle tap-to-inspect
    const { _cX, _cw, _cg, _nC, _htfSetups, _cY, _cH } = htfZoomState;
    if (_htfSetups && _cX !== undefined) {
      for (const s of _htfSetups) {
        const cx = _cX + s.bosIdx * (_cw + _cg) + _cw / 2;
        const cy0 = _cY, cy1 = _cY + _cH;
        if (Math.abs(lx - cx) <= _cw + 10 && ly >= cy0 && ly <= cy1) {
          htfZoomState._inspectSetup = (htfZoomState._inspectSetup && htfZoomState._inspectSetup.bosIdx === s.bosIdx) ? null : s;
          pointer = null; return;
        }
        const ocx = _cX + s.obIdx * (_cw + _cg) + _cw / 2;
        if (Math.abs(lx - ocx) <= _cw + 10 && ly >= cy0 && ly <= cy1) {
          htfZoomState._inspectSetup = (htfZoomState._inspectSetup && htfZoomState._inspectSetup.obIdx === s.obIdx) ? null : s;
          pointer = null; return;
        }
      }
    }
    // If callout is open, any other tap dismisses it
    if (htfZoomState._inspectSetup) { htfZoomState._inspectSetup = null; pointer = null; return; }
    closeHTFZoom(); pointer = null; return;
  }
  if (pointer && !pointer.fired) {
    // Check whether the tap landed on the HTF panel (open that TF's zoom)
    // Panel geometry must match drawHTFPanel: nCandles=4, cw=14, gap=2, labelW=28, rowH=23, padH=5
    const htfPanW = 28 + 4 * 16 + 8; // = 100
    const htfPx   = W - htfPanW - 4;
    const htfPy   = 50;
    const htfPanH = htf.length * 23 + 10; // = 79
    if (lx >= htfPx && lx <= htfPx + htfPanW &&
        ly >= htfPy && ly <= htfPy + htfPanH) {
      const row = Math.floor((ly - htfPy - 5) / 23);
      if (row >= 0 && row < htf.length) { openHTFZoom(row); pointer = null; return; }
    }
    // A plain tap on the chart: ON a candle = inspect it,
    // in the open air = jump. Touch to study, sky to move.
    const c = candleAtScreen(lx, ly);
    if (c) showInspector(c, lx, ly);
    else jump();
  }
  pointer = null;
});

/* ---------- Candle inspector ----------
   Every candle is tappable. Ordinary candles report their OHLC prices;
   structure candles (BOS / OB / sweeps / dojis) explain WHY they
   matter — the chart annotates itself on demand. */
let inspectId = -1, inspectT = 0;

function candleAtScreen(px, py) {
  const cameraX = Math.max(0, turtle.x - W * CFG.cameraAnchor);
  const wx = px + cameraX;
  const wy = py + camY;
  if (wy > groundY) return null;             // dead space below the chart
  return candles.find(c =>
    c.id <= maxSeenCandleId + 2 &&           // only printed candles
    wx >= c.x && wx < c.x + c.w &&
    wy >= candleTop(c) - c.wick - 12);       // body, wick, or just above
}

function showInspector(c, px, py) {
  const ppp = c.price / (CFG.pxPerPct * 100); // dollars per height-px
  const openP = c.price + (c.open - c.h) * ppp;
  const highP = c.price + (Math.max(c.open, c.h) + c.wick - c.h) * ppp;
  const lowP  = c.price + (Math.min(c.open, c.h) - c.wick2 - c.h) * ppp;
  const up = c.h >= c.open;
  const doji = Math.abs(c.h - c.open) < 8 && (c.wick + c.wick2) > 16;

  let title, color, body;
  if (c.bos) {
    title = 'BREAK OF STRUCTURE'; color = '#c9b3ff';
    body = 'This candle closed beyond the recent swing ' + (up ? 'high' : 'low') +
           ' — the old structure is broken and momentum is ' + (up ? 'up' : 'down') +
           '. Breaks often get retested before continuing.';
  } else if (c.ob) {
    title = 'ORDER BLOCK'; color = '#d8b4fe';
    body = 'The last ' + (c.color === 'red' ? 'red' : 'green') +
           ' candle before the impulse beside it. Big orders were filled here, ' +
           'so price tends to return to this zone and react — that is why it bounces you.';
  } else if (c.sweep) {
    title = 'LIQUIDITY SWEEP'; color = '#ffb86b';
    body = 'The long wick ran the nearby highs — where stop losses rest — grabbed ' +
           'them, and closed back inside. A stop hunt (also called an SFP or ' +
           'liquidity grab), not a real breakout.';
  } else if (doji) {
    title = 'DOJI'; color = '#7fd6ff';
    body = 'Open and close are nearly equal: indecision. Neither side won this ' +
           'minute — these often appear right before price picks a direction.';
  } else {
    title = up ? 'BULLISH CANDLE' : 'BEARISH CANDLE';
    color = up ? '#16c784' : '#ea3943';
    body = 'One minute of trading. ' + (up ? 'Buyers' : 'Sellers') +
           ' won it: price closed ' + (up ? 'above' : 'below') + ' where it opened.';
  }

  const el = $('inspect');
  el.innerHTML = '<b class="t" style="color:' + color + '">' + title + '</b>' + body +
    '<div class="ohlc">O ' + fmtPrice(openP) + ' &middot; H ' + fmtPrice(highP) +
    ' &middot; L ' + fmtPrice(lowP) + ' &middot; C ' + fmtPrice(c.price) + '</div>';
  el.style.left = Math.max(8, Math.min(W - 260, px - 126)) + 'px';
  el.style.top  = Math.max(58, py - 150) + 'px';
  el.style.display = 'block';
  inspectId = c.id;
  inspectT = 6; // auto-fade; any new tap also dismisses
}

function hideInspector() {
  $('inspect').style.display = 'none';
  inspectId = -1;
  inspectT = 0;
}
window.addEventListener('pointercancel', () => { pointer = null; });

function getCurriculum(level) {
  return CURRICULUM[Math.min(level - 1, CURRICULUM.length - 1)];
}

const taught = {};
const lessonQ = [];
let lessonOpen = false, lessonGap = 0;

/* teach() — curriculum-gated, throttled to 2 pop-ups per hour.
   Win/loss/realdata lessons bypass the gate (they're always contextual).
   Leverage lessons also bypass (triggered by shell milestone, not the gate).
   Everything else must be in the current level's curriculum focus list. */
const BYPASS_GATE = new Set(['win', 'loss', 'realdata', 'controls']);

function teach(key) {
  if (introFlow && introFlow.active) return; // no popup lessons during intro
  if (taught[key] || !LESSONS[key]) return;
  const cur = getCurriculum(session.level);
  // Gate: lesson must be in the current level's curriculum, OR bypass the gate
  if (!BYPASS_GATE.has(key) && !cur.focus.includes(key)) return;
  // Throttle: max 2 pop-ups during gameplay per hour (intermission handles the rest)
  if (!BYPASS_GATE.has(key) && session.lessonsThisHour >= 2) return;
  taught[key] = true;
  if (!BYPASS_GATE.has(key)) session.lessonsThisHour++;
  lessonQ.push(LESSONS[key]);
}

/* Force-teach a lesson regardless of gate (used by Candle Academy & leverage unlocks) */
function teachForced(key) {
  if (introFlow && introFlow.active) return; // suppress during intro
  if (taught[key] || !LESSONS[key]) return;
  taught[key] = true;
  lessonQ.push(LESSONS[key]);
}

function dismissLesson() {
  $('lesson').classList.remove('show');
  lessonOpen = false;
  lessonGap = 0.6;
}

function pumpLessons(dt) {
  if (lessonOpen) return;                         // waiting for OK
  if (lessonGap > 0) { lessonGap -= dt; return; }
  if (!lessonQ.length || paused) return;
  const l = lessonQ.shift();
  const el = $('lesson');
  el.innerHTML = '<b class="ttl">' + l[0] + '</b>' + (l[2] || '') + l[1] +
                 '<button id="lessonOk">OK &mdash; GOT IT</button>';
  el.classList.add('show');
  lessonOpen = true;                              // world pauses underneath
  $('lessonOk').onclick = dismissLesson;
}

/* ---- Journal Section 1: Terms Glossary (always available reference) ---- */
const TERMS = [
  { key: 'candle',     term: 'Candle',                def: 'One bar of price for a time period. Body = open→close; green closed up, red closed down.' },
  { key: 'wick',       term: 'Wick (Shadow)',         def: 'The thin line above/below the body — the highest and lowest price reached. A long wick = rejection.' },
  { key: 'candle_close', term: 'Candle Close (Confirmation)', def: 'A candle isn\'t final until it CLOSES. Confirm your entry rule on the close — never on a wick or mid-candle. A break that only wicks through a level but closes back is a fake-out, not a real break.' },
  { key: 'doji',       term: 'Doji',                  def: 'A candle that opens and closes at nearly the same price. Signals indecision — a possible turning point.' },
  { key: 'long',       term: 'Long',                  def: 'A bet that price will go UP. You buy, aiming to sell higher.' },
  { key: 'short',      term: 'Short',                 def: 'A bet that price will go DOWN. You sell first, aiming to buy back cheaper.' },
  { key: 'sl',         term: 'Stop Loss (SL)',        def: 'A preset exit if the trade goes against you. Caps your loss. Rule #1: never trade without one.' },
  { key: 'tp',         term: 'Take Profit (TP)',      def: 'A preset exit that locks in your gain when price reaches your target.' },
  { key: 'support',    term: 'Support',               def: 'A price floor where buyers keep stepping in. Price tends to bounce up from it.' },
  { key: 'resistance', term: 'Resistance',            def: 'A price ceiling where sellers keep pushing price down. Breaks become new support.' },
  { key: 'trend',      term: 'Trend',                 def: 'The market’s direction. Uptrend = higher highs + higher lows. Downtrend = the reverse.' },
  { key: 'bos',        term: 'Break of Structure',    def: 'Price CLOSES beyond a prior swing high (or low), confirming the trend continues that way. A wick that pokes through but closes back is a fake-out, not a BOS. (The first break the OTHER way is a reversal — a Change of Character.)' },
  { key: 'choch',      term: 'Change of Character (ChoCh)', def: 'The FIRST structure break against the prevailing trend — an early sign the trend may be reversing. A BOS continues the trend; a ChoCh flips it. Example: in a downtrend, price closing above the last lower-high is a bullish ChoCh.' },
  { key: 'ob',         term: 'Order Block',           def: 'The last opposing-colour candle right before a break of structure — the final red candle before a bullish break (or final green before a bearish one). Big orders are presumed to sit there, so price often returns to it before continuing.' },
  { key: 'sweep',      term: 'Liquidity Sweep',       def: 'A spike that grabs traders’ stop losses then snaps back. A trap, not a real breakout.' },
  { key: 'vwap',       term: 'VWAP',                  def: 'Volume Weighted Average Price — the day’s average price. Acts like a magnet; price returns to it.' },
  { key: 'htf',        term: 'Higher Time Frame',     def: 'A larger chart (15m, 1h). Shows the bigger trend. Never trade a 1m setup against the HTF.' },
  { key: 'leverage',   term: 'Leverage',              def: 'Borrowed size that multiplies BOTH gains and losses. Powerful and dangerous — use sparingly.' },
  { key: 'rr',         term: 'Risk : Reward (R:R)',   def: 'How much you can win vs. lose. Aim for 2R+ — then you can be wrong often and still profit.' },
];
const TERM_BY_KEY = Object.fromEntries(TERMS.map(t => [t.key, t]));

// Build a random quiz: 8 synthetic candles that form a small trend
function buildQuizCandles() {
  const goUp = Math.random() > 0.5;
  const cs = [];
  let h = 140 + Math.random() * 60;
  for (let i = 0; i < 8; i++) {
    const open = h;
    const trendNudge = goUp ? rand(5, 22) : rand(-22, -5);
    h = Math.max(60, Math.min(260, h + trendNudge + rand(-8, 8)));
    const color = h >= open ? 'green' : 'red';
    const wick = rand(4, 14), wick2 = rand(2, 8);
    cs.push({ open, h, color, wick, wick2 });
  }
  // Hide the last candle — that's the question
  return { candles: cs.slice(0, 7), answer: goUp ? 'bull' : 'bear', hint: cs[7] };
}

// Draw a small quiz chart (7 candles + question mark for 8th)
function drawQuizChart(cx, cy, cw2, ch2, qcandles) {
  const lo = Math.min(...qcandles.map(c => Math.min(c.open, c.h) - c.wick2));
  const hi = Math.max(...qcandles.map(c => Math.max(c.open, c.h) + c.wick));
  const rng = Math.max(1, hi - lo) * 1.2;
  const QY  = (v) => cy + ch2 - ch2 * (v - (lo - rng * 0.1)) / rng;
  const cW2  = cw2 / (qcandles.length + 1.5);
  const gap2 = cW2 * 0.15;
  // Background
  ctx.fillStyle = '#080c13'; ctx.fillRect(cx, cy, cw2, ch2);
  ctx.strokeStyle = '#1c2737'; ctx.lineWidth = 1;
  ctx.strokeRect(cx, cy, cw2, ch2);
  qcandles.forEach((c, i) => {
    const x = cx + i * (cW2 + gap2) + 4;
    const col = c.color === 'green' ? COLOR.greenBody : COLOR.redBody;
    const bTop = QY(Math.max(c.open, c.h));
    const bBot = QY(Math.min(c.open, c.h));
    const bh   = Math.max(2, bBot - bTop);
    const midX = x + cW2 / 2;
    ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(midX, QY(Math.max(c.open, c.h) + c.wick));
    ctx.lineTo(midX, QY(Math.min(c.open, c.h) - c.wick2)); ctx.stroke();
    ctx.fillStyle = col; ctx.fillRect(x, bTop, cW2, bh);
  });
  // 8th candle = "?"
  const qx = cx + 7 * (cW2 + gap2) + 4;
  ctx.fillStyle = '#2a3442'; ctx.fillRect(qx, cy + ch2 * 0.1, cW2, ch2 * 0.8);
  ctx.font = 'bold ' + Math.round(cW2 * 0.9) + 'px ui-monospace,Menlo,Consolas,monospace';
  ctx.fillStyle = '#4cc3ff'; ctx.textAlign = 'center';
  ctx.fillText('?', qx + cW2 / 2, cy + ch2 * 0.65);
  ctx.textAlign = 'left';
}

function openIntermission() {
  im.cleared = session.cleared;
  im.phase = 'quiz';
  im.t = 0;
  im.answerRects = [];

  // Select 3 quiz questions from the current hour's intermissionFocus keys
  const cur = getCurriculum(session.level);
  const pool = [];
  for (const key of cur.intermissionFocus) {
    if (QUIZ_QUESTIONS[key]) pool.push(...QUIZ_QUESTIONS[key].map(q => ({ ...q, key })));
  }
  // Shuffle pool
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  im.quiz = pool.slice(0, Math.min(3, pool.length));
  // Shuffle each question's answers (while tracking correct answer)
  im.quiz.forEach(q => {
    const correctText = q.answers[q.correct];
    for (let i = q.answers.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1)); [q.answers[i], q.answers[j]] = [q.answers[j], q.answers[i]];
    }
    q.correct = q.answers.indexOf(correctText);
  });
  im.quizQ = 0;        // current question index
  im.quizAnswers = []; // chosen answer index per question
  im._bonusGiven = false; // prevent double-award

  const imDiv = $('intermission');
  imDiv.style.display = 'block';
  $('imGuess').style.display = 'none';
  $('imResult').style.display = 'none';
  const imC = $('imCanvas');
  imC.width  = W * (window.devicePixelRatio || 1);   // stage dimensions, not the full window
  imC.height = H * (window.devicePixelRatio || 1);
  imC.style.height = H + 'px';
  drawIntermission();
}

function drawIntermission() {
  const imC = $('imCanvas');
  if (!imC) return;
  const dpr = window.devicePixelRatio || 1;
  const IW = imC.width / dpr, IH = imC.height / dpr;
  const ictx = imC.getContext('2d');
  ictx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ictx.clearRect(0, 0, IW, IH);

  const SANS2 = "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif";
  const cleared = im.cleared;
  im.answerRects = [];

  const irr = (x, y, w, h, r) => { ictx.beginPath(); if (ictx.roundRect) ictx.roundRect(x, y, w, h, r); else ictx.rect(x, y, w, h); };

  // ── Background ──────────────────────────────────────────────────────────
  const grad = ictx.createLinearGradient(0, 0, 0, IH);
  grad.addColorStop(0, '#060a12'); grad.addColorStop(1, '#0b101e');
  ictx.fillStyle = grad; ictx.fillRect(0, 0, IW, IH);
  ictx.fillStyle = 'rgba(200,220,255,0.09)';
  for (let i = 0; i < 22; i++) {
    const sx = (i * 137 + 17) % IW, sy = (i * 89 + 31) % (IH * 0.32);
    ictx.beginPath(); ictx.arc(sx, sy, 0.6 + (i % 3) * 0.3, 0, Math.PI * 2); ictx.fill();
  }

  // ── TITLE (top 5%) ──────────────────────────────────────────────────────
  const titleColor = cleared ? '#16c784' : '#ea3943';
  ictx.font = 'bold 17px ' + SANS2; ictx.fillStyle = titleColor; ictx.textAlign = 'center';
  ictx.fillText(cleared ? 'HOUR ' + session.level + ' CLEARED! 🎉' : 'HOUR ' + session.level + ' ENDED', IW / 2, IH * 0.046);

  // ── BIG SHELL COUNT BADGE (5% → 13%) ────────────────────────────────────
  const shellY = IH * 0.10;
  const badgeW = Math.min(IW - 40, 220), badgeH = 58, badgeX = (IW - badgeW) / 2;
  ictx.fillStyle = 'rgba(255,214,10,0.09)'; irr(badgeX, shellY - 14, badgeW, badgeH, 10); ictx.fill();
  ictx.strokeStyle = 'rgba(255,214,10,0.35)'; ictx.lineWidth = 1.5; irr(badgeX, shellY - 14, badgeW, badgeH, 10); ictx.stroke();
  // Draw emoji + number separately so baselines align
  const numStr = fmt(player.shells);
  ictx.font = 'bold 23px ' + SANS2; ictx.fillStyle = '#ffd60a'; ictx.textAlign = 'left';
  const numW = ictx.measureText(numStr).width;
  const emojiStr = '🐚 ';
  const emojiW = ictx.measureText(emojiStr).width;
  const startX = IW / 2 - (emojiW + numW) / 2;
  ictx.fillText(emojiStr, startX, shellY + 1);
  ictx.fillText(numStr, startX + emojiW, shellY + 1);
  ictx.font = '8px ' + SANS2; ictx.fillStyle = '#7d8aa0'; ictx.textAlign = 'center';
  ictx.fillText('TOTAL SHELLS', IW / 2, shellY + 13);
  // Session P&L
  const netStr = (session.net >= 0 ? '+' : '−') + fmt(Math.abs(session.net));
  const winPct = session.trades ? Math.round(session.wins / session.trades * 100) : 0;
  ictx.font = '9px ' + SANS2; ictx.fillStyle = '#4a5a72';
  ictx.fillText('SESSION  P&L ' + netStr + '  ·  ' + winPct + '% wins', IW / 2, shellY + 26);
  // All-time P&L
  const atNetStr = (stats.net >= 0 ? '+' : '−') + fmt(Math.abs(stats.net));
  const atWinPct = stats.trades ? Math.round(stats.wins / stats.trades * 100) : 0;
  ictx.font = '8.5px ' + SANS2; ictx.fillStyle = '#334a68';
  ictx.fillText('ALL-TIME  P&L ' + atNetStr + '  ·  ' + stats.trades + ' trades  ·  ' + atWinPct + '% win', IW / 2, shellY + 38);

  // ── CHARACTERS (13% → 22%) ──────────────────────────────────────────────
  const charTop = IH * 0.13, charBot = IH * 0.22;
  const charMid = (charTop + charBot) / 2;
  const bob = Math.sin(im.t * 2.2) * 3;
  const charScale = Math.min(0.82, IW / 380);
  drawBull(ictx, IW * 0.21, charMid + bob, charScale);
  drawBear(ictx, IW * 0.79, charMid + Math.sin(im.t * 2.2 + 1.1) * 3, charScale);
  // Speech bubbles
  const bubW = Math.min(IW * 0.24, 100);
  const bullSay = cleared ? 'Bulls win! 🐂' : 'Stay focused!';
  const bearSay = cleared ? 'Lucky...' : 'Bears rule! 🐻';
  [[IW * 0.21, bullSay, '#16c784'], [IW * 0.79, bearSay, '#ea3943']].forEach(([bxc, txt, col], bi) => {
    const byc = charMid - 36 * charScale - 19 + (bi === 0 ? bob : Math.sin(im.t * 2.2 + 1.1) * 3);
    ictx.fillStyle = col + '22'; irr(bxc - bubW / 2, byc, bubW, 17, 4); ictx.fill();
    ictx.strokeStyle = col; ictx.lineWidth = 1; irr(bxc - bubW / 2, byc, bubW, 17, 4); ictx.stroke();
    ictx.font = '8px ' + SANS2; ictx.fillStyle = col; ictx.textAlign = 'center';
    ictx.fillText(txt, bxc, byc + 12);
  });
  // Stars (centre strip)
  const starsToShow = Math.min(session.level, 5);
  ictx.font = '12px serif'; ictx.textAlign = 'center';
  for (let si = 0; si < 5; si++) {
    ictx.globalAlpha = si < starsToShow ? 1 : 0.14;
    ictx.fillText('⭐', IW / 2 + (si - 2) * 17, charTop + 13);
  }
  ictx.globalAlpha = 1;

  // ── LESSON BOX + INFOGRAPHIC (22% → 40%) ────────────────────────────────
  const cur = getCurriculum(session.level);
  const lesY = IH * 0.22, lesH = IH * 0.18;
  ictx.fillStyle = '#0d1421'; irr(10, lesY, IW - 20, lesH, 8); ictx.fill();
  ictx.strokeStyle = '#1e3050'; ictx.lineWidth = 1; irr(10, lesY, IW - 20, lesH, 8); ictx.stroke();
  // Header row with coloured tab
  ictx.fillStyle = 'rgba(76,195,255,0.10)'; irr(10, lesY, IW - 20, 21, [8,8,0,0]); ictx.fill();
  ictx.font = 'bold 10px ' + SANS2; ictx.fillStyle = '#4cc3ff'; ictx.textAlign = 'left';
  ictx.fillText('📚  HOUR ' + session.level + ' — ' + cur.title.toUpperCase(), 18, lesY + 14);
  ictx.font = '8.5px ' + SANS2; ictx.fillStyle = '#4a5a70'; ictx.textAlign = 'right';
  ictx.fillText('💡 ' + cur.tip, IW - 14, lesY + 14);

  // Level-specific infographic
  const ig = { x: 16, y: lesY + 25, w: IW - 32, h: lesH - 28 };
  const lvl = session.level;

  if (lvl === 1) {
    // Candle Basics — green + red candles with clean labels
    const cH1 = ig.h - 2, cW1 = 16;
    const gcX1 = ig.x + ig.w * 0.13, rcX1 = ig.x + ig.w * 0.42;
    const gT1 = ig.y, gB1 = ig.y + cH1;
    // Green candle
    ictx.strokeStyle = '#4a6070'; ictx.lineWidth = 1.5;
    ictx.beginPath(); ictx.moveTo(gcX1, gT1); ictx.lineTo(gcX1, gT1 + 8); ictx.stroke();
    ictx.beginPath(); ictx.moveTo(gcX1, gB1 - 5); ictx.lineTo(gcX1, gB1); ictx.stroke();
    ictx.fillStyle = '#16c784'; ictx.fillRect(gcX1 - cW1/2, gT1 + 8, cW1, cH1 - 16);
    // Red candle
    ictx.beginPath(); ictx.moveTo(rcX1, gT1); ictx.lineTo(rcX1, gT1 + 8); ictx.stroke();
    ictx.beginPath(); ictx.moveTo(rcX1, gB1 - 5); ictx.lineTo(rcX1, gB1); ictx.stroke();
    ictx.fillStyle = '#ea3943'; ictx.fillRect(rcX1 - cW1/2, gT1 + 8, cW1, cH1 - 16);
    // Candle labels
    ictx.font = 'bold 8px ' + SANS2; ictx.textAlign = 'center';
    ictx.fillStyle = '#3ddc6a'; ictx.fillText('GREEN ▲', gcX1, gB1 + 11);
    ictx.fillStyle = '#f3838a'; ictx.fillText('RED ▼', rcX1, gB1 + 11);
    // Body / Wick arrows
    ictx.font = '8px ' + SANS2; ictx.fillStyle = '#6a7e94'; ictx.textAlign = 'left';
    ictx.fillText('← BODY', gcX1 + cW1/2 + 3, gT1 + cH1 * 0.55);
    ictx.fillText('← WICK', gcX1 + cW1/2 + 3, gT1 + 5);
    // Long/Short legend (right side)
    const lsX1 = ig.x + ig.w * 0.70;
    ictx.font = 'bold 9px ' + SANS2; ictx.textAlign = 'left';
    ictx.fillStyle = '#16c784'; ictx.fillText('▲ LONG', lsX1, ig.y + ig.h * 0.28);
    ictx.font = '8px ' + SANS2; ictx.fillStyle = '#4dbc7a';
    ictx.fillText('bet price goes UP', lsX1, ig.y + ig.h * 0.46);
    ictx.font = 'bold 9px ' + SANS2; ictx.fillStyle = '#ea3943';
    ictx.fillText('▼ SHORT', lsX1, ig.y + ig.h * 0.68);
    ictx.font = '8px ' + SANS2; ictx.fillStyle = '#b84040';
    ictx.fillText('bet price goes DOWN', lsX1, ig.y + ig.h * 0.86);

  } else if (lvl === 2) {
    // Risk Management — candle + entry/SL/TP lines
    const cx2b = ig.x + ig.w * 0.10;
    const cT2 = ig.y, cH2 = ig.h, cW2 = 13;
    ictx.fillStyle = '#16c784'; ictx.fillRect(cx2b - cW2/2, cT2 + cH2*0.28, cW2, cH2*0.36);
    ictx.strokeStyle = '#4a6070'; ictx.lineWidth = 1;
    ictx.beginPath(); ictx.moveTo(cx2b, cT2); ictx.lineTo(cx2b, cT2 + cH2*0.28); ictx.stroke();
    ictx.beginPath(); ictx.moveTo(cx2b, cT2 + cH2*0.64); ictx.lineTo(cx2b, cT2+cH2); ictx.stroke();
    const lX2 = ig.x + 18, lW2 = ig.w - 26;
    const eY2b = ig.y + cH2*0.46, tY2b = ig.y + 2, slY2b = ig.y + cH2*0.81;
    [[eY2b,'#ffd60a','ENTRY — open trade here'],[tY2b,'#16c784','TAKE PROFIT — win ✓'],[slY2b,'#ea3943','STOP LOSS — exit ✗']].forEach(([ly2,lc,lbl]) => {
      ictx.strokeStyle = lc; ictx.lineWidth = 1.2; ictx.setLineDash([3,2]);
      ictx.beginPath(); ictx.moveTo(lX2, ly2); ictx.lineTo(lX2 + lW2, ly2); ictx.stroke(); ictx.setLineDash([]);
      ictx.font = '8.5px ' + SANS2; ictx.fillStyle = lc; ictx.textAlign = 'left';
      ictx.fillText(lbl, lX2 + 8, ly2 - 3);
    });

  } else if (lvl === 3) {
    // BOS + OB sequence
    const n3 = 5, bCW3 = ig.w * 0.52 / n3 - 3;
    const bH3steps = [0.55, 0.42, 0.30, 0.18, 0.06];
    bH3steps.forEach((f, bi) => {
      const bx3b = ig.x + bi * (bCW3 + 3);
      const bT3 = ig.y + ig.h * f, bH3b = Math.max(5, ig.h * 0.18);
      ictx.fillStyle = bi % 2 === 0 ? '#16c784' : '#ea3943';
      ictx.fillRect(bx3b, bT3, bCW3, bH3b);
      if (bi === 3) { // OB highlight
        ictx.strokeStyle = '#a855f7'; ictx.lineWidth = 1.5; irr(bx3b-1, bT3-1, bCW3+2, bH3b+2, 2); ictx.stroke();
        ictx.font = 'bold 7px ' + SANS2; ictx.fillStyle = '#d8b4fe'; ictx.textAlign = 'center';
        ictx.fillText('OB', bx3b + bCW3/2, bT3 - 3);
      }
    });
    // BOS arrow
    const bosAX3 = ig.x + 5 * (bCW3 + 3) + 2;
    ictx.strokeStyle = '#4cc3ff'; ictx.lineWidth = 2;
    ictx.beginPath(); ictx.moveTo(bosAX3, ig.y + ig.h*0.32); ictx.lineTo(bosAX3+16, ig.y+ig.h*0.06); ictx.stroke();
    ictx.font = 'bold 8px ' + SANS2; ictx.fillStyle = '#4cc3ff'; ictx.textAlign = 'left';
    ictx.fillText('BOS ⚡', bosAX3, ig.y + ig.h * 0.04);
    // Legend
    const lgX3 = ig.x + ig.w * 0.58;
    ictx.font = '8.5px ' + SANS2; ictx.textAlign = 'left';
    ictx.fillStyle = '#d8b4fe'; ictx.fillText('OB = entry zone', lgX3, ig.y + ig.h * 0.28);
    ictx.fillStyle = '#4cc3ff'; ictx.fillText('BOS = structure break', lgX3, ig.y + ig.h * 0.52);
    ictx.fillStyle = '#6a7e94'; ictx.fillText('enter after BOS', lgX3, ig.y + ig.h * 0.75);

  } else if (lvl === 4) {
    // VWAP bounce
    const n4 = 7, bCW4 = ig.w * 0.58 / n4 - 2;
    const vH4f = [0.40,0.58,0.44,0.30,0.42,0.26,0.34];
    vH4f.forEach((f, vi) => {
      const vx4b = ig.x + vi*(bCW4+2), vT4 = ig.y + ig.h * f;
      ictx.fillStyle = vi%2===0?'#16c784':'#ea3943';
      ictx.fillRect(vx4b, vT4, bCW4, ig.h * 0.15);
    });
    ictx.strokeStyle = '#ff9f43'; ictx.lineWidth = 2;
    ictx.beginPath();
    vH4f.forEach((f, vi) => { const vx4b=ig.x+vi*(bCW4+2)+bCW4/2, vy4=ig.y+ig.h*(f*0.76+0.10); vi===0?ictx.moveTo(vx4b,vy4):ictx.lineTo(vx4b,vy4); });
    ictx.stroke();
    const lgX4 = ig.x + ig.w * 0.63;
    ictx.font = 'bold 8.5px ' + SANS2; ictx.fillStyle = '#ff9f43'; ictx.textAlign = 'left';
    ictx.fillText('VWAP', lgX4, ig.y + ig.h * 0.22);
    ictx.font = '8px ' + SANS2; ictx.fillStyle = '#6a7e94';
    ictx.fillText('avg price by volume', lgX4, ig.y + ig.h * 0.44);
    ictx.fillText('bounces = setups', lgX4, ig.y + ig.h * 0.65);

  } else {
    ictx.font = '10px ' + SANS2; ictx.fillStyle = '#c9d1d9'; ictx.textAlign = 'center';
    ictx.fillText(cur.subtitle, IW/2, ig.y + ig.h/2 + 4);
  }

  // ── TRADE HISTORY (40% → 54%, only if trades taken) ─────────────────────
  const tlog = session.tradeLog || [];
  let quizTop = IH * 0.42;

  if (tlog.length > 0) {
    const thY = IH * 0.41, thH = IH * 0.13;
    quizTop = thY + thH + 6;
    ictx.font = 'bold 9px ' + SANS2; ictx.fillStyle = '#7fd6ff'; ictx.textAlign = 'left';
    ictx.fillText('📊 TRADE HISTORY  ·  tap to review', 14, thY + 10);
    const maxShow = Math.min(tlog.length, 4);
    const shownLogs = tlog.slice(-maxShow);
    const cardPad = 6;
    const cardW4 = (IW - 20 - (maxShow - 1) * cardPad) / maxShow;
    const cardH4 = thH - 14;
    shownLogs.forEach((t, ti) => {
      const cx4 = 10 + ti * (cardW4 + cardPad);
      const cy4 = thY + 13;
      const tcol = t.delta > 0 ? '#16c784' : '#ea3943';
      ictx.fillStyle = 'rgba(8,14,24,0.96)'; irr(cx4, cy4, cardW4, cardH4, 6); ictx.fill();
      ictx.strokeStyle = tcol + 'aa'; ictx.lineWidth = 1.5; irr(cx4, cy4, cardW4, cardH4, 6); ictx.stroke();
      // Direction + result
      ictx.font = 'bold 7.5px ' + SANS2; ictx.fillStyle = tcol; ictx.textAlign = 'center';
      const resLbl4 = t.result === 'win' ? '✓ WIN' : t.result === 'loss' ? '✗ LOSS' : 'CLOSED';
      ictx.fillText((t.dir === 'long' ? '▲ LONG' : '▼ SHORT') + '  ' + resLbl4, cx4 + cardW4/2, cy4 + 10);
      // P&L
      const dSign4 = t.delta > 0 ? '+' : '−';
      ictx.font = '7px ' + SANS2; ictx.fillStyle = t.delta > 0 ? '#3ddc6a' : '#f3838a';
      ictx.fillText(dSign4 + fmt(Math.abs(t.delta)) + ' 🐚', cx4 + cardW4/2, cy4 + 20);
      // Mini chart
      const snap4 = t.candleSnap || [];
      if (snap4.length >= 2) {
        const mX4 = cx4+4, mY4 = cy4+24, mW4 = cardW4-8, mH4 = cardH4-30;
        let lo4=Infinity, hi4=-Infinity;
        snap4.forEach(c => { lo4=Math.min(lo4,Math.min(c.open,c.h)-(c.wick2||0)); hi4=Math.max(hi4,Math.max(c.open,c.h)+(c.wick||0)); });
        const rng4=Math.max(1,hi4-lo4);
