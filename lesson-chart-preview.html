<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>ChartQuest · LessonChart preview</title>
<style>
  :root{
    --bg:#080b12;--panel:#0d131f;--panel2:#111a28;--line:#1b2738;--ink:#e6edf3;--sub:#8b97a8;--mut:#56657a;
    --green:#16c784;--greenEdge:#0c9c69;--red:#ea3943;--redEdge:#c0212c;--blue:#4cc3ff;--gold:#ffd60a;--purp:#a855f7;--orange:#ff9f43;--shell:#36d9e0;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#04060b;color:var(--ink);font-family:var(--font);}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #stage{position:relative;width:min(100vw,430px);height:100vh;height:100dvh;
    background:radial-gradient(125% 62% at 50% 0%,#1b1030 0%,#0a0610 60%);
    box-shadow:0 0 0 1px #2a1840;display:flex;flex-direction:column;overflow:hidden;}

  /* top bar: a single dropdown to pick the lesson + a replay button */
  .topbar{display:flex;gap:10px;align-items:center;padding:12px 14px 8px;flex-shrink:0;}
  #sceneSel{flex:1;padding:13px 40px 13px 14px;border-radius:12px;background:#0d131f;border:1px solid #2a3a4e;color:#e6edf3;font:700 14px var(--font);cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,#8b97a8 50%),linear-gradient(135deg,#8b97a8 50%,transparent 50%);background-position:calc(100% - 20px) 20px,calc(100% - 15px) 20px;background-size:5px 5px;background-repeat:no-repeat;}
  .iconbtn{width:50px;flex-shrink:0;padding:13px 0;border-radius:12px;border:1px solid var(--blue);background:rgba(76,195,255,.12);color:var(--blue);font:800 17px var(--font);cursor:pointer;}

  /* the chart fills almost the whole screen */
  .chartWrap{position:relative;flex:1;min-height:0;margin:0 12px;border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(180deg,#070b12,#05080e);overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.5);}
  canvas{display:block;width:100%;height:100%;}

  .meta{flex-shrink:0;padding:13px 18px 16px;}
  .eyebrow{font:800 10px var(--font);letter-spacing:1.4px;color:var(--purp);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin:0 0 4px;}
  .title{font:800 23px var(--font);letter-spacing:-.3px;margin:0 0 8px;}
  .caption{font:600 14px var(--font);line-height:1.5;color:#d7e0ec;}
  .caption b{color:#fff;}
  .note{font:600 10px var(--font);color:var(--mut);text-align:center;padding:0 16px 9px;}
</style>
</head>
<body>
<div id="stage">
  <div class="topbar">
    <select id="sceneSel"></select>
    <button class="iconbtn" id="replay" title="Replay">▸</button>
  </div>
  <div class="chartWrap"><canvas id="cv"></canvas></div>
  <div class="meta">
    <div class="eyebrow"><span id="eyebrowIcon">📘</span> <span id="eyebrow">STRUCTURE</span></div>
    <div class="title" id="title">Liquidity ID</div>
    <div class="caption" id="caption"></div>
  </div>
  <div class="note">LessonChart preview · pick a lesson above · the same renderer powers every in-game lesson</div>
</div>

<script>
/* ============================================================================
   LessonChart — a reusable, ANIMATED candlestick teaching diagram.
   One renderer, data-driven "scenes". The same engine is intended to power:
   every Hour lesson, every journal term pop-up, the boss-round intros, and the
   fullscreen post-trade lessons (STOP DID ITS JOB / STOPPED OUT).

   A scene is pure data:
     { eyebrow, eyebrowIcon, title, caption, candles:[{o,h,l,c}], anns:[...] }
   Prices are on an arbitrary 0..100 scale; the engine auto-frames them.
   Annotations animate IN after the candles print, each with its own `at` time.
   ========================================================================== */
const C = {
  green:'#16c784', greenEdge:'#0c9c69', greenWick:'#1fd790',
  red:'#ea3943', redEdge:'#c0212c', redWick:'#ff5663',
  grid:'rgba(255,255,255,0.045)', sub:'#8b97a8', purp:'#a855f7', gold:'#ffd60a',
  blue:'#4cc3ff', shell:'#36d9e0', ink:'#e6edf3'
};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-clamp(t,0,1),3);
const easeIO=t=>{t=clamp(t,0,1);return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;};

/* ---- SCENES ------------------------------------------------------------- */

      {type:'eqHighs', y:70.5, from:1, to:6, at:1.7, color:C.purp, label:'EQUAL HIGHS · stop losses sit above'},

  },
  tp:{

    caption:'A <b>take profit</b> is your goal price. When price reaches it, the trade closes and your win is locked in.',
    candles:[{o:42,h:48,l:40,c:46},{o:46,h:54,l:44,c:52},{o:52,h:58,l:50,c:56},{o:56,h:66,l:54,c:64},{o:64,h:72,l:62,c:70}],
    anns:[{type:'hline',y:46,at:1.5,color:C.gold,label:'ENTRY'},{type:'hline',y:70,at:2.0,color:C.green,label:'TAKE PROFIT ✓'},{type:'tag',candle:4,side:'up',color:C.green,at:3.0,label:'locked in'}]
  },
  rr:{

    caption:'<b>Risk : reward</b> compares what you could lose to what you could win. Risk a little to make a lot — aim for at least <b>2×</b> your risk.',
    candles:[{o:46,h:52,l:44,c:50},{o:50,h:56,l:48,c:54},{o:54,h:62,l:52,c:60},{o:60,h:70,l:58,c:68}],
    anns:[{type:'zone',from:0,to:3,y1:42,y2:50,color:C.red,at:1.6,label:'1R RISK'},{type:'zone',from:0,to:3,y1:50,y2:66,color:C.green,at:2.2,label:'2R REWARD'},{type:'hline',y:50,at:1.3,color:C.gold,label:'ENTRY'}]
  },
  leverage:{
    eyebrow:'RISK', eyebrowIcon:'⚡', title:'Leverage',
    caption:'<b>Leverage</b> makes your wins AND losses bigger. A small price move turns into a big result — powerful, but risky.',
    candles:[{o:44,h:50,l:42,c:48},{o:48,h:54,l:46,c:52},{o:52,h:58,l:50,c:56},{o:56,h:62,l:54,c:60}],
    anns:[{type:'tag',candle:0,side:'down',color:C.sub,at:1.8,label:'small move'},{type:'tag',candle:3,side:'up',color:C.orange,at:2.6,label:'× LEVERAGE = BIG result'}]
  },
  bullflag:{
    eyebrow:'PATTERNS', eyebrowIcon:'🚩', title:'Bull Flag',
    caption:'A <b>bull flag</b>: a strong push up (the pole), a short rest that drifts down a little (the flag), then price <b>pops higher</b> again.',
    candles:[{o:30,h:34,l:28,c:32},{o:32,h:52,l:30,c:50},{o:50,h:53,l:45,c:47},{o:47,h:49,l:43,c:45},{o:45,h:62,l:43,c:60},{o:60,h:70,l:58,c:68}],
    anns:[{type:'tag',candle:1,side:'up',color:C.green,at:1.6,label:'POLE'},{type:'tag',candle:3,side:'down',color:C.sub,at:2.4,label:'flag (rest)'},{type:'tag',candle:5,side:'up',color:C.green,at:3.0,label:'GO ↑'}]
  },
  bearflag:{
    eyebrow:'PATTERNS', eyebrowIcon:'🏴', title:'Bear Flag',
    caption:'A <b>bear flag</b>: a strong push down (the pole), a short rest that drifts up a little (the flag), then price <b>drops lower</b> again.',
    candles:[{o:70,h:72,l:66,c:68},{o:68,h:70,l:50,c:52},{o:52,h:57,l:50,c:55},{o:55,h:59,l:53,c:57},{o:57,h:59,l:40,c:42},{o:42,h:44,l:32,c:34}],
    anns:[{type:'tag',candle:1,side:'down',color:C.red,at:1.6,label:'POLE'},{type:'tag',candle:3,side:'up',color:C.sub,at:2.4,label:'flag (rest)'},{type:'tag',candle:5,side:'down',color:C.red,at:3.0,label:'GO ↓'}]
  },
  confluence:{
    eyebrow:'ADVANCED', eyebrowIcon:'🔎', title:'Confluence',
    caption:'<b>Confluence</b> is when several clues point the same way — the trend, a level, and a setup all agree. More clues = a stronger trade.',
    candles:[{o:34,h:40,l:32,c:38},{o:38,h:44,l:33,c:35},{o:35,h:48,l:33,c:46},{o:46,h:50,l:40,c:42},{o:42,h:56,l:40,c:54},{o:54,h:62,l:50,c:60}],
    anns:[{type:'hline',y:33,at:1.6,color:C.green,label:'SUPPORT held'},{type:'line',c1:1,p1:34,c2:5,p2:50,color:C.gold,extend:true,at:2.2,label:'TRENDLINE'},{type:'tag',candle:5,side:'up',color:C.blue,at:3.0,label:'clues agree ✓'}]

};

/* ---- ENGINE ------------------------------------------------------------- */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let scene=SCENES.liquidity, t0=0, raf=0, dpr=1;

function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);

function frame(){
  const Wc=cv.width/dpr, Hc=cv.height/dpr;
  const padX=30, padTop=24, padBot=22;
  const x0=padX, x1=Wc-padX, yTop=padTop, yBot=Hc-padBot;
  const cs=scene.candles, n=cs.length;

  // auto-frame price range (include the sweep wick) with headroom
  let lo=1e9, hi=-1e9;
  cs.forEach(c=>{lo=Math.min(lo,c.l,c.o,c.c);hi=Math.max(hi,c.h,c.o,c.c);});
  (scene.anns||[]).forEach(a=>{if(a.y!=null){lo=Math.min(lo,a.y);hi=Math.max(hi,a.y);}});
  const pad=(hi-lo)*0.08; lo-=pad; hi+=pad;
  // extra top headroom so a wick-tip shell + its "+5" never clip at the top edge
  if((scene.anns||[]).some(a=>a.type==='shell')) hi+=(hi-lo)*0.20;
  const Y=v=>yBot-(v-lo)/(hi-lo)*(yBot-yTop);

  // tight, real-chart spacing: bigger candles sit side-by-side with a thin gap
  const slot=(x1-x0)/n, bw=Math.min(48,slot*0.72);
  const cx=i=>x0+slot*(i+0.5);

  const t=(performance.now()-t0)/1000;
  const printStep=0.26, allIn=n*printStep;

  ctx.clearRect(0,0,Wc,Hc);

  // grid
  ctx.strokeStyle=C.grid; ctx.lineWidth=1;
  for(let g=0;g<=4;g++){const gy=yTop+g/4*(yBot-yTop);ctx.beginPath();ctx.moveTo(x0-8,gy);ctx.lineTo(x1+8,gy);ctx.stroke();}

  // candles (print in left→right; each grows from its open to its close)
  for(let i=0;i<n;i++){
    const appear=i*printStep, p=easeOut((t-appear)/printStep);
    if(p<=0) continue;
    const c=cs[i], up=c.c>=c.o, x=cx(i);
    const col=up?C.green:C.red, edge=up?C.greenEdge:C.redEdge, wcol=up?C.greenWick:C.redWick;
    // wick grows slightly after the body for the sweep candle (dramatic spike)
    const bodyTopV=Math.max(c.o,c.c), bodyBotV=Math.min(c.o,c.c);
    const curTop=lerp(c.o,bodyTopV,p), curBot=lerp(c.o,bodyBotV,p);
    const wp=c.sweep?easeOut((t-appear-printStep*0.5)/(printStep*1.4)):p;   // wick spikes a beat later
    const curHi=lerp(bodyTopV,c.h,wp), curLo=lerp(bodyBotV,c.l,p);
    // wick
    ctx.strokeStyle=wcol; ctx.lineWidth=c.sweep?3:1.6;
    ctx.beginPath(); ctx.moveTo(x,Y(curHi)); ctx.lineTo(x,Y(curLo)); ctx.stroke();
    // body
    const bt=Y(curTop), bb=Y(curBot);
    ctx.fillStyle=col; ctx.fillRect(x-bw/2,bt,bw,Math.max(2,bb-bt));
    ctx.strokeStyle=edge; ctx.lineWidth=1; ctx.strokeRect(x-bw/2+.5,bt+.5,bw-1,Math.max(2,bb-bt)-1);
    // subtle left sheen
    ctx.fillStyle=up?'rgba(93,237,181,.5)':'rgba(255,120,130,.45)';
    ctx.fillRect(x-bw/2+1,bt+1,Math.max(1.5,bw*.16),Math.max(1,(bb-bt)*.9));
    c._x=x; c._hiY=Y(c.h); c._loY=Y(c.l); c._bt=bt; c._bb=bb;
  }

  // annotations
  for(const a of (scene.anns||[])){
    const ap=easeOut((t-a.at)/0.55); if(ap<=0) continue;
    ctx.globalAlpha=ap;
    if(a.type==='eqHighs'){
      const xa=cx(a.from)-bw*0.7, xb=cx(a.to)+bw*0.7, y=Y(a.y);
      ctx.strokeStyle=a.color; ctx.lineWidth=1.6; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(xa,y); ctx.lineTo(xb,y); ctx.stroke(); ctx.setLineDash([]);
      pill(xa+2,y-9,a.label,a.color);
    } else if(a.type==='hline'){
      const y=Y(a.y);
      ctx.strokeStyle=a.color; ctx.lineWidth=1.7; ctx.setLineDash([7,4]);
      ctx.beginPath(); ctx.moveTo(x0-8,y); ctx.lineTo(x1+8,y); ctx.stroke(); ctx.setLineDash([]);
      pill(x0,y-9,a.label,a.color);
    } else if(a.type==='shell'){
      const c=cs[a.candle]; if(!c||c._hiY==null){ctx.globalAlpha=1;continue;}
      const r=11, x=c._x, y=c._hiY-r-2;                 // pinned to the wick TIP, 2px gap
      const glow=18+Math.sin(t*4)*9;                    // pulsing glow
      drawShell(x,y,r,glow);
      // LIQUIDITY label + arrow pointing at the shell
      ctx.strokeStyle=C.shell; ctx.lineWidth=2;
      const lx=x-92, ly=y-1;
      arrow(lx+10,ly,x-r-3,y);
      ctx.fillStyle=C.shell; ctx.font='800 12px -apple-system,system-ui,sans-serif'; ctx.textAlign='right';
      ctx.fillText(a.label,lx+4,ly+4);
      // the grab pays out — "+5" rises once the wick reaches the shell (≈ when the sweep wick tops out)
      const gp=(t-(a.at+0.9));
      if(gp>0){
        const rise=easeOut(gp/0.9), fade=clamp(1-(gp-0.9)/1.2,0,1);
        ctx.globalAlpha=ap*fade;
        ctx.fillStyle=C.shell; ctx.font='900 14px -apple-system,system-ui,sans-serif'; ctx.textAlign='center';
        ctx.fillText('+5 💎', x, y-14-rise*16);
        ctx.globalAlpha=ap;
      }
    } else if(a.type==='hh'||a.type==='hl'){
      const c=cs[a.candle]; if(!c||c._x==null){ctx.globalAlpha=1;continue;}
      const isHH=a.type==='hh', y=isHH?c._hiY-12:c._loY+18;
      ctx.fillStyle=isHH?C.green:C.gold; ctx.font='800 12px -apple-system,system-ui,sans-serif'; ctx.textAlign='center';
      ctx.fillText(a.label,c._x,y);
      ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(c._x,isHH?c._hiY-2:c._loY+2); ctx.lineTo(c._x,isHH?y+3:y-11); ctx.stroke();
    } else if(a.type==='tag'){
      const c=cs[a.candle]; if(!c||c._x==null){ctx.globalAlpha=1;continue;}
      const up=a.side!=='down', y=up?c._hiY-12:c._loY+18;
      ctx.fillStyle=a.color||C.blue; ctx.font='800 12px -apple-system,system-ui,sans-serif'; ctx.textAlign='center';
      ctx.fillText(a.label,c._x,y);
      ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(c._x,up?c._hiY-2:c._loY+2); ctx.lineTo(c._x,up?y+3:y-11); ctx.stroke();
    } else if(a.type==='swingHigh'){
      const y=Y(a.y);
      ctx.strokeStyle=C.sub; ctx.lineWidth=1.4; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(x0-8,y); ctx.lineTo(x1+8,y); ctx.stroke(); ctx.setLineDash([]);
      pill(x0,y-9,a.label,C.sub);
    } else if(a.type==='bosFlag'){
      const c=cs[a.candle+1]||cs[a.candle];
      const cc=cs[6]; const x=cc._x, y=cc._bt-10;
      ctx.strokeStyle=C.green; ctx.lineWidth=1.6;
      arrow(x-2,y-22,x,cc._bt-2);
      pill(x-ctx.measureText(a.label).width*0.5-46,y-22,a.label,C.green,true);
    } else if(a.type==='sweepFlag'){
      const c=cs[a.candle]; const x=c._x;
      // highlight the rejection: the wick grabbed liquidity / poked the level, then closed back
      ctx.fillStyle=a.color||C.red; ctx.font='800 11px -apple-system,system-ui,sans-serif'; ctx.textAlign='center';
      ctx.fillText(a.text||(a.fake?'FAKEOUT → closed back below':'SWEPT → rejected'),x,c._bb+18);
    } else if(a.type==='zone'){
      const xa=cx(a.from)-bw*0.6, xb=cx(a.to)+bw*0.6, yt=Y(Math.max(a.y1,a.y2)), yb=Y(Math.min(a.y1,a.y2)), sa=ctx.globalAlpha;
      ctx.globalAlpha=sa*0.16; ctx.fillStyle=a.color; ctx.fillRect(xa,yt,xb-xa,yb-yt);
      ctx.globalAlpha=sa; ctx.strokeStyle=a.color; ctx.lineWidth=1.2; ctx.strokeRect(xa,yt,xb-xa,yb-yt);
      if(a.label) pill(xa+2,yt-9,a.label,a.color);
    } else if(a.type==='line'){
      const xA=cx(a.c1), xB=a.extend?(x1+8):cx(a.c2), yA=Y(a.p1), sl=(Y(a.p2)-yA)/((cx(a.c2)-xA)||1), yB=yA+sl*(xB-xA);
      ctx.strokeStyle=a.color; ctx.lineWidth=1.8; if(a.dash){ctx.setLineDash([6,4]);}
      ctx.beginPath(); ctx.moveTo(xA,yA); ctx.lineTo(xB,yB); ctx.stroke(); ctx.setLineDash([]);
      if(a.label) pill(xA,yA-9,a.label,a.color);
    }
    ctx.globalAlpha=1;
  }

  // loop the scene with a hold at the end
  if(t>allIn+5.5) t0=performance.now();
  raf=requestAnimationFrame(frame);
}

function pill(x,y,text,color,center){
  ctx.font='800 10px -apple-system,system-ui,sans-serif';
  const w=ctx.measureText(text).width+12;
  if(center) x-=w/2;
  ctx.fillStyle='rgba(6,10,18,.82)'; ctx.fillRect(x,y-9,w,15);
  ctx.fillStyle=color; ctx.textAlign='left'; ctx.fillText(text,x+6,y+1.5);
}
function arrow(x1,y1,x2,y2){
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1), s=6;
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-s*Math.cos(a-0.5),y2-s*Math.sin(a-0.5));
  ctx.lineTo(x2-s*Math.cos(a+0.5),y2-s*Math.sin(a+0.5));
  ctx.closePath(); ctx.fillStyle=ctx.strokeStyle; ctx.fill();
}
/* the game's "shell" = a cyan gem; here it sits on the wick tip = resting liquidity */
function drawShell(x,y,r,glow){
  ctx.save();
  // soft outer halo so the liquidity reward really glows
  const halo=ctx.createRadialGradient(x,y,0,x,y,r*2.4);
  halo.addColorStop(0,'rgba(54,217,224,.45)'); halo.addColorStop(1,'rgba(54,217,224,0)');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(x,y,r*2.4,0,7); ctx.fill();
  ctx.shadowColor=C.shell; ctx.shadowBlur=glow||14;
  const g=ctx.createLinearGradient(x,y-r,x,y+r);
  g.addColorStop(0,'#bff6fb'); g.addColorStop(.5,C.shell); g.addColorStop(1,'#1aa6ad');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.9,y-r*0.15); ctx.lineTo(x,y+r); ctx.lineTo(x-r*0.9,y-r*0.15);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-r*0.4,y-r*0.2); ctx.lineTo(x,y-r*0.7); ctx.lineTo(x+r*0.4,y-r*0.2); ctx.stroke();
  ctx.restore();
}

function load(key){
  scene=SCENES[key];
  document.getElementById('eyebrow').textContent=scene.eyebrow;
  document.getElementById('eyebrowIcon').textContent=scene.eyebrowIcon;
  document.getElementById('title').textContent=scene.title;
  document.getElementById('caption').innerHTML=scene.caption;
  resize(); t0=performance.now();
}
// populate the dropdown from the scene library, grouped by eyebrow for easy scanning
const sel=document.getElementById('sceneSel');
Object.keys(SCENES).forEach(k=>{
  const s=SCENES[k], o=document.createElement('option');
  o.value=k; o.textContent=(s.eyebrow?s.eyebrow+' · ':'')+s.title;
  sel.appendChild(o);
});
sel.onchange=()=>load(sel.value);
document.getElementById('replay').onclick=()=>{t0=performance.now();};

resize(); sel.value='liquidity'; load('liquidity'); raf=requestAnimationFrame(frame);
</script>
