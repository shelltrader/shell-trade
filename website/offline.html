<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ChartQuest — offline</title>
<meta name="theme-color" content="#060910">
<link rel="icon" href="assets/pwa/icon-192.png">
<style>
  :root{--ink:#EAF2FB;--dim:#9AB0C6;--faint:#5f7285;--green:#16C784;--line:rgba(120,170,215,.22)}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:#060910;color:var(--ink);display:grid;place-items:center;text-align:center;
    padding:24px calc(24px + env(safe-area-inset-right,0px)) calc(24px + env(safe-area-inset-bottom,0px)) calc(24px + env(safe-area-inset-left,0px));
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:34ch}
  img{width:76px;height:76px;border-radius:19px;margin:0 auto 20px;display:block;box-shadow:0 10px 30px rgba(0,0,0,.55),0 0 0 1px var(--line)}
  h1{font-size:clamp(21px,5.4vw,26px);font-weight:800;letter-spacing:-.02em;margin:0}
  p{color:var(--dim);font-size:15px;line-height:1.6;margin:12px 0 24px}
  button{min-height:50px;width:100%;border:0;border-radius:13px;cursor:pointer;
    font-weight:800;font-size:15.5px;color:#032015;background:linear-gradient(180deg,#1ce39a,#0f9d68);
    box-shadow:0 12px 28px rgba(22,199,132,.32)}
  small{display:block;margin-top:18px;color:var(--faint);font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <img src="assets/pwa/icon-192.png" alt="" width="192" height="192">
    <h1>You're offline</h1>
    <p>Finn needs a connection to reach the markets. Reconnect and the chart comes right back.</p>
    <button type="button" onclick="location.reload()">Try again</button>
    <small>ChartQuest works offline once the game has loaded at least once.</small>
  </div>
  <script>
    addEventListener('online', function(){ location.reload(); });
  </script>
</body>
</html>
